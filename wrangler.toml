name = "frontrowmd-dashboard-api"
main = "dist/worker.js"
compatibility_date = "2024-01-01"
no_bundle = true

# Secrets (set via: wrangler secret put SECRET_NAME)
# TEAM_PASSWORD
# WINDSOR_API_KEY
# HUBSPOT_TOKEN

# KV namespace for content persistence
# Create with: npx wrangler kv namespace create CONTENT_STORE
# Then paste the id below
[[kv_namespaces]]
binding = "CONTENT_STORE"
id = "15173a7248cc4ce187596152580b37f1"

# Observability — keep wrangler in sync with the Cloudflare dashboard settings
# so deploys don't toggle logs off. Logs are enabled and persisted; traces off.
[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
