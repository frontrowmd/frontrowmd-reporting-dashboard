// ── Delta helpers ──────────────────────────────────────────────
function deltaNum(curr, prev) {
  if (prev === null || prev === undefined) return null;
  if (prev === 0) return curr === 0 ? 0 : null; // show flat 0% only when both are 0; hide when prev=0, curr>0 (no meaningful %)
  return (curr - prev) / Math.abs(prev);
}
function deltaBadge(curr, prev, { invert=false }={}) {
  const d = deltaNum(curr, prev);
  if (d === null) return `<span class="delta delta-flat">— %</span>`;
  const pct = (d * 100).toFixed(1);
  const isUp   = d > 0.005;
  const isDown = d < -0.005;
  let cls, arrow;
  if (isUp)        { cls = invert ? 'delta-down' : 'delta-up';   arrow = '▲'; }
  else if (isDown) { cls = invert ? 'delta-up'   : 'delta-down'; arrow = '▼'; }
  else             { cls = 'delta-flat'; arrow = '—'; }
  const sign = d > 0 ? '+' : '';
  return `<span class="delta ${cls}">${arrow} ${sign}${pct}%</span>`;
}
function scDelta(curr, prev, { invert=false }={}) {
  const d = deltaNum(curr, prev);
  if (d === null) return `<span class="sc-delta sc-delta-flat">— %</span>`;
  const pct = (d * 100).toFixed(1);
  const isUp   = d > 0.005;
  const isDown = d < -0.005;
  let cls, arrow;
  if (isUp)        { cls = invert ? 'sc-delta-down' : 'sc-delta-up';   arrow = '▲'; }
  else if (isDown) { cls = invert ? 'sc-delta-up'   : 'sc-delta-down'; arrow = '▼'; }
  else             { cls = 'sc-delta-flat'; arrow = '—'; }
  const sign = d > 0 ? '+' : '';
  return `<span class="sc-delta ${cls}">${arrow} ${sign}${pct}%</span>`;
}
function parsePct(str) {
  if (!str || str === 'N/A') return null;
  return parseFloat(str) / 100;
}

// ── Donut SVG ──────────────────────────────────────────────────
function buildDonut(slices, size=130, stroke=22) {
  const r=(size-stroke)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const total=slices.reduce((s,sl)=>s+sl.value,0);
  let offset=0, paths='';
  slices.forEach(sl=>{
    if(!sl.value) return;
    const dash=(sl.value/total)*circ, gap=circ-dash;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=dash;
  });
  return `<svg width="${size}" height="${size}" style="flex-shrink:0">${paths}</svg>`;
}

// ── Intelligence Engine ─────────────────────────────────────────
function buildIntelligence(d, p) {
  const ch=d.channels, ga=d.ga4, pp=d.pipeline;
  const pch=p.channels, pga=p.ga4, ppp=p.pipeline;
  const F={alerts:[],weaknesses:[],opportunities:[],wins:[]};

  const pct=(a,b)=>b>0?(a/b)*100:null;
  const chg=(c,v)=>v>0?((c-v)/v)*100:null;
  const fD=n=>'$'+Number(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
  const fP=(n,d=1)=>n!==null?n.toFixed(d)+'%':'N/A';
  const ar=n=>n>0?'↑':'↓';
  const ab=n=>Math.abs(n).toFixed(1);

  // ── Data quality (always surface) ───────────────────────────
  ['meta','google','tiktok','linkedin'].forEach(k=>{
    if(ch[k].spend===0) F.alerts.push({
      title:`${CH_LABELS[k]} — $0 spend recorded`,
      desc:'No spend data received from Windsor.ai.',
      action:'Verify campaign status and Windsor.ai connector sync.'
    });
  });
  ['meta','google','tiktok'].forEach(k=>{
    if(ch[k].spend>200&&ch[k].demos===0) F.alerts.push({
      title:`${CH_LABELS[k]} — spend recorded, 0 demos`,
      desc:`${fD(ch[k].spend)} spent with no attributed demos.`,
      action:'Conversion tracking may be misconfigured in Windsor.ai. Check field mapping.'
    });
  });

  // ── 1. CPD per channel ───────────────────────────────────────
  const chArr=[
    {name:'Meta',k:'meta'},{name:'TikTok',k:'tiktok'},
    {name:'Google Ads',k:'google'},{name:'LinkedIn',k:'linkedin'}
  ].map(c=>({...c,
    spend:ch[c.k].spend,demos:ch[c.k].demos,
    pSpend:pch[c.k].spend,pDemos:pch[c.k].demos,
    cpd:ch[c.k].demos>0?ch[c.k].spend/ch[c.k].demos:null,
    pCpd:pch[c.k].demos>0?pch[c.k].spend/pch[c.k].demos:null,
  }));

  // Best vs worst CPD gap (direct-response only)
  const drArr=chArr.filter(c=>c.name!=='LinkedIn'&&c.cpd!==null);
  if(drArr.length>=2){
    const best=drArr.reduce((a,b)=>a.cpd<b.cpd?a:b);
    const worst=drArr.reduce((a,b)=>a.cpd>b.cpd?a:b);
    const gap=((worst.cpd-best.cpd)/best.cpd)*100;
    if(gap>40){
      const addDemos=Math.round(worst.spend*0.2/best.cpd);
      F.opportunities.push({
        title:`CPD Efficiency Gap — ${best.name} is ${gap.toFixed(0)}% cheaper than ${worst.name}`,
        desc:`${best.name} ${fD(best.cpd)}/demo vs ${worst.name} ${fD(worst.cpd)}/demo.`,
        action:`Shifting 20% of ${worst.name} budget (${fD(worst.spend*0.2)}) to ${best.name} could yield ~${addDemos} additional demos.`
      });
    }
  }

  // CPD trend + absolute thresholds per channel
  chArr.filter(c=>c.name!=='LinkedIn').forEach(c=>{
    if(c.cpd===null) return;
    if(c.cpd>500) F.alerts.push({
      title:`High CPD — ${c.name} at ${fD(c.cpd)}/demo`,
      desc:'Above $500 direct-response threshold.',
      action:'Review targeting and creative mix immediately.'
    });
    if(c.pCpd!==null){
      const d2=chg(c.cpd,c.pCpd);
      if(d2>25) F.weaknesses.push({
        title:`CPD Spike — ${c.name}: ${fD(c.pCpd)} → ${fD(c.cpd)}/demo`,
        desc:`${ar(d2)}${ab(d2)}% increase vs prior period.`,
        action:'Investigate creative fatigue, audience saturation, or bid drift.'
      });
      else if(d2<-20) F.wins.push({
        title:`CPD Improving — ${c.name}: ${fD(c.pCpd)} → ${fD(c.cpd)}/demo`,
        desc:`${ar(d2)}${ab(d2)}% more efficient vs prior period.`,action:''
      });
    }
  });

  // LinkedIn CPD
  const li=chArr.find(c=>c.name==='LinkedIn');
  if(li&&li.cpd!==null){
    if(li.cpd>600) F.alerts.push({
      title:`LinkedIn CPD Critical — ${fD(li.cpd)}/demo`,
      desc:`Spending ${fD(li.spend)} for ${Math.round(li.demos)} demos.`,
      action:'Audit audience targeting, bid strategy, creative format. Test document ads and thought-leadership content.'
    });
    else if(li.cpd>400) F.weaknesses.push({
      title:`LinkedIn CPD High — ${fD(li.cpd)}/demo`,
      desc:'B2B SaaS benchmark is $200–350/demo.',
      action:'Layer targeting: job title + company size + seniority. Exclude companies <10 employees.'
    });
    if(li.pCpd!==null){
      const d2=chg(li.cpd,li.pCpd);
      if(d2>20) F.weaknesses.push({
        title:`LinkedIn Efficiency Declining — ${ar(d2)}${ab(d2)}% (${fD(li.pCpd)} → ${fD(li.cpd)})`,
        desc:'Cost per demo rising month over month.',
        action:'Check audience overlap across campaigns. Review creative frequency cap. Rotate audience lists.'
      });
    }
  }

  // ── 2. Spend concentration ───────────────────────────────────
  const totalSpend=chArr.reduce((s,c)=>s+c.spend,0);
  chArr.forEach(c=>{
    const s=pct(c.spend,totalSpend);
    if(s!==null&&s>55) F.weaknesses.push({
      title:`Channel Concentration — ${c.name} is ${fP(s)} of budget`,
      desc:`${fD(c.spend)} of ${fD(totalSpend)} total spend on one channel.`,
      action:'Single-channel dependency. A policy change or CPM spike would collapse pipeline. Diversify spend.'
    });
  });

  // ── 3. Funnel leakage ────────────────────────────────────────
  const clickRate=pct(ga.demoButtonClicks,ga.users);
  const bookRate=pct(ga.meetingBooked,ga.demoButtonClicks);
  const cvr=pct(ga.meetingBooked,ga.users);
  const pCvr=pct(pga.meetingBooked,pga.users);

  if(clickRate!==null){
    if(clickRate<3) F.weaknesses.push({
      title:`Low Visitor-to-CTA Rate — ${fP(clickRate)} of visitors click the demo button`,
      desc:`Only ${Math.round(ga.demoButtonClicks).toLocaleString()} clicks from ${Math.round(ga.users).toLocaleString()} visitors.`,
      action:'Test above-the-fold headline clarity, CTA button placement, and page load speed. Target: 5%+.'
    });
    else if(clickRate>6) F.wins.push({
      title:`Strong CTA Click Rate — ${fP(clickRate)} visitor-to-CTA`,
      desc:'Page messaging is resonating with incoming traffic quality.',action:''
    });
  }
  if(bookRate!==null){
    if(bookRate<5) F.alerts.push({
      title:`Critical Booking Drop-Off — only ${fP(bookRate)} of CTA clicks book`,
      desc:`Losing ~${Math.round(ga.demoButtonClicks*(1-bookRate/100))} potential bookings at the scheduling step.`,
      action:'Test: embed Calendly inline vs redirect, reduce required fields, show next available slot immediately.'
    });
    else if(bookRate<15) F.weaknesses.push({
      title:`Booking Friction — ${fP(bookRate)} click-to-book`,
      desc:`~${Math.round(ga.demoButtonClicks*(1-bookRate/100))} clicks not converting to booked demos.`,
      action:'A/B test scheduling page: urgency copy, social proof, fewer required fields.'
    });
    else if(bookRate>25) F.wins.push({
      title:`High Booking Conversion — ${fP(bookRate)} of CTA clicks book`,
      desc:'Scheduling experience is working well. Protect this step.',action:''
    });
  }
  if(cvr!==null&&pCvr!==null){
    const d2=chg(cvr,pCvr);
    if(d2<-15) F.alerts.push({
      title:`Website CVR Declining — ${fP(pCvr,2)} → ${fP(cvr,2)}`,
      desc:`${ar(d2)}${ab(d2)}% vs prior period.`,
      action:'Could be: traffic quality drop, landing page regression, or scheduling tool issue. Segment by source to isolate.'
    });
    else if(d2>15) F.wins.push({
      title:`CVR Improving — ${fP(pCvr,2)} → ${fP(cvr,2)}`,
      desc:`${ar(d2)}${ab(d2)}% vs prior period. Landing page or traffic quality improving.`,action:''
    });
  }

  // ── 4. Pipeline health ───────────────────────────────────────
  const {demosToOccur,demosHappened,dealsWon,closedDeals,notQualAfterDemo,disqualifiedBeforeDemo,tooEarly}=pp;
  const {demosToOccur:pDTO,demosHappened:pDH,dealsWon:pDW,closedDeals:pCD,disqualifiedBeforeDemo:pDqB,notQualAfterDemo:pNQA}=ppp;

  const showRate=pct(demosHappened,demosToOccur);
  if(showRate!==null){
    if(showRate<60) F.alerts.push({
      title:`Critical Show Rate — only ${fP(showRate)} of booked demos happen`,
      desc:`${demosToOccur-demosHappened} no-shows or cancellations (${demosHappened}/${demosToOccur}).`,
      action:'Add: 24hr + 1hr SMS reminder, confirmation email with prep materials, AE personal outreach day-of.'
    });
    else if(showRate<78) F.weaknesses.push({
      title:`Show Rate Below Target — ${fP(showRate)} (target: 80%+)`,
      desc:`${demosHappened}/${demosToOccur} demos occurring.`,
      action:'Review reminder sequence timing. Add a 2hr pre-demo email with 3 questions to answer before the call.'
    });
    else F.wins.push({
      title:`Solid Show Rate — ${fP(showRate)} of booked demos happen`,
      desc:`${demosHappened}/${demosToOccur} demos occurring. Reminder sequence is working.`,action:''
    });
  }

  const dqBR=pct(disqualifiedBeforeDemo,demosToOccur);
  const pDqBR=pct(pDqB,pDTO);
  if(dqBR!==null){
    if(dqBR>25) F.alerts.push({
      title:`High Pre-Demo Disqualification — ${fP(dqBR)} cancelled before demo`,
      desc:`${disqualifiedBeforeDemo}/${demosToOccur} deals disqualified before occurring.`,
      action:'Add ICP filters to booking form: "How long has your brand been selling?" and "Monthly ad spend?" Disqualify pre-launch brands at scheduling, not after.'
    });
    else if(dqBR>12) F.weaknesses.push({
      title:`Pre-Demo Disq Elevated — ${disqualifiedBeforeDemo} cancelled (${fP(dqBR)})`,
      desc:'Leads aren\'t passing intake review.',
      action:'Add 1–2 qualifying questions to Calendly page. Review recent disq reasons for patterns.'
    });
  }
  if(dqBR!==null&&pDqBR!==null){
    const d2=chg(dqBR,pDqBR);
    if(d2>30) F.weaknesses.push({
      title:`Pre-Demo Disq Worsening — ${fP(pDqBR)} → ${fP(dqBR)}`,
      desc:`${ar(d2)}${ab(d2)}% change vs prior period.`,
      action:'Targeting may be drifting toward unqualified audiences. Cross-reference campaign launches with disq spike timing.'
    });
  }

  const dqAR=pct(notQualAfterDemo,demosHappened);
  if(dqAR!==null&&dqAR>25) F.weaknesses.push({
    title:`High Post-Demo Disqualification — ${fP(dqAR)} of demos result in "Not Qualified"`,
    desc:`${notQualAfterDemo}/${demosHappened} demos not converting.`,
    action:'Discovery questions aren\'t surfacing disqualifiers early. Add a pre-demo questionnaire. Review top disq reasons with sales weekly.'
  });

  if(tooEarly>0){
    const ter=pct(tooEarly,demosHappened);
    const estFW=Math.round(tooEarly*(closedDeals/Math.max(demosHappened,1)));
    if(ter!==null&&ter>15) F.opportunities.push({
      title:`Large Nurture Pipeline — ${tooEarly} deals marked "Too Early" (${fP(ter)})`,
      desc:`At current close rates, ~${estFW} of these could close with proper follow-up.`,
      action:'Add all to 30/60/90-day email sequence immediately. This is warm, paid-for pipeline being abandoned.'
    });
    else F.opportunities.push({
      title:`Nurture Pipeline — ${tooEarly} deals marked "Too Early"`,
      desc:'Warm prospects who need more time before closing.',
      action:'Ensure all have follow-up tasks at 30 and 60 days. Don\'t let warm pipeline go cold.'
    });
  }

  const closeRate=pct(closedDeals,demosHappened);
  const pCloseRate=pct(pCD,pDH);
  if(closeRate!==null){
    if(closeRate<10) F.weaknesses.push({
      title:`Low Close Rate — ${fP(closeRate)} demo-to-close`,
      desc:`${closedDeals}/${demosHappened} demos converting to closed won.`,
      action:'Review: proposals sent same-day? Urgency/deadline present? Analyze objection patterns. Add a follow-up call 48hrs post-demo.'
    });
    else if(closeRate>20) F.wins.push({
      title:`Strong Close Rate — ${fP(closeRate)} demo-to-close`,
      desc:`${closedDeals}/${demosHappened} demos closing. Sales team converting well.`,action:''
    });
    if(pCloseRate!==null){
      const d2=chg(closeRate,pCloseRate);
      if(d2<-20) F.weaknesses.push({
        title:`Close Rate Declining — ${fP(pCloseRate)} → ${fP(closeRate)}`,
        desc:`${ar(d2)}${ab(d2)}% vs prior period.`,
        action:'Check: pricing pushback, proposal quality, follow-up speed post-demo.'
      });
      else if(d2>20) F.wins.push({
        title:`Close Rate Improving — ${fP(pCloseRate)} → ${fP(closeRate)}`,
        desc:`${ar(d2)}${ab(d2)}% vs prior period. Sales execution improving.`,action:''
      });
    }
  }

  // ── 5. Revenue velocity ──────────────────────────────────────
  const mrrPD=demosHappened>0?d.newMRR/demosHappened:null;
  const pMrrPD=pDH>0?p.newMRR/pDH:null;
  if(mrrPD!==null&&pMrrPD!==null){
    const d2=chg(mrrPD,pMrrPD);
    if(d2<-20) F.weaknesses.push({
      title:`Deal Size Shrinking — MRR/demo ${fD(pMrrPD)} → ${fD(mrrPD)}`,
      desc:`${ar(d2)}${ab(d2)}% decline in average deal value.`,
      action:'Targeting changes may be pulling in smaller companies. Review new traffic sources and audience composition.'
    });
    else if(d2>20) F.wins.push({
      title:`Deal Size Growing — MRR/demo ${fD(pMrrPD)} → ${fD(mrrPD)}`,
      desc:`${ar(d2)}${ab(d2)}% larger deals closing. Larger accounts in pipeline.`,action:''
    });
  }
  if(d.newMRR>0&&p.newMRR>0){
    const d2=chg(d.newMRR,p.newMRR);
    if(d2>20) F.wins.push({
      title:`Strong MRR Growth — ${fD(d.newMRR)} vs ${fD(p.newMRR)} prior`,
      desc:`${ar(d2)}${ab(d2)}% revenue growth period over period.`,action:''
    });
    else if(d2<-15) F.alerts.push({
      title:`MRR Declining — ${fD(d.newMRR)} vs ${fD(p.newMRR)} prior period`,
      desc:`${ar(d2)}${ab(d2)}% revenue drop.`,
      action:'Diagnose: is pipeline volume, close rate, or deal size declining? Each has a different fix.'
    });
  }

  // ── 6. Meta creative health ──────────────────────────────────
  if(ch.meta.ctrAvg!=null){
    const ctr=ch.meta.ctrAvg;
    const pCtr=pch.meta.ctrAvg;
    if(ctr<0.008) F.weaknesses.push({
      title:`Meta CTR Low — ${(ctr*100).toFixed(2)}%`,
      desc:'Below 0.8% average CTR signals creative fatigue or audience mismatch.',
      action:'Refresh top 3 highest-spend creatives. Test UGC-style vs polished. Try new hook angles: pain-point vs aspirational outcome.'
    });
    else if(ctr>0.018) F.wins.push({
      title:`Strong Meta CTR — ${(ctr*100).toFixed(2)}%`,
      desc:'Creative is resonating. Scale top performers before fatigue sets in.',action:''
    });
    if(pCtr!=null){
      const d2=chg(ctr,pCtr);
      if(d2<-20) F.weaknesses.push({
        title:`Meta CTR Declining — ${(pCtr*100).toFixed(2)}% → ${(ctr*100).toFixed(2)}%`,
        desc:`${ar(d2)}${ab(d2)}% drop. Audience has seen your ads too many times.`,
        action:'Rotate creative immediately. TikTok-native style content is converting for wellness brands right now.'
      });
    }
  }

  // ── 7. Pipeline volume trend ─────────────────────────────────
  if(demosToOccur>0&&pDTO>0){
    const d2=chg(demosToOccur,pDTO);
    if(d2>20) F.wins.push({
      title:`Pipeline Growing — ${demosToOccur} demos vs ${pDTO} prior`,
      desc:`${ar(d2)}${ab(d2)}% growth. Demand is accelerating.`,action:''
    });
    else if(d2<-15) F.alerts.push({
      title:`Pipeline Contracting — ${demosToOccur} demos vs ${pDTO} prior`,
      desc:`${ar(d2)}${ab(d2)}% drop in pipeline volume.`,
      action:'Check CPD trend and budget allocation. If spend held steady, efficiency dropped. If spend dropped, budget was cut.'
    });
  }

  // ── 8. YouTube untracked spend ───────────────────────────────
  const ytShare=pct(ch.youtube.spend,totalSpend);
  if(ytShare!==null&&ytShare>8&&ch.youtube.demos===0) F.weaknesses.push({
    title:`YouTube: Untracked ROI — ${fD(ch.youtube.spend)} (${ytShare.toFixed(0)}% of budget)`,
    desc:'0 demos attributed to YouTube in Windsor.ai.',
    action:'YouTube is brand-awareness only here. If brand lift isn\'t being measured, consider reallocating to direct-response channels.'
  });

  // ── 9. Overall CPD trend ─────────────────────────────────────
  const drS=ch.meta.spend+ch.tiktok.spend+ch.google.spend;
  const drD=ch.meta.demos+ch.tiktok.demos+ch.google.demos;
  const pDrS=pch.meta.spend+pch.tiktok.spend+pch.google.spend;
  const pDrD=pch.meta.demos+pch.tiktok.demos+pch.google.demos;
  const oCPD=drD>0?drS/drD:null, pOCPD=pDrD>0?pDrS/pDrD:null;
  if(oCPD!==null&&pOCPD!==null){
    const d2=chg(oCPD,pOCPD);
    if(d2>20) F.weaknesses.push({
      title:`Overall CPD Rising — ${fD(pOCPD)} → ${fD(oCPD)}/demo`,
      desc:`${ar(d2)}${ab(d2)}% worse vs prior period. Across-the-board efficiency loss.`,
      action:'Likely causes: creative fatigue, seasonal CPM increase, or audience exhaustion. Check top-spend ad frequency.'
    });
    else if(d2<-15) F.wins.push({
      title:`Overall CPD Improving — ${fD(pOCPD)} → ${fD(oCPD)}/demo`,
      desc:`${ar(d2)}${ab(d2)}% better vs prior period. Media efficiency gaining across all channels.`,action:''
    });
  }

  return F;
}

// ── Render Intelligence HTML ────────────────────────────────────
function renderIntelligence(F, prevLabel) {
  const CATS=[
    {key:'alerts',       label:'🚨  Alerts — Requires Immediate Attention', cls:'intel-cat-alert', icon:'🚨', pillCls:'isp-alert', pillLabel:'Alerts'},
    {key:'weaknesses',   label:'⚠️  Weaknesses — Underperformance to Address', cls:'intel-cat-weak', icon:'⚠️', pillCls:'isp-weak', pillLabel:'Weaknesses'},
    {key:'opportunities',label:'🎯  Opportunities — Actionable Upside',        cls:'intel-cat-opp',  icon:'🎯', pillCls:'isp-opp',  pillLabel:'Opportunities'},
    {key:'wins',         label:'✅  Wins — What\'s Working',                   cls:'intel-cat-win',  icon:'✅', pillCls:'isp-win',  pillLabel:'Wins'},
  ];
  const total=CATS.reduce((s,c)=>s+F[c.key].length,0);
  if(total===0) return '<div class="intel-empty">No significant signals detected. All metrics within normal ranges.</div>';

  const pillsHTML=CATS.filter(c=>F[c.key].length>0).map(c=>`
    <div class="intel-summary-pill ${c.pillCls}">
      <span class="isp-count">${F[c.key].length}</span>
      <span>${c.icon} ${c.pillLabel}</span>
    </div>`).join('');

  const catsHTML=CATS.filter(c=>F[c.key].length>0).map(cat=>`
    <div class="intel-category ${cat.cls}">
      <div class="intel-cat-label">${cat.label}</div>
      <div class="intel-cards">
        ${F[cat.key].map(f=>`
          <div class="intel-card">
            <div class="intel-icon">${cat.icon}</div>
            <div>
              <div class="intel-title">${f.title}</div>
              ${f.desc?`<div class="intel-desc">${f.desc}</div>`:''}
              ${f.action?`<div class="intel-action">→ ${f.action}</div>`:''}
            </div>
          </div>`).join('')}
      </div>
    </div>`).join('');

  return `<div class="intel-summary-bar">${pillsHTML}</div>${catsHTML}`;
}

// ── Build panel ────────────────────────────────────────────────
function buildPanel(key, d) {
  const noPrev = !!d.noPrev;
  const ch=d.channels, ga=d.ga4, pp=d.pipeline;
  const p=d.prev, pch=p.channels, pga=p.ga4, ppp=p.pipeline;
  const prevLabel= noPrev ? '' : (d.prevLabel||'prior period');
  const vsLabel  = noPrev ? '' : `vs ${prevLabel}`;

  // Local wrappers: suppress deltas when noPrev (YTD)
  const db = noPrev ? () => '' : (a, b, opts) => deltaBadge(a, b, opts);
  const sd = noPrev ? () => '' : (a, b, opts) => scDelta(a, b, opts);

  // Direct-response spend/demos (excl LI + YT)
  const drSpend=ch.meta.spend+ch.google.spend+ch.tiktok.spend;
  const drDemos=ch.meta.demos+ch.google.demos+ch.tiktok.demos;
  const pdrSpend=pch.meta.spend+pch.google.spend+pch.tiktok.spend;
  const pdrDemos=pch.meta.demos+pch.google.demos+pch.tiktok.demos;

  // All-channel totals (all 5 channels)
  const chKeys=['meta','linkedin','google','tiktok','youtube'];
  const allSpend=chKeys.reduce((s,k)=>s+ch[k].spend,0);
  const allDemos=chKeys.reduce((s,k)=>s+ch[k].demos,0);
  const pallSpend=chKeys.reduce((s,k)=>s+pch[k].spend,0);
  const pallDemos=chKeys.reduce((s,k)=>s+pch[k].demos,0);

  // Demos % Paid Source: paid ad demos (all 5 channels) / total HubSpot demos booked
  const paidDemos   = (ch.meta.demos||0)+(ch.google.demos||0)+(ch.tiktok.demos||0)+(ch.youtube.demos||0)+(ch.linkedin.demos||0);
  const ppaidDemos  = (pch.meta.demos||0)+(pch.google.demos||0)+(pch.tiktok.demos||0)+(pch.youtube.demos||0)+(pch.linkedin.demos||0);
  const paidSrcPct  = d.demosBooked > 0 ? (paidDemos  / d.demosBooked  * 100) : null;
  const ppaidSrcPct = p.demosBooked > 0 ? (ppaidDemos / p.demosBooked  * 100) : null;
  const paidSrcStr  = paidSrcPct  !== null ? paidSrcPct.toFixed(1)  + '%' : '—';

  // Intelligence
  const intelHTML=renderIntelligence(buildIntelligence(d,p), prevLabel);

  // Dark stat cards with sparklines + pacing bar on spend card
  // Build simple 3-window sparkline points: yesterday → rolling7 → mtd (per-day spend)
  const sparkWins = ['yesterday','rolling7','mtd'];
  const allChKeys = ['meta','linkedin','google','tiktok','youtube'];
  const spendPts  = sparkWins.map(w => {
    const sw = DATA.windows[w];
    if (!sw) return 0;
    const days = w === 'yesterday' ? 1 : w === 'rolling7' ? 7 : (new Date().getDate() - 1 || 1);
    const s = allChKeys.reduce((sum,k)=>sum+(sw.channels?.[k]?.spend||0),0);
    return s / days;
  });
  const mrrPts   = sparkWins.map(w => DATA.windows[w]?.newMRR || 0);
  const cpdPts   = sparkWins.map(w => {
    const sw = DATA.windows[w];
    if (!sw) return 0;
    const s = allChKeys.reduce((sum,k)=>sum+(sw.channels?.[k]?.spend||0),0);
    const demos = allChKeys.reduce((sum,k)=>sum+(sw.channels?.[k]?.demos||0),0);
    return demos > 0 ? s / demos : 0;
  });
  const dealsPts = sparkWins.map(w => DATA.windows[w]?.pipeline?.closedDeals || 0);


  // Pacing: days through month
  const today = new Date();
  const daysInMonth = new Date(today.getFullYear(), today.getMonth()+1, 0).getDate();
  const dayOfMonth  = today.getDate() - 1; // completed days (yesterday)
  const pacingPct   = (dayOfMonth / daysInMonth) * 100;
  const totalBudget = Object.values(getBudgetsForMonth(d.from)).reduce((s,v)=>s+v,0);
  const MONTHLY_BUDGETS_THIS = getBudgetsForMonth(d.from);
  const drBudget    = MONTHLY_BUDGETS_THIS.meta + MONTHLY_BUDGETS_THIS.google + MONTHLY_BUDGETS_THIS.tiktok;
  const totalMTDSpend = Object.keys(MONTHLY_BUDGETS_THIS).reduce((s,k) => s + (ch[k]?.spend||0), 0);

  const statHTML=`
    <div class="stat-row">
      <div class="stat-card" style="position:relative;overflow:hidden">
        <div class="sc-label">Closed Deals</div>
        <div class="sc-value">${fmtN(pp.closedDeals)}</div>
        <div class="sc-sub">Closed won this period</div>
        ${sd(pp.closedDeals, ppp.closedDeals)}
        ${buildSparkline(dealsPts)}
      </div>
      <div class="stat-card" style="position:relative;overflow:hidden">
        <div class="sc-label">New MRR</div>
        <div class="sc-value">${fmt$(d.newMRR)}</div>
        <div class="sc-sub">Closed won this period</div>
        <div style="font-size:11px;color:rgba(114,164,191,0.85);margin-top:2px;font-weight:600">${d.newMRR > 0 ? fmt$(d.newMRR * 12) + ' ARR Generated' : ''}</div>
        ${sd(d.newMRR, p.newMRR)}
        ${buildSparkline(mrrPts)}
      </div>
      <div class="stat-card" style="position:relative;overflow:hidden">
        <div class="sc-label">Total Ad Spend</div>
        <div class="sc-value">${fmt$(allSpend)}</div>
        <div class="sc-sub">All 5 channels</div>
        ${sd(allSpend, pallSpend, {invert:true})}
        ${key !== 'ytd' ? buildPacingBar(allSpend, totalBudget, key === 'lastmonth' ? 100 : pacingPct) : ''}
        ${key === 'mtd' ? buildSparkline(spendPts) : ''}
      </div>
      <div class="stat-card" style="position:relative;overflow:hidden">
        <div class="sc-label">Blended CPD</div>
        <div class="sc-value">${cpd$(allSpend,allDemos)}</div>
        <div class="sc-sub">All 5 channels</div>
        ${sd(cpdNum(allSpend,allDemos)||0, cpdNum(pallSpend,pallDemos)||0, {invert:true})}
        ${buildSparkline(cpdPts)}
      </div>
    </div>`;

  // ── Website Funnel (3 nodes + arrows) ──────────────────────────────────────
  const wfVisitors   = Math.round(ga.users);
  const wfClicks     = Math.round(ga.demoButtonClicks);
  const wfBooked     = d.demosBooked;
  const pwfVisitors  = Math.round(pga.users);
  const pwfClicks    = Math.round(pga.demoButtonClicks);
  const pwfBooked    = p.demosBooked;

  const wfClickRate  = wfVisitors  > 0 ? (wfClicks  / wfVisitors  * 100).toFixed(2) + '%' : 'N/A';
  const wfBookRate   = wfClicks    > 0 ? (wfBooked  / wfClicks    * 100).toFixed(2) + '%' : 'N/A';
  const wfCVR        = wfVisitors  > 0 ? (wfBooked  / wfVisitors  * 100).toFixed(2) + '%' : 'N/A';

  // Previous-period rates (numeric) for delta badges on funnel conversion rates
  const wfClickRateN = wfVisitors  > 0 ? (wfClicks / wfVisitors * 100) : 0;
  const wfBookRateN  = wfClicks    > 0 ? (wfBooked / wfClicks   * 100) : 0;
  const wfCVRN       = wfVisitors  > 0 ? (wfBooked / wfVisitors * 100) : 0;
  const pwfClickRateN= pwfVisitors > 0 ? (pwfClicks / pwfVisitors * 100) : 0;
  const pwfBookRateN = pwfClicks   > 0 ? (pwfBooked / pwfClicks   * 100) : 0;
  const pwfCVRN      = pwfVisitors > 0 ? (pwfBooked / pwfVisitors * 100) : 0;

  const wfArrow = `<div class="wf-arrow"><div class="wf-arrow-icon">➜</div></div>`;
  const wfFunnelHTML = `
    <div class="wf-wrap">
      <div class="wf-node">
        <div class="wf-label">Website Visitors</div>
        <div class="wf-value">${fmtN(wfVisitors)}</div>
        <div><span class="wf-rate">${wfClickRate}<span class="wf-rate-lbl">click demo btn</span></span> ${db(wfClickRateN, pwfClickRateN)}</div>
        ${db(wfVisitors, pwfVisitors)}
      </div>
      ${wfArrow}
      <div class="wf-node">
        <div class="wf-label">Demo Button Clicks</div>
        <div class="wf-value">${fmtN(wfClicks)}</div>
        <div><span class="wf-rate">${wfBookRate}<span class="wf-rate-lbl">actually book</span></span> ${db(wfBookRateN, pwfBookRateN)}</div>
        ${db(wfClicks, pwfClicks)}
      </div>
      ${wfArrow}
      <div class="wf-node">
        <div class="wf-label">Demos Booked</div>
        <div class="wf-value">${fmtN(wfBooked)}</div>
        <div><span class="wf-rate">${wfCVR}<span class="wf-rate-lbl">website CVR</span></span> ${db(wfCVRN, pwfCVRN)}</div>
        ${db(wfBooked, pwfBooked)}
      </div>
    </div>`;

  // Show Rate — compute and style
  const showRateVal = pp.demosToOccur > 0 ? (pp.demosHappened / pp.demosToOccur * 100) : null;
  const pShowRateVal= ppp.demosToOccur > 0 ? (ppp.demosHappened / ppp.demosToOccur * 100) : null;
  const showRateCls = showRateVal === null ? 'kpi-show-rate-good' : showRateVal < 60 ? 'kpi-show-rate-danger' : showRateVal < 78 ? 'kpi-show-rate-warn' : 'kpi-show-rate-good';
  const showRateStatus = showRateVal === null ? '' : showRateVal < 60 ? '🚨 Critical — add 24hr + 1hr SMS reminders immediately' : showRateVal < 78 ? '⚠️ Below 80% target — review reminder sequence timing' : '✅ On target — reminder sequence is working';
  const srBarColor = showRateVal === null ? '#BBF7D0' : showRateVal < 60 ? '#EF4444' : showRateVal < 78 ? '#F59E0B' : '#22C55E';
  const srBarBg    = showRateVal === null ? 'rgba(0,0,0,0.06)' : showRateVal < 60 ? 'rgba(239,68,68,0.15)' : showRateVal < 78 ? 'rgba(245,158,11,0.15)' : 'rgba(34,197,94,0.15)';

  const showRateHTML = showRateVal !== null ? `
    <div class="kpi kpi-show-rate ${showRateCls}" style="grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;gap:32px;padding:22px 28px;border-radius:14px">
      <div style="flex:1;min-width:0">
        <div class="sr-label" style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:6px">Demo Show Rate</div>
        <div style="display:flex;align-items:baseline;gap:16px;flex-wrap:wrap">
          <div class="sr-value" style="font-size:40px;font-weight:700;line-height:1;font-family:'Libre Baskerville',Georgia,serif">${showRateVal.toFixed(1)}%</div>
          <div class="sr-count" style="font-size:14px;font-weight:400">${pp.demosHappened} of ${pp.demosToOccur} demos occurred</div>
        </div>
        <div class="sr-status" style="font-size:12px;margin-top:8px;font-weight:600">${showRateStatus}</div>
      </div>
      <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:flex-end;gap:8px">
        ${pShowRateVal ? db(showRateVal, pShowRateVal) : ''}
        <div>
          <div class="sr-target" style="font-size:10px;text-align:right;margin-bottom:5px;font-weight:600">Target: 80%+</div>
          <div style="width:180px;height:8px;background:${srBarBg};border-radius:4px;overflow:hidden;position:relative">
            <div style="height:100%;border-radius:4px;width:${Math.min(showRateVal,100).toFixed(1)}%;background:${srBarColor};transition:width 0.8s ease"></div>
            <div style="position:absolute;top:0;left:80%;width:2px;height:100%;background:currentColor;opacity:0.3"></div>
          </div>
          <div style="display:flex;justify-content:space-between;width:180px;margin-top:4px">
            <span class="sr-target" style="font-size:9px">0%</span>
            <span class="sr-target" style="font-size:9px">80%</span>
            <span class="sr-target" style="font-size:9px">100%</span>
          </div>
        </div>
      </div>
    </div>` : '';

  // Qual. Demo Given % — qualified demos (happened minus tooEarly and notQualAfterDemo) / demosHappened
  const qualDemoGiven = pp.demosToOccur > 0 ? ((pp.demosHappened - (pp.tooEarly||0) - (pp.notQualAfterDemo||0)) / pp.demosToOccur * 100) : null;
  const pQualDemoGiven = ppp.demosToOccur > 0 ? ((ppp.demosHappened - (ppp.tooEarly||0) - (ppp.notQualAfterDemo||0)) / ppp.demosToOccur * 100) : null;
  const qualDemoStr = qualDemoGiven !== null ? qualDemoGiven.toFixed(1) + '%' : '—';

  // Avg Deal Cycle Time
  const avgCycleDays = pp.avgDealCycleDays;
  const pAvgCycleDays = ppp.avgDealCycleDays;
  const avgCycleStr = avgCycleDays !== null ? avgCycleDays + ' days' : '—';

  // KPIs with delta badges
  const qualNumer = pp.demosHappened - (pp.tooEarly||0) - (pp.notQualAfterDemo||0);
  const closeDenom = pp.demosHappened - (pp.notQualAfterDemo||0);
  const kpis=[
    {label:'Demos % Paid Source', value:paidSrcStr,                      sub:`${fmtN(paidDemos)} paid ÷ ${fmtN(d.demosBooked)} booked`, cls:'kpi-navy',
      delta: paidSrcPct !== null ? db(paidSrcPct, ppaidSrcPct) : ''},
    {label:'Meta CTR',           value:d.metaCTR||'N/A',                sub:'Avg across campaigns',          cls:'',
      delta: db(parsePct(d.metaCTR)||0, parsePct(p.metaCTR)||0)},
    {label:'Qual. Demo Given %', value:qualDemoStr,                      sub:`${fmtN(qualNumer)} qual ÷ ${fmtN(pp.demosToOccur)} scheduled`, cls:'kpi-good',
      delta: qualDemoGiven !== null && pQualDemoGiven !== null ? db(qualDemoGiven, pQualDemoGiven) : ''},
    {label:'Avg Deal Cycle',     value:avgCycleStr,                      sub:`${fmtN(pp.closedDeals)} closed deals avg`, cls:'',
      delta: avgCycleDays !== null && pAvgCycleDays !== null ? db(avgCycleDays, pAvgCycleDays, {invert:true}) : ''},
    {label:'Close Rate',         value:pp.pctDemosWon,                  sub:`${fmtN(pp.closedDeals)} won ÷ ${fmtN(closeDenom)} qual demos`,      cls:'kpi-good',
      delta: db(parsePct(pp.pctDemosWon)||0, parsePct(ppp.pctDemosWon)||0)},
  ];
  const kpiHTML=kpis.map(k=>`
    <div class="kpi ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${k.delta}
    </div>`).join('') + showRateHTML;

  // Spend donut + bars
  const drKeys=['meta','google','tiktok'];
  const spendSlices=chKeys.map(k=>({label:CH_LABELS[k],value:ch[k].spend,color:CH_COLORS[k]})).filter(s=>s.value>0);
  const donutSVG=buildDonut(spendSlices);
  const legendHTML=spendSlices.map(s=>`
    <div class="leg-item">
      <div class="leg-dot" style="background:${s.color}"></div>
      <div class="leg-name">${s.label}</div>
      <div class="leg-pct">${fmtP(s.value,allSpend)}</div>
    </div>`).join('');

  const sorted=chKeys.map(k=>({key:k,...ch[k]})).sort((a,b)=>b.spend-a.spend);
  const maxSpend=sorted[0]?.spend||1;
  const spendSummaryHTML=`
    <div class="spend-summary">
      <div class="ss-item">
        <div class="ss-label">Total Spend</div>
        <div class="ss-value">${fmt$(allSpend)}</div>
        <div class="ss-sub">All Channels</div>
        ${sd(allSpend, pallSpend, {invert:true})}
      </div>
      <div class="ss-item">
        <div class="ss-label">Avg CPD</div>
        <div class="ss-value">${cpd$(allSpend,allDemos)}</div>
        <div class="ss-sub">All Channels</div>
        ${sd(cpdNum(allSpend,allDemos)||0, cpdNum(pallSpend,pallDemos)||0, {invert:true})}
      </div>
      <div class="ss-item">
        <div class="ss-label">Total Demos</div>
        <div class="ss-value">${fmtN(allDemos)}</div>
        <div class="ss-sub">All Channels</div>
        ${sd(allDemos, pallDemos)}
      </div>
    </div>
    <div class="spend-summary" style="border-top:1px solid #D4E6EF;padding-top:12px;">
      <div class="ss-item">
        <div class="ss-label">Total Spend</div>
        <div class="ss-value">${fmt$(drSpend)}</div>
        <div class="ss-sub">Excl. LinkedIn + YouTube</div>
        ${sd(drSpend, pdrSpend, {invert:true})}
      </div>
      <div class="ss-item">
        <div class="ss-label">Avg CPD</div>
        <div class="ss-value">${cpd$(drSpend,drDemos)}</div>
        <div class="ss-sub">Excl. LinkedIn + YouTube</div>
        ${sd(cpdNum(drSpend,drDemos)||0, cpdNum(pdrSpend,pdrDemos)||0, {invert:true})}
      </div>
      <div class="ss-item">
        <div class="ss-label">Total Demos</div>
        <div class="ss-value">${fmtN(drDemos)}</div>
        <div class="ss-sub">Excl. LinkedIn + YouTube</div>
        ${sd(drDemos, pdrDemos)}
      </div>
    </div>`;
  const barsHTML=sorted.map(c=>`
    <div class="bar-row">
      <div class="bar-name">${CH_ICONS[c.key]} ${CH_LABELS[c.key]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c.spend/maxSpend*100).toFixed(1)}%;background:${CH_COLORS[c.key]}"></div></div>
      <div class="bar-val">${fmt$(c.spend)}</div>
    </div>`).join('');

  // CPD table — with % of total booked demos attribution
  const cpdRows=sorted.map(c=>{
    const pk  = pch[c.key] || { spend:0, demos:0 };
    const v   = cpdNum(c.spend, c.demos);
    const pv  = cpdNum(pk.spend, pk.demos);
    const badge = v===null ? '<span class="badge badge-na">N/A</span>'
                : v>600    ? `<span class="badge badge-warn">${fmt$(v)}</span>`
                :             `<span class="badge badge-good">${fmt$(v)}</span>`;
    const dbVal = (v!==null && pv!==null)
      ? db(v, pv, {invert:true})
      : '<span style="color:#c0c8d0;font-size:10px">—</span>';
    const pctBooked = d.demosBooked > 0 && c.demos > 0
      ? `<span style="font-size:11px;color:var(--soft-teal);font-weight:700">${(c.demos/d.demosBooked*100).toFixed(0)}%</span>`
      : '<span style="color:#c0c8d0;font-size:10px">—</span>';
    return `<tr>
      <td>${CH_ICONS[c.key]} ${CH_LABELS[c.key]}</td>
      <td>${fmt$(c.spend)}</td>
      <td>${fmtN(c.demos)}</td>
      <td style="text-align:center">${pctBooked}</td>
      <td>${badge}</td>
      <td style="white-space:nowrap">${dbVal}</td>
    </tr>`;
  }).join('');

  // Funnel — each step uses its own correct HubSpot date field
  const fSteps=[
    {name:'Website Visitors',  val:Math.round(ga.users),             prev:Math.round(pga.users),              color:'#9bbfd4'},
    {name:'Clicked Demo',      val:Math.round(ga.demoButtonClicks),  prev:Math.round(pga.demoButtonClicks),   color:'#72A4BF'},
    {name:'Demos Booked',      val:d.demosBooked,                    prev:p.demosBooked,                      color:'#4d8aaa'},
    {name:'Demos to Occur',    val:pp.demosToOccur,                  prev:ppp.demosToOccur,                   color:'#2d6a8a'},
    {name:'Demo Happened',     val:pp.demosHappened,                 prev:ppp.demosHappened,                  color:'#1D4053'},
    {name:'Closed Won',        val:pp.closedDeals,                   prev:ppp.closedDeals,                    color:'#172C45'},
  ];
    // Log scale so Website Visitors (10k+) doesn't flatten Demos (5-30) to nothing
  const logScale = v => Math.log10(Math.max(v, 1) + 1);
  const maxLog   = Math.max(...fSteps.map(s => logScale(s.val)), 1);
  const logPct   = v => Math.max((logScale(v) / maxLog) * 100, 8);

  const funnelHTML = '<div class="funnel-scale-note">Bar width uses log scale — labels show exact values</div>'
    + fSteps.map((s,i) => {
    const pct = logPct(s.val);
    const dbVal  = db(s.val, s.prev);
    // Conversion rate TO this step from previous
    const stepCVR = i > 0 && fSteps[i-1].val > 0
      ? (s.val / fSteps[i-1].val * 100).toFixed(1) + '%'
      : null;
    const connectorHTML = i < fSteps.length - 1 ? `
      <div class="funnel-connector" style="display:flex;align-items:center;justify-content:center;gap:8px;padding:3px 0">
        <span style="color:rgba(114,164,191,0.4);font-size:14px">▼</span>
        ${fSteps[i+1] && fSteps[i].val > 0 ? `<span style="font-size:11px;font-weight:700;color:var(--soft-teal);background:rgba(114,164,191,0.10);border-radius:50px;padding:2px 10px;border:1px solid rgba(114,164,191,0.2)">${(fSteps[i+1].val/fSteps[i].val*100).toFixed(1)}% →</span>` : ''}
      </div>` : '';
    return `
      <div class="funnel-step">
        <div class="funnel-name">${s.name}</div>
        <div style="flex:1">
          <div class="funnel-track">
            <div class="funnel-bar" style="width:${pct.toFixed(1)}%;background:${s.color}">
              <span class="funnel-bar-label">${fmtN(s.val)}</span>
            </div>
          </div>
        </div>
        <div class="funnel-cvr-col">
          ${i===0
            ? '<span class="funnel-cvr-val">\u2014</span>'
            : `<span class="funnel-cvr-val">${fmtP(s.val,fSteps[i-1].val)}</span><span class="funnel-cvr-lbl">from prev.</span>`
          }
          ${dbVal}
        </div>
      </div>
      ${connectorHTML}`;
  }).join('');

  // Pipeline — ordered per spec
  const plRows=[
    {name:'Demos Booked',              val:d.demosBooked,              prev:p.demosBooked,              color:'#72A4BF', note:'Meeting Booked list, by createdate'},
    {name:'Demos to Occur',            val:pp.demosToOccur,            prev:ppp.demosToOccur,           color:'#4d8aaa', note:'deals by date_demo_booked'},
    {name:'Disq. Before Demo',         val:pp.disqualifiedBeforeDemo,  prev:ppp.disqualifiedBeforeDemo, color:'#B8860B', invert:true, pctOf:pp.demosToOccur},
    {name:'Rescheduled',               val:pp.rescheduled||0,          prev:ppp.rescheduled||0,         color:'#9b7fd4', invert:true, pctOf:pp.demosToOccur},
    {name:'Canceled',                  val:pp.canceled||0,             prev:ppp.canceled||0,            color:'#d47f7f', invert:true, pctOf:pp.demosToOccur},
    {name:'Qual. Demo Given',          val:(pp.demosHappened||0)-(pp.tooEarly||0)-(pp.notQualAfterDemo||0), prev:(ppp.demosHappened||0)-(ppp.tooEarly||0)-(ppp.notQualAfterDemo||0), color:'#1D4053', pctOf:pp.demosToOccur},
    {name:'Too Early',                 val:pp.tooEarly,                prev:ppp.tooEarly,               color:'#aab8c2', invert:true, pctOf:pp.demosToOccur},
    {name:'Not Qualified After Demo',  val:pp.notQualAfterDemo,        prev:ppp.notQualAfterDemo,       color:'#C0392B', invert:true, pctOf:pp.demosToOccur},
    {name:'Blank',                     val:pp.blankStatus||0,          prev:ppp.blankStatus||0,         color:'#c8d0d8', invert:true, pctOf:pp.demosToOccur},
  ];
  const maxPL2=Math.max(d.demosBooked,1);
  const plHTML=plRows.map(r=>`
    <div class="pl-row">
      <div class="pl-name">${r.name}${r.note?`<span style="display:block;font-size:9px;color:#8a9aaa;font-style:italic">${r.note}</span>`:''}</div>
      <div class="pl-track"><div class="pl-fill" style="width:${Math.min((r.val/maxPL2)*100,100).toFixed(1)}%;background:${r.color}"></div></div>
      <div class="pl-val">${fmtN(r.val)}${r.pctOf>0?`<span style="font-size:10px;font-weight:400;color:#8a9aaa;margin-left:4px">${Math.round(r.val/r.pctOf*100)}%</span>`:''}</div>
      ${db(r.val, r.prev, {invert: !!r.invert})}
    </div>`).join('');

  const dqHTML = ''; // Removed — disq counts + % are shown inline in the pipeline rows above

  // MRR trend sparkline (last 3 windows as proxy bars)
  const mrrWindows = ['yesterday','rolling7','mtd'];
  const mrrTrendBars = mrrWindows.map(w => {
    const val = DATA.windows[w]?.newMRR || 0;
    return { val, label: w === 'yesterday' ? 'Yest' : w === 'rolling7' ? 'L7' : 'MTD' };
  });
  const mrrMax = Math.max(...mrrTrendBars.map(b=>b.val), 1);
  const mrrTrendHTML = mrrMax > 0 ? `
    <div style="margin-top:12px">
      <div style="font-size:10px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:rgba(114,164,191,0.7);margin-bottom:6px">MRR Trend (Daily Avg)</div>
      <div style="display:flex;align-items:flex-end;gap:4px;height:40px">
        ${mrrTrendBars.map((b,i) => {
          const h = Math.max((b.val/mrrMax)*36, 3);
          return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
            <div style="font-size:8px;color:rgba(255,255,255,0.4)">${b.val>0?fmt$(Math.round(b.val/1000))+'k':''}</div>
            <div style="width:100%;height:${h.toFixed(0)}px;border-radius:3px 3px 0 0;background:${i===2?'rgba(114,164,191,0.7)':'rgba(114,164,191,0.3)'}"></div>
            <div style="font-size:8px;color:rgba(255,255,255,0.35)">${b.label}</div>
          </div>`;
        }).join('')}
      </div>
    </div>` : '';

  const html = `
    ${statHTML}

    <div class="sl">Website Funnel ${vsLabel ? `<span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">${vsLabel}</span>` : ''}</div>
    ${wfFunnelHTML}

    <div class="sl">Key Performance Indicators ${vsLabel ? `<span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">${vsLabel}</span>` : ''}</div>
    <div class="kpi-grid">${kpiHTML}</div>

    <div class="sl">Spend &amp; Cost Efficiency</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Ad Spend by Channel</div>
        ${spendSummaryHTML}
        <div class="donut-wrap">${donutSVG}<div class="donut-legend">${legendHTML}</div></div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Cost Per Demo by Channel ${vsLabel ? `<span class="chart-title-meta">${vsLabel}</span>` : ''}</div>
        <table class="cpd-table">
          <thead><tr><th>Channel</th><th>Spend</th><th>Ad Demos</th><th style="text-align:center">% of Booked</th><th>CPD</th><th>${vsLabel || ""}</th></tr></thead>
          <tbody>${cpdRows}</tbody>
          <tfoot><tr style="border-top:2px solid var(--card-border)">
            <td style="font-weight:700;font-size:12px">Total (all channels)</td>
            <td style="font-weight:700">${fmt$(sorted.reduce((s,c)=>s+c.spend,0))}</td>
            <td style="font-weight:700">${fmtN(sorted.reduce((s,c)=>s+c.demos,0))}</td>
            <td style="text-align:center;font-weight:700;font-size:11px;color:var(--soft-teal)">${d.demosBooked>0?Math.round(sorted.reduce((s,c)=>s+c.demos,0)/d.demosBooked*100)+'%':'—'}</td>
            <td style="font-weight:700">${allDemos>0?fmt$(allSpend/allDemos):'N/A'}</td>
            <td style="font-size:11px;color:#8a9aaa;font-style:italic">${fmtN(d.demosBooked)} total booked</td>
          </tr></tfoot>
        </table>
      </div>
    </div>

    ${(key === 'mtd' || key === 'lastmonth') ? `
    <div class="sl">Budget Pacing <span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">${key === 'lastmonth' ? 'Last Month — all channels' : 'Month to Date — all channels'}</span></div>
    <div class="chart-card" style="margin-bottom:32px">
      <div class="chart-title">${key === 'lastmonth' ? 'Last Month' : 'MTD'} Spend vs. Monthly Budget</div>
      ${buildSpendPacingSection(ch, key === 'lastmonth' ? 100 : pacingPct, getBudgetsForMonth(d.from))}
    </div>` : ''}

    ${buildPaidMediaInline(ch, pch, prevLabel, noPrev)}

    <div class="sl">Demo Pipeline</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Conversion Funnel ${vsLabel ? `<span class="chart-title-meta">step-to-step CVR ${vsLabel}</span>` : ''}</div>
        <div class="funnel">${funnelHTML}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Pipeline Breakdown ${vsLabel ? `<span class="chart-title-meta">${vsLabel}</span>` : ''}</div>
        <div class="pl-grid">${plHTML}</div>
        ${dqHTML}
      </div>
    </div>

    <div class="sl">Demo Quality Trend <span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">Qualified vs. Disqualified${(key === 'ytd' || key === 'lastmonth') ? '' : ' across time windows'}</span></div>
    <div class="chart-card" style="margin-bottom:32px">
      <div class="chart-title">Demo Quality${(key === 'ytd' || key === 'lastmonth') ? '' : ' — Yesterday vs Last 7 Days vs MTD'}</div>
      ${buildDemoQualityChart(key)}
    </div>

    <div class="sl">Intelligence Report ${vsLabel ? `<span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">${vsLabel}</span>` : ''}</div>
    <div style="margin-bottom:32px">${intelHTML}</div>
  `;

  return html;
}

// ── Paid Media Inline (for embedding in custom range panel) ────
function buildPaidMediaInline(ch, pch, prevLabel, noPrev) {
  const channels = ['meta','linkedin','google','tiktok','youtube'];
  const chMeta = {
    meta:     { icon: '📘', name: 'Meta / Facebook' },
    linkedin: { icon: '💼', name: 'LinkedIn' },
    google:   { icon: '🔍', name: 'Google Ads' },
    tiktok:   { icon: '🎵', name: 'TikTok' },
    youtube:  { icon: '▶️',  name: 'YouTube' },
  };
  const db = noPrev ? () => '' : (curr, prev, invert=false) => deltaBadge(curr, prev, { invert });

  // Channel detail cards
  const cardsHTML = channels.map(k => {
    const c  = ch[k]  || { spend:0, demos:0, clicks:0, impressions:0, ctrAvg:null };
    const pc = pch[k] || { spend:0, demos:0, clicks:0, impressions:0, ctrAvg:null };
    const cpdV  = cpdNum(c.spend, c.demos);
    const pcpdV = cpdNum(pc.spend, pc.demos);
    const ctr   = c.ctrAvg  != null ? (c.ctrAvg * 100).toFixed(2) + '%' : '—';
    const pctr  = pc.ctrAvg != null ? pc.ctrAvg : null;

    return `
      <div class="pm-card">
        <div class="pm-card-header">
          <span class="pm-card-icon">${chMeta[k].icon}</span>
          <span class="pm-card-name">${chMeta[k].name}</span>
        </div>
        <div class="pm-card-spend">${fmt$(c.spend)}<span style="font-size:12px;font-weight:400;color:#8a9aaa;margin-left:6px">spend</span></div>
        <div class="pm-card-rows">
          <div class="pm-card-row">
            <span class="pm-card-row-label">Demos</span>
            <span class="pm-card-row-val">${fmtN(c.demos)} ${db(c.demos, pc.demos)}</span>
          </div>
          <div class="pm-card-row">
            <span class="pm-card-row-label">CPD</span>
            <span class="pm-card-row-val">${cpdV ? fmt$(cpdV) : '—'} ${cpdV&&pcpdV ? db(cpdV, pcpdV, true) : ''}</span>
          </div>
          <div class="pm-card-row">
            <span class="pm-card-row-label">CTR</span>
            <span class="pm-card-row-val">${ctr} ${c.ctrAvg&&pctr ? db(c.ctrAvg, pctr) : ''}</span>
          </div>
          <div class="pm-card-row">
            <span class="pm-card-row-label">Clicks</span>
            <span class="pm-card-row-val">${fmtN(c.clicks)} ${db(c.clicks, pc.clicks)}</span>
          </div>
          <div class="pm-card-row">
            <span class="pm-card-row-label">Impressions</span>
            <span class="pm-card-row-val">${fmtN(c.impressions)} ${db(c.impressions, pc.impressions)}</span>
          </div>
        </div>
      </div>`;
  }).join('');

  // Summary + Channel efficiency chart
  const totalSpend = channels.reduce((s,k) => s + (ch[k]?.spend||0), 0);
  const totalDemos = channels.reduce((s,k) => s + (ch[k]?.demos||0), 0);
  const pTotalSpend = channels.reduce((s,k) => s + (pch[k]?.spend||0), 0);
  const pTotalDemos = channels.reduce((s,k) => s + (pch[k]?.demos||0), 0);
  const drSpend  = (ch.meta?.spend||0) + (ch.google?.spend||0) + (ch.tiktok?.spend||0);
  const drDemos  = (ch.meta?.demos||0) + (ch.google?.demos||0) + (ch.tiktok?.demos||0);
  const pDrSpend = (pch.meta?.spend||0) + (pch.google?.spend||0) + (pch.tiktok?.spend||0);
  const pDrDemos = (pch.meta?.demos||0) + (pch.google?.demos||0) + (pch.tiktok?.demos||0);

  const summaryHTML = `
    <div class="pm-summary-row">
      <div class="pm-summary-cell">
        <div class="psc-label">Total Spend</div>
        <div class="psc-val">${fmt$(totalSpend)}</div>
        <div class="psc-sub">All Channels</div>
        ${db(totalSpend, pTotalSpend, true)}
      </div>
      <div class="pm-summary-cell">
        <div class="psc-label">Avg CPD</div>
        <div class="psc-val">${cpd$(totalSpend, totalDemos)}</div>
        <div class="psc-sub">All Channels</div>
        ${db(cpdNum(totalSpend,totalDemos)||0, cpdNum(pTotalSpend,pTotalDemos)||0, true)}
      </div>
      <div class="pm-summary-cell">
        <div class="psc-label">Total Demos</div>
        <div class="psc-val">${fmtN(totalDemos)}</div>
        <div class="psc-sub">All Channels</div>
        ${db(totalDemos, pTotalDemos)}
      </div>
    </div>
    <div class="pm-summary-row" style="margin-bottom:32px">
      <div class="pm-summary-cell">
        <div class="psc-label">Total Spend</div>
        <div class="psc-val">${fmt$(drSpend)}</div>
        <div class="psc-sub">Excl. LinkedIn + YouTube</div>
        ${db(drSpend, pDrSpend, true)}
      </div>
      <div class="pm-summary-cell">
        <div class="psc-label">Avg CPD</div>
        <div class="psc-val">${cpd$(drSpend, drDemos)}</div>
        <div class="psc-sub">Excl. LinkedIn + YouTube</div>
        ${db(cpdNum(drSpend,drDemos)||0, cpdNum(pDrSpend,pDrDemos)||0, true)}
      </div>
      <div class="pm-summary-cell">
        <div class="psc-label">Total Demos</div>
        <div class="psc-val">${fmtN(drDemos)}</div>
        <div class="psc-sub">Excl. LinkedIn + YouTube</div>
        ${db(drDemos, pDrDemos)}
      </div>
    </div>`;
  const effChannels = channels.filter(k => (ch[k]?.spend||0) > 0);
  const maxCPD   = Math.max(...effChannels.filter(k=>(ch[k]?.demos||0)>0).map(k=>ch[k].spend/ch[k].demos), 1);
  const maxDemos = Math.max(...effChannels.map(k=>ch[k]?.demos||0), 1);

  const effRows = effChannels.map(k => {
    const c   = ch[k];
    const cpd = c.demos > 0 ? c.spend / c.demos : null;
    const cpdPct  = cpd  ? (cpd  / maxCPD)   * 100 : 0;
    const demoPct = maxDemos > 0 ? (c.demos / maxDemos) * 100 : 0;
    const cpdColor= cpd && cpd > 500 ? '#C0392B' : cpd && cpd > 350 ? '#B8860B' : CH_COLORS[k];
    return `
      <div style="display:grid;grid-template-columns:100px 1fr 60px 1fr 50px;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--card-border)">
        <div style="font-size:12px;font-weight:700;color:var(--deep-navy);white-space:nowrap">${CH_ICONS[k]} ${CH_LABELS[k].split(' ')[0]}</div>
        <div style="position:relative;height:8px;background:rgba(212,230,239,0.4);border-radius:4px;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;width:${cpdPct.toFixed(1)}%;background:${cpdColor};border-radius:4px;transition:width 0.8s ease"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:${cpdColor};text-align:right">${cpd?fmt$(Math.round(cpd)):'—'}</div>
        <div style="position:relative;height:8px;background:rgba(212,230,239,0.4);border-radius:4px;overflow:hidden">
          <div style="position:absolute;left:0;top:0;height:100%;width:${demoPct.toFixed(1)}%;background:${CH_COLORS[k]};border-radius:4px;opacity:0.6;transition:width 0.8s ease"></div>
        </div>
        <div style="font-size:12px;font-weight:700;color:var(--mid-navy);text-align:right">${fmtN(c.demos)}</div>
      </div>`;
  }).join('');

  const effHTML = effRows ? `
    <div style="display:grid;grid-template-columns:100px 1fr 60px 1fr 50px;gap:10px;padding-bottom:6px;margin-bottom:2px">
      <div></div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--soft-teal)">Cost per Demo</div>
      <div></div>
      <div style="font-size:10px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--soft-teal)">Demo Volume</div>
      <div></div>
    </div>
    ${effRows}
    <div style="display:grid;grid-template-columns:100px 1fr 60px 1fr 50px;align-items:center;gap:10px;padding:12px 0 8px 0;border-top:2px solid var(--soft-teal);margin-top:4px">
      <div style="font-size:12px;font-weight:700;color:var(--deep-navy)">All Channels</div>
      <div></div>
      <div style="font-size:13px;font-weight:700;color:var(--deep-navy);text-align:right">${totalDemos > 0 ? fmt$(Math.round(totalSpend/totalDemos)) : '—'}</div>
      <div></div>
      <div style="font-size:13px;font-weight:700;color:var(--mid-navy);text-align:right">${fmtN(totalDemos)}</div>
    </div>
    <div style="margin-top:12px;font-size:11px;color:#8a9aaa;font-style:italic">Lower CPD bar = more efficient. Longer demo bar = higher volume.</div>` : '';

  return `
    <div class="sl">Channel Performance ${prevLabel ? `<span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">vs ${prevLabel}</span>` : ''}</div>
    <div class="pm-grid">${cardsHTML}</div>`;
}



// Init
document.getElementById('gen-time').textContent = DATA.generatedAt;
document.getElementById('footer-file').textContent = DATA.filename ? `Source: ${DATA.filename}` : '';
const WINDOW_KEYS = ['yesterday','rolling7','mtd','lastmonth','ytd'];

// Detect custom-only mode (generated by --custom-from/--custom-to)
const isCustomOnly = DATA.windows.custom && !DATA.windows.yesterday;

if (isCustomOnly) {
  // Show only the Custom Range tab (Paid Media is merged inline)
  document.querySelectorAll('.tab').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));

  // Show and activate the custom tab button
  const customBtn = document.getElementById('tab-btn-custom');
  if (customBtn) {
    customBtn.style.display = '';
    customBtn.classList.add('active');
    const customLabel = DATA.windows.custom?.label || 'Custom Range';
    customBtn.textContent = customLabel;
  }

  // Build custom panel content (includes Paid Media inline)
  const customPanel = document.getElementById('panel-custom');
  customPanel.classList.add('active');
  const d = DATA.windows.custom;
  const label = d.label || 'Custom Range';
  const prevLabel = d.prevLabel || 'prior period';
  customPanel.innerHTML = `
    <div style="margin-bottom:24px">
      <div style="display:flex;align-items:center;gap:16px;flex-wrap:wrap">
        <h2 style="font-family:'Libre Baskerville',Georgia,serif;color:var(--deep-navy);font-size:24px;font-weight:700;margin:0">Custom Report: ${label}</h2>
        <span style="font-size:13px;color:var(--soft-teal);font-weight:600">vs ${prevLabel}</span>
      </div>
    </div>` + buildPanel('custom', d);
} else {
  // Standard mode — build all three time window panels
  WINDOW_KEYS.forEach(key => {
    const btn = document.getElementById('tab-btn-' + key);
    if (btn && DATA.windows[key]?.label) {
      const label = DATA.windows[key].label;
      const match = label.match(/^(.+?)\s*\((.+)\)$/);
      if (match) {
        btn.innerHTML = `${match[1]}<span class="tab-date">${match[2]}</span>`;
      } else {
        btn.textContent = label;
      }
    }
  });

  Object.entries(DATA.windows).forEach(([key,d]) => {
    const el = document.getElementById('panel-' + key);
    if (el && WINDOW_KEYS.includes(key)) el.innerHTML = buildPanel(key, d);
  });
}
</script>
</body>
</html>
