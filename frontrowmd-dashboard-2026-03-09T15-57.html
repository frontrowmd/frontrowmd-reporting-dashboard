<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="FrontrowMD_Favicon.png">
<title>FrontrowMD — Marketing Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --midnight:    #020F18;
    --deep-navy:   #172C45;
    --mid-navy:    #1D4053;
    --soft-teal:   #72A4BF;
    --white:       #FFFFFF;
    --card-bg:     rgba(114,164,191,0.08);
    --card-border: #D4E6EF;
    --teal-10:     rgba(114,164,191,0.10);
    --grad-dark:   linear-gradient(135deg,#020F18 0%,#1D4053 50%,#72A4BF 100%);
    --grad-light:  linear-gradient(135deg,#F5F7FA 0%,#EBF3F8 60%,#D8ECF5 100%);
    --shadow-sm:   0 2px 12px rgba(23,44,69,0.06);
    --shadow-md:   0 4px 16px rgba(2,15,24,0.12);
    --shadow-hov:  0 8px 24px rgba(23,44,69,0.12);
    --warn-bg:     #FFF8E1; --warn-tx: #B8860B;
    --good-bg:     rgba(26,107,58,0.08); --good-tx: #1A6B3A;
    --danger-bg:   rgba(192,57,43,0.07); --danger-tx: #C0392B;
    --up:   #1A6B3A; --up-bg:   rgba(26,107,58,0.10);
    --down: #C0392B; --down-bg: rgba(192,57,43,0.09);
    --flat: #5a7a8a; --flat-bg: rgba(90,122,138,0.09);
    --radius:14px; --pill:50px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--grad-light);color:var(--midnight);font-family:'Libre Baskerville',Georgia,serif;font-size:14px;line-height:1.65;min-height:100vh;}
  body::before{display:none;}
  .wrap{max-width:1360px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1;}

  /* HEADER */
  header{background:var(--grad-dark);margin:0 0 48px;padding:36px 48px 32px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;width:100%;max-width:none;}
  header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:340px;background:radial-gradient(ellipse at right center,rgba(114,164,191,0.12) 0%,transparent 70%);pointer-events:none;}
  .logo-img{height:40px;width:auto;display:block;}
  .logo-fallback{font-size:18px;font-weight:400;color:rgba(255,255,255,0.85);letter-spacing:0.02em;display:flex;align-items:center;gap:8px;}
  .logo-fallback strong{font-weight:700;color:var(--white);}
  h1{font-size:clamp(22px,2.8vw,34px);font-weight:700;color:var(--white);line-height:1.2;margin-top:14px;}
  h1 em{font-style:normal;color:var(--soft-teal);}
  .header-right{text-align:right;position:relative;z-index:1;flex-shrink:0;}
  .gen-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:4px;}
  .gen-time{font-size:14px;color:rgba(255,255,255,0.85);}
  .ds-pills{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
  .ds-pill{font-size:10px;letter-spacing:0.06em;padding:4px 12px;border-radius:var(--pill);border:1px solid rgba(114,164,191,0.35);color:rgba(255,255,255,0.6);}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:36px;}
  .tab{font-family:'Libre Baskerville',Georgia,serif;font-size:13px;padding:10px 26px;border-radius:20px;cursor:pointer;border:1.5px solid var(--card-border);background:transparent;color:var(--mid-navy);transition:all 0.2s ease;display:inline-flex;flex-direction:column;align-items:center;line-height:1.3;}
  .tab .tab-date{font-size:10px;font-weight:400;opacity:0.65;margin-top:1px;}
  .tab:hover{border-color:var(--soft-teal);background:var(--teal-10);}
  .tab.active{background:var(--deep-navy);color:var(--white);border-color:var(--deep-navy);font-weight:700;}
  .tab:focus{outline:2px solid var(--soft-teal);outline-offset:2px;}

  /* PANELS */
  .panel{display:none;}
  .panel.active{display:block;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* SECTION LABEL */
  .sl{font-size:10px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:16px;display:flex;align-items:center;gap:14px;}
  .sl::after{content:'';flex:1;height:1px;background:var(--card-border);}

  /* DELTA BADGE */
  .delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--pill);margin-top:6px;}
  .delta-up  {background:var(--up-bg);  color:var(--up);}
  .delta-down{background:var(--down-bg);color:var(--down);}
  .delta-flat{background:var(--flat-bg);color:var(--flat);}
  .delta-sub {font-size:10px;font-weight:400;opacity:0.7;margin-left:2px;}

  /* DARK STAT CARDS */
  .stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:32px;}
  .stat-card{background:linear-gradient(135deg,var(--deep-navy),var(--mid-navy));border-radius:var(--radius);padding:24px 28px;color:var(--white);box-shadow:var(--shadow-md);position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;right:-10px;bottom:-10px;width:80px;height:80px;border-radius:50%;background:rgba(114,164,191,0.08);}
  .sc-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(114,164,191,0.75);margin-bottom:8px;}
  .sc-value{font-size:36px;font-weight:700;line-height:1;}
  .sc-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px;font-style:italic;}
  .sc-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--pill);margin-top:8px;}
  .sc-delta-up  {background:rgba(26,107,58,0.25); color:#7ecda0;}
  .sc-delta-down{background:rgba(192,57,43,0.25); color:#f09090;}
  .sc-delta-flat{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:32px;}
  .kpi{background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease;}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-hov);}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-stripe,var(--soft-teal));}
  .kpi-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:10px;}
  .kpi-value{font-size:30px;font-weight:700;color:var(--deep-navy);line-height:1;}
  .kpi-sub{font-size:11px;color:#8a9aaa;margin-top:6px;font-style:italic;}
  .kpi-navy{--kpi-stripe:var(--deep-navy);}
  .kpi-good{--kpi-stripe:#2E7D52;}

  /* WEBSITE FUNNEL (mini inline funnel inside KPI section) */
  .wf-wrap{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;align-items:center;gap:0;margin-bottom:32px;}
  .wf-node{background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease;}
  .wf-node:hover{transform:translateY(-2px);box-shadow:var(--shadow-hov);}
  .wf-node::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--soft-teal);}
  .wf-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:8px;}
  .wf-value{font-size:28px;font-weight:700;color:var(--deep-navy);line-height:1;}
  .wf-rate{display:inline-flex;align-items:center;gap:5px;margin-top:8px;font-size:11px;font-weight:700;color:var(--soft-teal);background:rgba(114,164,191,0.10);border-radius:4px;padding:3px 8px;border:1px solid rgba(114,164,191,0.18);}
  .wf-rate-lbl{font-weight:400;color:#8a9aaa;font-size:10px;margin-left:2px;}
  .wf-arrow{display:flex;align-items:center;justify-content:center;padding:0 6px;}
  .wf-arrow-icon{width:40px;height:40px;color:var(--soft-teal);font-size:28px;display:flex;align-items:center;justify-content:center;font-weight:900;opacity:0.85;}

  /* CHART CARDS */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
  .chart-card{background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);transition:transform 0.2s ease,box-shadow 0.2s ease;}
  .chart-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hov);}
  .chart-title{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;}
  .chart-title-meta{font-size:11px;letter-spacing:0.04em;color:#8a9aaa;font-weight:400;text-transform:none;}

  /* SPEND SUMMARY STRIP */
  .spend-summary{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--card-border);border-radius:10px;overflow:hidden;}
  .ss-item{flex:1;padding:14px 18px;}
  .ss-item+.ss-item{border-left:1px solid var(--card-border);}
  .ss-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:4px;}
  .ss-value{font-size:20px;font-weight:700;color:var(--deep-navy);line-height:1;}
  .ss-sub{font-size:10px;color:#8a9aaa;margin-top:4px;font-style:italic;}

  /* BAR CHART */
  .bar-chart{display:flex;flex-direction:column;gap:12px;}
  .bar-row{display:flex;align-items:center;gap:12px;}
  .bar-name{font-size:12px;color:var(--mid-navy);width:110px;flex-shrink:0;text-align:right;}
  .bar-track{flex:1;height:8px;background:var(--card-bg);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .bar-val{font-size:12px;font-weight:700;color:var(--deep-navy);width:74px;flex-shrink:0;}

  /* DONUT */
  .donut-wrap{display:flex;align-items:center;gap:24px;margin-bottom:22px;}
  .donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
  .leg-item{display:flex;align-items:center;gap:10px;font-size:12px;}
  .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .leg-name{color:var(--mid-navy);flex:1;}
  .leg-pct{font-weight:700;color:var(--deep-navy);}

  /* CPD TABLE */
  .cpd-table{width:100%;border-collapse:collapse;}
  .cpd-table th{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft-teal);text-align:left;padding:0 12px 12px 0;border-bottom:1px solid var(--card-border);}
  .cpd-table th:not(:first-child){text-align:right;padding-left:12px;}
  .cpd-table td{padding:10px 12px 10px 0;border-bottom:1px solid rgba(212,230,239,0.5);font-size:13px;vertical-align:top;color:var(--mid-navy);}
  .cpd-table td:not(:first-child){text-align:right;font-weight:700;color:var(--deep-navy);padding-left:12px;}
  .cpd-table tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:var(--pill);}
  .badge-warn{background:var(--warn-bg);color:var(--warn-tx);}
  .badge-good{background:var(--good-bg);color:var(--good-tx);}
  .badge-na{background:var(--card-bg);color:#8a9aaa;}

  /* FUNNEL — log scale so visitors don't dwarf demos */
  .funnel{display:flex;flex-direction:column;gap:0;}
  .funnel-step{display:grid;grid-template-columns:140px 1fr 110px;align-items:center;gap:16px;padding:14px 0;border-bottom:1px solid rgba(212,230,239,0.4);}
  .funnel-step:last-child{border-bottom:none;}
  .funnel-name{font-size:12px;color:var(--mid-navy);text-align:right;line-height:1.4;}
  .funnel-track{background:var(--card-bg);border-radius:6px;height:36px;position:relative;overflow:hidden;}
  .funnel-bar{height:100%;border-radius:6px;transition:width 0.9s cubic-bezier(0.16,1,0.3,1);display:flex;align-items:center;padding-left:12px;box-sizing:border-box;}
  .funnel-bar-label{font-size:13px;font-weight:700;color:#fff;white-space:nowrap;text-shadow:0 1px 2px rgba(0,0,0,0.15);}
  .funnel-cvr-col{text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:3px;}
  .funnel-cvr-val{font-size:13px;font-weight:700;color:var(--deep-navy);}
  .funnel-cvr-lbl{font-size:10px;color:#8a9aaa;font-style:italic;}
  .funnel-connector{text-align:center;font-size:20px;font-weight:900;color:var(--soft-teal);padding:1px 0;grid-column:1/-1;opacity:0.8;line-height:1.2;}
  .funnel-scale-note{font-size:10px;color:#8a9aaa;font-style:italic;text-align:right;margin-bottom:8px;}

  /* PAID MEDIA TAB */
  .pm-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:20px;margin-bottom:32px;}
  .pm-card{background:rgba(114,164,191,0.06);border:1px solid var(--card-border);border-radius:12px;padding:20px;transition:all 0.2s ease;}
  .pm-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(23,44,69,0.08);}
  .pm-card-header{display:flex;align-items:center;gap:10px;margin-bottom:16px;}
  .pm-card-icon{font-size:20px;}
  .pm-card-name{font-size:14px;font-weight:700;color:var(--deep-navy);}
  .pm-card-spend{font-size:22px;font-weight:700;color:var(--deep-navy);margin-bottom:4px;}
  .pm-card-rows{display:flex;flex-direction:column;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--card-border);}
  .pm-card-row{display:flex;justify-content:space-between;align-items:center;}
  .pm-card-row-label{font-size:11px;color:#8a9aaa;text-transform:uppercase;letter-spacing:0.06em;}
  .pm-card-row-val{font-size:13px;font-weight:700;color:var(--deep-navy);}
  .pm-card-row-delta{font-size:11px;margin-left:6px;}
  .pm-summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px;}
  .pm-summary-cell{background:linear-gradient(135deg,#172C45,#1D4053);border-radius:12px;padding:20px;color:#fff;text-align:center;}
  .pm-summary-cell .psc-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:6px;}
  .pm-summary-cell .psc-val{font-size:24px;font-weight:700;}
  .pm-summary-cell .psc-sub{font-size:11px;color:var(--soft-teal);margin-top:4px;font-weight:400;}
  .pm-summary-cell .psc-delta{font-size:11px;margin-top:4px;opacity:0.8;}
  /* Force dark-mode aware delta pills inside dark summary cards */
  .pm-summary-cell .delta     {background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.85);}
  .pm-summary-cell .delta-up  {background:rgba(26,107,58,0.35);  color:#7ecda0;}
  .pm-summary-cell .delta-down{background:rgba(192,57,43,0.35);  color:#f09090;}
  .pm-summary-cell .delta-flat{background:rgba(255,255,255,0.10);color:rgba(255,255,255,0.5);}

  /* PIPELINE */
  .pl-grid{display:flex;flex-direction:column;gap:12px;}
  .pl-row{display:flex;align-items:center;gap:12px;}
  .pl-name{font-size:12px;color:var(--mid-navy);width:150px;flex-shrink:0;}
  .pl-track{flex:1;background:var(--card-bg);border-radius:4px;height:10px;overflow:hidden;}
  .pl-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .pl-val{font-size:13px;font-weight:700;color:var(--deep-navy);width:38px;text-align:right;flex-shrink:0;}

  /* SOURCE BREAKDOWN */
  .src-grid{display:flex;flex-direction:column;gap:10px;padding:4px 0;}
  .src-row{display:grid;grid-template-columns:180px 1fr 48px 40px 70px;align-items:center;gap:12px;}
  .src-name{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--mid-navy);font-weight:600;}
  .src-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .src-bar-wrap{min-width:0;}
  .src-bar-track{background:var(--card-bg);border-radius:4px;height:10px;overflow:hidden;}
  .src-bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .src-count{font-size:13px;font-weight:700;color:var(--deep-navy);text-align:right;}
  .src-pct{font-size:11px;color:#8a9aaa;text-align:right;}
  .src-delta{text-align:right;}

  /* INTELLIGENCE SECTION */
  .intel-summary-bar{display:flex;gap:8px;margin-bottom:22px;flex-wrap:wrap;}
  .intel-summary-pill{display:flex;align-items:center;gap:7px;padding:7px 16px;border-radius:50px;font-size:12px;font-weight:700;border:1px solid;}
  .intel-summary-pill .isp-count{font-size:18px;font-weight:700;line-height:1;}

  .isp-alert{background:rgba(192,57,43,0.08);border-color:rgba(192,57,43,0.25);color:#b5392a;}
  .isp-weak {background:#FFF8E1;border-color:rgba(184,134,11,0.3);color:#9a7a0a;}
  .isp-opp  {background:rgba(26,138,138,0.07);border-color:rgba(26,138,138,0.25);color:#1a6b6b;}
  .isp-win  {background:rgba(26,107,58,0.07);border-color:rgba(26,107,58,0.25);color:#1A6B3A;}

  .intel-category{margin-bottom:26px;}
  .intel-category:last-child{margin-bottom:0;}
  .intel-cat-label{display:flex;align-items:center;gap:10px;font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;margin-bottom:11px;}
  .intel-cat-label::after{content:'';flex:1;height:1px;}
  .intel-cat-alert .intel-cat-label{color:#b5392a;}
  .intel-cat-alert .intel-cat-label::after{background:rgba(192,57,43,0.2);}
  .intel-cat-weak  .intel-cat-label{color:#9a7a0a;}
  .intel-cat-weak  .intel-cat-label::after{background:rgba(184,134,11,0.2);}
  .intel-cat-opp   .intel-cat-label{color:#1a6b6b;}
  .intel-cat-opp   .intel-cat-label::after{background:rgba(26,107,107,0.2);}
  .intel-cat-win   .intel-cat-label{color:#1A6B3A;}
  .intel-cat-win   .intel-cat-label::after{background:rgba(26,107,58,0.2);}

  .intel-cards{display:flex;flex-direction:column;gap:9px;}
  .intel-card{display:grid;grid-template-columns:24px 1fr;gap:12px;padding:15px 20px;border-radius:12px;border-left:3px solid;box-shadow:var(--shadow-sm);transition:transform 0.15s ease,box-shadow 0.15s ease;}
  .intel-card:hover{transform:translateY(-1px);box-shadow:var(--shadow-md);}
  .intel-cat-alert .intel-card{border-color:#b5392a;background:rgba(192,57,43,0.05);}
  .intel-cat-weak  .intel-card{border-color:#B8860B;background:#FFFDF2;}
  .intel-cat-opp   .intel-card{border-color:#1a8a8a;background:rgba(26,138,138,0.05);}
  .intel-cat-win   .intel-card{border-color:#2E7D52;background:rgba(26,107,58,0.05);}
  .intel-icon{font-size:15px;padding-top:1px;}
  .intel-title{font-size:13px;font-weight:700;color:var(--deep-navy);margin-bottom:4px;line-height:1.35;}
  .intel-desc{font-size:12px;color:var(--mid-navy);line-height:1.6;}
  .intel-action{display:inline-flex;align-items:flex-start;gap:5px;margin-top:7px;font-size:11px;font-weight:700;padding:4px 12px;border-radius:50px;}
  .intel-cat-alert .intel-action{background:rgba(192,57,43,0.1);color:#b5392a;}
  .intel-cat-weak  .intel-action{background:rgba(184,134,11,0.12);color:#9a7a0a;}
  .intel-cat-opp   .intel-action{background:rgba(26,138,138,0.1);color:#1a6b6b;}
  .intel-cat-win   .intel-action{background:rgba(26,107,58,0.1);color:#1A6B3A;}
  .intel-empty{padding:20px;text-align:center;color:#8a9aaa;font-style:italic;font-size:13px;}

  /* SPARKLINE on stat cards */
  .sc-sparkline{position:absolute;bottom:0;left:0;right:0;height:42px;opacity:0.25;pointer-events:none;}
  .sc-sparkline-overlay{position:absolute;bottom:0;left:0;right:0;height:42px;pointer-events:none;}

  /* SHOW RATE KPI card — light bg with dark text for all states */
  .kpi-show-rate{grid-column:1/-1;border:none;}
  /* Critical: light red bg, dark red text */
  .kpi-show-rate-danger{background:#FEF2F2;border:1.5px solid #FECACA;}
  .kpi-show-rate-danger .sr-value{color:#991B1B;}

<script>
// Password gate — simple hash comparison
function checkPw() {
  const input = document.getElementById('pw-input');
  const err   = document.getElementById('pw-err');
  // Simple hash to avoid plaintext in source
  const hash = s => { let h=0; for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;} return h; };
  const EXPECTED = -1746057480; // hash of password
  if (hash(input.value) === EXPECTED) {
    sessionStorage.setItem('pw_ok','1');
    unlockDashboard();
  } else {
    input.classList.add('pw-error');
    err.textContent = 'Incorrect password. Please try again.';
    input.value = '';
    input.focus();
    setTimeout(() => input.classList.remove('pw-error'), 1500);
  }
}
function unlockDashboard() {
  const overlay = document.getElementById('pw-overlay');
  const main    = document.getElementById('main-content');
  overlay.classList.add('hidden');
  main.style.display = 'block';
  setTimeout(() => overlay.remove(), 500);
}
// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('pw_ok') === '1') { unlockDashboard(); }
else { document.getElementById('pw-input').focus(); }
</script>

function switchTab(key, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  btn.classList.add('active');
  // Build custom range picker on first view
  if (key === 'custom' && !document.getElementById('custom-range-ui')) {
    document.getElementById('panel-custom').innerHTML = buildCustomRangeUI();
  }
}

function buildCustomRangeUI() {

  return `
    <div id="custom-range-ui" style="margin-bottom:32px">
      <div class="chart-card" style="padding:28px 32px">
        <div class="chart-title" style="margin-bottom:16px">Custom Date Range</div>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:8px">Quick Select</label>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            <button onclick="applyPreset('ytd')" style="${presetBtnStyle}">YTD</button>
            <button onclick="applyPreset('qtd')" style="${presetBtnStyle}">QTD</button>
            <button onclick="applyPreset('lastMonth')" style="${presetBtnStyle}">Last Month</button>
            <button onclick="applyPreset('lastQuarter')" style="${presetBtnStyle}">Last Quarter</button>
            <button onclick="applyPreset('last90')" style="${presetBtnStyle}">Last 90 Days</button>
          </div>
        </div>
        <div style="display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap">
          <div>
            <label style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:6px">From</label>
            <input type="date" id="custom-from" value="${toISO(wk)}" max="${toISO(yd)}"
              style="font-family:'Libre Baskerville',Georgia,serif;font-size:14px;padding:10px 16px;border:1.5px solid var(--card-border);border-radius:8px;color:var(--deep-navy);background:#fff;outline:none;cursor:pointer">

          <div>
            <label style="display:block;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:6px">To</label>

              style="font-family:'Libre Baskerville',Georgia,serif;font-size:14px;padding:10px 16px;border:1.5px solid var(--card-border);border-radius:8px;color:var(--deep-navy);background:#fff;outline:none;cursor:pointer">

        </div>
        <div id="custom-status" style="margin-top:12px;font-size:13px;color:#8a9aaa"></div>
        <div style="margin-top:8px;font-size:12px;color:var(--soft-teal);font-style:italic">
          Report takes ~1–2 minutes to generate. Opens in a new tab when ready.

function applyPreset(preset) {
  const now = new Date();
  const yd  = new Date(now); yd.setDate(yd.getDate() - 1);
  const toISO = d => d.toISOString().slice(0,10);
  let from, to;

  switch (preset) {
    case 'ytd':
      from = new Date(now.getFullYear(), 0, 1);
      to   = yd;
      break;
    case 'qtd': {
      const qMonth = Math.floor(now.getMonth() / 3) * 3;
      from = new Date(now.getFullYear(), qMonth, 1);
      to   = yd;
      break;
    }
    case 'lastMonth': {
      const lm = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      from = lm;
      to   = new Date(now.getFullYear(), now.getMonth(), 0); // last day of prev month
      break;
    }
    case 'lastQuarter': {
      const curQ = Math.floor(now.getMonth() / 3);
      const prevQ = curQ === 0 ? 3 : curQ - 1;
      const prevQYear = curQ === 0 ? now.getFullYear() - 1 : now.getFullYear();
      from = new Date(prevQYear, prevQ * 3, 1);
      to   = new Date(prevQYear, prevQ * 3 + 3, 0); // last day of quarter
      break;
    }
    case 'last90':
      from = new Date(yd); from.setDate(from.getDate() - 89);
      to   = yd;
      break;
  }

  document.getElementById('custom-from').value = toISO(from);
  document.getElementById('custom-to').value   = toISO(to);

  // Highlight the selected preset button
  const btns = document.querySelectorAll('#custom-range-ui button[onclick^="applyPreset"]');
  btns.forEach(b => {
    b.style.background = '#fff';
    b.style.color = 'var(--deep-navy)';
    b.style.borderColor = 'var(--card-border)';
  });
  const activeBtn = [...btns].find(b => b.getAttribute('onclick').includes(preset));
  if (activeBtn) {
    activeBtn.style.background = 'var(--deep-navy)';
    activeBtn.style.color = '#fff';
    activeBtn.style.borderColor = 'var(--deep-navy)';
  }
}

async function fetchCustomRange() {
  const from = document.getElementById('custom-from').value;
  const to   = document.getElementById('custom-to').value;
  const btn  = document.getElementById('custom-fetch-btn');
  const status = document.getElementById('custom-status');

  if (!from || !to) { status.innerHTML = '<span style="color:#C0392B">Please select both dates.</span>'; return; }
  if (from > to)    { status.innerHTML = '<span style="color:#C0392B">From date must be before To date.</span>'; return; }

  btn.disabled = true;
  btn.style.opacity = '0.6';
  btn.textContent = 'Triggering…';
  status.innerHTML = '<span style="color:var(--soft-teal)">⏳ Triggering report generation…</span>';

  try {
    // Step 1: Trigger the GitHub Actions workflow via Cloudflare Worker
    const res = await fetch(CUSTOM_WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ agent: 'agent6', custom_from: from, custom_to: to }),
    });
    const json = await res.json();

    if (!json.ok) {
      status.innerHTML = `<span style="color:#C0392B">Error: ${json.error}</span>`;
      btn.disabled = false; btn.style.opacity = '1'; btn.textContent = 'Generate Report';
      return;
    }

    // Step 2: Poll GitHub Pages for custom.html with a cache-busting parameter
    status.innerHTML = '<span style="color:var(--soft-teal)">⏳ Report triggered — waiting for build to complete… <span id="custom-timer">0</span>s</span>';
    btn.textContent = 'Building…';

    const customUrl = CUSTOM_PAGES_BASE + '/custom.html';
    const startTime = Date.now();
    const maxWait = 180000; // 3 minutes
    const pollInterval = 5000; // 5 seconds

    // Get the current version timestamp before polling (to detect new deploy)
    let baselineTimestamp = null;
    try {
      const baseRes = await fetch(customUrl + '?t=' + Date.now(), { cache: 'no-store' });
      if (baseRes.ok) {
        const baseText = await baseRes.text();
        const match = baseText.match(/Generated[^<]*?(\w{3}\s+\d{1,2},\s+\d{4}[^<]*?\d{1,2}:\d{2}\s*[AP]M)/i);
        if (match) baselineTimestamp = match[1];
      }
    } catch(e) { /* no existing custom.html — that's fine */ }

    const timerEl = document.getElementById('custom-timer');
    const timerInterval = setInterval(() => {
      if (timerEl) timerEl.textContent = Math.round((Date.now() - startTime) / 1000);
    }, 1000);

    const pollForResult = async () => {
      while (Date.now() - startTime < maxWait) {
        await new Promise(r => setTimeout(r, pollInterval));

        try {
          const pollRes = await fetch(customUrl + '?t=' + Date.now(), { cache: 'no-store' });
          if (pollRes.ok) {
            const pollText = await pollRes.text();
            // Check if this is a NEW deploy by comparing generated timestamp
            const match = pollText.match(/Generated[^<]*?(\w{3}\s+\d{1,2},\s+\d{4}[^<]*?\d{1,2}:\d{2}\s*[AP]M)/i);
            const newTimestamp = match ? match[1] : null;

            if (newTimestamp && newTimestamp !== baselineTimestamp) {
              // New custom.html detected — success!
              clearInterval(timerInterval);
              status.innerHTML = `<span style="color:#2E7D52">✅ Report ready! <a href="${customUrl}" target="_blank" style="color:var(--soft-teal);text-decoration:underline;font-weight:700">Open Custom Report →</a></span>`;
              window.open(customUrl, '_blank');
              return;
            }
          }
        } catch(e) { /* keep polling */ }
      }

      // Timeout
      clearInterval(timerInterval);
      status.innerHTML = `<span style="color:#B8860B">⏱️ Build is taking longer than expected. <a href="${customUrl}" target="_blank" style="color:var(--soft-teal);text-decoration:underline">Check manually</a> in a minute, or check <a href="https://github.com/${json.owner}/${json.repo}/actions" target="_blank" style="color:var(--soft-teal);text-decoration:underline">GitHub Actions</a> for status.</span>`;
    };

    await pollForResult();

  } catch(e) {
    status.innerHTML = `<span style="color:#C0392B">Error: ${e.message}</span>`;
  } finally {
    btn.disabled = false;
    btn.style.opacity = '1';
    btn.textContent = 'Generate Report';
  }
}

// ── Sparkline SVG (mini 7-point line) ──────────────────────────
function buildSparkline(points, w=140, h=36, color='rgba(255,255,255,0.6)') {
  if (!points || points.length < 2) return '';
  const min = Math.min(...points), max = Math.max(...points);
  const range = max - min || 1;
  const px = (i) => (i / (points.length - 1)) * w;
  const py = (v) => h - ((v - min) / range) * (h * 0.8) - h * 0.1;
  const d = points.map((v,i) => `${i===0?'M':'L'}${px(i).toFixed(1)},${py(v).toFixed(1)}`).join(' ');
  return `<svg width="${w}" height="${h}" style="position:absolute;bottom:0;left:0;right:0;width:100%;opacity:0.3;pointer-events:none" preserveAspectRatio="none" viewBox="0 0 ${w} ${h}">
    <defs><linearGradient id="sparkgrad" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity="0.4"/><stop offset="100%" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>
    <path d="${d} L${w},${h} L0,${h} Z" fill="url(#sparkgrad)"/>
    <path d="${d}" fill="none" stroke="${color}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// Fallback: latest month's budget for any month not explicitly listed
const BUDGET_FALLBACK = BUDGET_BY_MONTH['2026-03'];

function getBudgetsForMonth(dateStr) {
  // dateStr like '2026-03-01' or key like 'mtd'/'lastmonth'
  if (!dateStr) return BUDGET_FALLBACK;
  const ym = dateStr.slice(0, 7); // '2026-03'

function buildPacingBar(spendMTD, monthlyBudget, pacingPct) {
  if (!monthlyBudget) return '';

  const color = pct > 105 ? '#C0392B' : pct > 95 ? '#B8860B' : '#72A4BF';
  const label = pct > 105 ? 'Over budget' : pct > 95 ? 'On pace' : 'Under-pacing';
  return `<div class="pacing-bar-wrap">
    <div class="pacing-bar-track">
      <div class="pacing-bar-fill" style="width:${Math.min(pct,100).toFixed(1)}%;background:${color}"></div>
      <div class="pacing-bar-marker" style="left:${pacingPct.toFixed(1)}%"></div>
    </div>
    <div class="pacing-bar-labels">
      <span>${label} — ${fmt$(spendMTD)} / ${fmt$(monthlyBudget)}</span>

}

// ── Demo Quality Trend (3-window grouped bars) ─────────────────
function buildDemoQualityChart(tabKey) {
  // In custom-only mode, show a single bar for the custom window
  const isCustom = tabKey === 'custom' || tabKey === 'ytd' || tabKey === 'lastmonth' || (!DATA.windows.yesterday && DATA.windows.custom);
  const windows  = isCustom ? [tabKey] : ['yesterday','rolling7','mtd'];
  const wLabels  = isCustom
    ? { [tabKey]: DATA.windows[tabKey]?.label || tabKey }
    : { yesterday:'Yesterday', rolling7:'Last 7 Days', mtd:'Month to Date' };

  const winData = windows.map(w => {
    const pp = DATA.windows[w]?.pipeline || {};
    const demosHappened = pp.demosHappened           || 0;
    const disqBefore  = pp.disqualifiedBeforeDemo  || 0;
    const rescheduled = pp.rescheduled             || 0;
    const canceled    = pp.canceled                || 0;
    const tooEarly    = pp.tooEarly                || 0;
    const disqAfter   = pp.notQualAfterDemo        || 0;
    const blank       = pp.blankStatus             || 0;
    // demosHappened already includes tooEarly + disqAfter — subtract to get pure Demo Given
    const demoGiven   = demosHappened - tooEarly - disqAfter;
    const total       = demoGiven + disqBefore + rescheduled + canceled + tooEarly + disqAfter;
    return { label: wLabels[w], demoGiven, disqBefore, rescheduled, canceled, tooEarly, disqAfter, blank, total };
  });

  const maxVal = Math.max(...winData.map(w => w.total + w.blank), 1);

  const stackColors = {
    demoGiven:   '#1D4053',
    tooEarly:    '#aab8c2',
    disqAfter:   '#C0392B',
    disqBefore:  '#B8860B',
    rescheduled: '#9b7fd4',
    canceled:    '#d47f7f',
    blank:       '#c0c8d0'
  };
  const stackLabels = {
    demoGiven:   'Qual. Demo Given',
    tooEarly:    'Too Early',
    disqAfter:   'Not Qualified After Demo',
    disqBefore:  'Disq. Before Demo',
    rescheduled: 'Rescheduled',
    canceled:    'Canceled',
    blank:       'Blank'
  };
  const stackKeys    = ['demoGiven','tooEarly','disqAfter','disqBefore','rescheduled','canceled'];
  const allStackKeys = [...stackKeys, 'blank'];

  const pctFmt = (n, d) => d > 0 ? Math.round(n / d * 100) + '%' : '—';

  const bars = winData.map(w => {
    // Bar uses total (excluding blank) as denominator for width; maxVal includes blank for scale
    let offsetPct = 0;
    const segments = stackKeys.map(k => {
      if (w[k] === 0) return '';
      const segWidthPct = (w[k] / maxVal * 100);
      const segLeft = offsetPct;
      offsetPct += segWidthPct;
      const showInline = segWidthPct > 6;
      const countLabel = showInline
        ? `<div style="position:absolute;left:0;top:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:rgba(255,255,255,0.92);pointer-events:none;white-space:nowrap">${w[k]}</div>`
        : '';
      return `<div style="position:absolute;left:${segLeft.toFixed(2)}%;width:${segWidthPct.toFixed(2)}%;height:100%;background:${stackColors[k]};transition:width 0.8s ease" title="${stackLabels[k]}: ${w[k]}">${countLabel}</div>`;
    }).join('');

    // Blank status shown as a lighter trailing segment
    const blankWidthPct = (w.blank / maxVal * 100);
    const blankSeg = w.blank > 0
      ? `<div style="position:absolute;left:${offsetPct.toFixed(2)}%;width:${blankWidthPct.toFixed(2)}%;height:100%;background:${stackColors.blank};opacity:0.5;border-left:1px dashed #aaa;transition:width 0.8s ease" title="Status Blank: ${w.blank}"></div>`
      : '';

    // Pills: all categories with count + % of total
    const grandTotal = w.total + w.blank;
    const pills = allStackKeys
      .filter(k => w[k] > 0)
      .map(k => {
        const pct = pctFmt(w[k], grandTotal);
        const isBlank = k === 'blank';
        return `<span style="display:inline-flex;align-items:center;gap:4px;font-size:10px;color:${stackColors[k]};font-weight:700;background:${stackColors[k]}18;border-radius:4px;padding:2px 7px;${isBlank?'opacity:0.75':''}">
          <span style="width:7px;height:7px;border-radius:50%;background:${stackColors[k]};display:inline-block;flex-shrink:0"></span>
          ${stackLabels[k]}: <strong>${w[k]}</strong> <span style="font-weight:400;color:#8a9aaa">(${pct})</span></span>`;
      }).join('');

    const qualPct = grandTotal > 0 ? Math.round(w.demoGiven / grandTotal * 100) : 0;
    const totalLabel = grandTotal > 0 ? `<span style="font-size:10px;font-weight:400;color:#8a9aaa"> / ${grandTotal} total</span>` : '';

    return `
      <div style="padding:10px 0;border-bottom:1px solid var(--card-border)">
        <div style="display:grid;grid-template-columns:110px 1fr 70px;align-items:center;gap:12px;margin-bottom:8px">
          <div style="font-size:12px;font-weight:700;color:var(--deep-navy)">${w.label}</div>
          <div style="position:relative;height:22px;background:rgba(212,230,239,0.35);border-radius:4px;overflow:hidden">${segments}${blankSeg}</div>
          <div style="font-size:13px;font-weight:700;color:#1D4053;text-align:right">${qualPct}%${totalLabel}<span style="font-size:9px;font-weight:400;color:#8a9aaa;display:block;text-align:right">given</span></div>
        </div>
        <div style="padding-left:122px;display:flex;gap:6px;flex-wrap:wrap">${pills}</div>
      </div>`;
  }).join('');

  const legend = allStackKeys.map(k => `
    <span style="display:inline-flex;align-items:center;gap:5px;font-size:11px;color:var(--mid-navy)${k==='blank'?';opacity:0.7':''}">
      <span style="width:10px;height:10px;border-radius:2px;background:${stackColors[k]};display:inline-block;flex-shrink:0${k==='blank'?';opacity:0.5':''}"></span>
      ${stackLabels[k]}</span>`).join('');

  return `
    <div style="display:flex;gap:16px;flex-wrap:wrap;margin-bottom:16px">${legend}</div>
    ${bars}
    <div style="margin-top:10px;font-size:10px;color:#8a9aaa;font-style:italic">% of total shown per category. Blank = contacts where demo_given__status is not set.</div>`;
}
