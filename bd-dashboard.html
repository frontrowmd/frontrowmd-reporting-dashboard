<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FrontrowMD BD Tracker</title>
<link rel="icon" href="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/White_Graphic_Logo.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#172C45;--midnight:#020F18;--teal:#72A4BF;--white:#FFFFFF;--border:#D4E6EF;--grey:#64748B;--teal-8:rgba(114,164,191,.08);--font-h:'Libre Baskerville',Georgia,serif;--font-b:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:linear-gradient(135deg,#F5F7FA,#EBF3F8,#D8ECF5);color:var(--navy);min-height:100vh}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#020F18,#1D4053,#72A4BF)}
.gbox{background:rgba(23,44,69,.7);backdrop-filter:blur(16px);border:1px solid rgba(114,164,191,.15);border-radius:16px;padding:40px 36px;width:340px;text-align:center}
.gbox input{width:100%;padding:12px 16px;border:1.5px solid rgba(114,164,191,.2);border-radius:50px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:var(--font-b);margin-bottom:12px;outline:none}
.gbox button{width:100%;padding:12px;border:none;border-radius:50px;background:var(--teal);color:#fff;font-family:var(--font-h);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
.gbox button:hover{background:#5E8CA8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(114,164,191,.3)}
.gbox button:active{transform:translateY(0);box-shadow:none}
#gerr{color:#EF4444;font-size:12px;margin-top:8px;display:none}
#app{display:none;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--white)}
#ptitle{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--navy)}
#fts{font-size:11px;color:var(--grey)}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.tile{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.tile.hero .tval{color:var(--navy)}
.tile.warn{border-color:#F59E0B;background:rgba(245,158,11,.04)}
.tile.warn .tval{color:#D97706}
.tlbl{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tval{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--navy)}
.tdef{font-size:10px;color:var(--grey);margin-top:2px}
.pill{display:inline-block;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:600;font-family:var(--font-b);white-space:nowrap}
.stbl{width:100%;border-collapse:separate;border-spacing:0;font-size:11px;table-layout:fixed}
.stbl th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);padding:8px 6px;border-bottom:2px solid var(--border);font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer;background:var(--white)}
.stbl th:hover{color:var(--navy)}
/* Body cells use a consistent 11px font (inherited from .stbl). Group-tinted
   cells keep their background via inline styles. */
.stbl td{padding:7px 6px;border-bottom:1px solid rgba(114,164,191,.06);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:11px;background:var(--white)}
/* Row hover uses a SOLID color (not rgba) so the frozen first column stays
   fully opaque while other cells scroll under it horizontally — a
   transparent hover would let scrolling content show through the sticky
   cell. #F9FBFC = the exact solid equivalent of rgba(114,164,191,.04) on
   white, so the visual feel matches the prior transparent hover. */
.stbl tr:hover td{background:#F9FBFC}
/* Sticky column headers — both the group banner row (Plan / Billing /
   Churn) AND the main column header row stick to the top of the wrapper.
   They stack: banner at top:0, column header just below it. Heights are
   hand-measured (banner ~28px including its padding + border). All
   sticky cells require opaque backgrounds (set via inline styles on the
   banner cells; .stbl th default is var(--white) for column header). */
.stbl thead tr.bd-grp-row th{position:sticky;top:0;z-index:6}
.stbl thead tr:not(.bd-grp-row) th{position:sticky;top:28px;z-index:5}
/* Freeze the Deal Name (first) column during horizontal scroll. The
   column-header corner is sticky on both axes (z-index 8 — above banner
   so it sits in the top-left corner cleanly). The banner row's first
   <th> is NOT sticky-left because it's a colspan placeholder covering
   multiple columns; it scrolls horizontally with the rest of the banner. */
.stbl tbody td:first-child{position:sticky;left:0;z-index:3;box-shadow:2px 0 4px -2px rgba(23,44,69,.08)}
.stbl thead tr:not(.bd-grp-row) th:first-child{position:sticky;left:0;top:28px;z-index:8;box-shadow:2px 0 4px -2px rgba(23,44,69,.08)}
.float-tip{display:none;position:fixed;background:#172C45;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;white-space:normal;line-height:1.4}
.attr-row:hover{background:rgba(114,164,191,.04);border-radius:6px;margin-left:-8px;margin-right:-8px;padding-left:8px;padding-right:8px}
.sp{display:inline-block;width:18px;height:18px;border:3px solid rgba(114,164,191,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Skeleton loader (initial load + refresh) ───────────────────────────── */
@keyframes bd-skel-shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes bd-skel-pulse{0%,100%{opacity:.55}50%{opacity:1}}
.bd-skel-bar{background:linear-gradient(90deg,rgba(114,164,191,.08) 0%,rgba(114,164,191,.30) 50%,rgba(114,164,191,.08) 100%);background-size:200% 100%;animation:bd-skel-shimmer 1.8s ease-in-out infinite;border-radius:6px}
.bd-skel-banner{display:flex;align-items:center;gap:14px;background:linear-gradient(135deg,var(--navy) 0%,#1D4053 100%);color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:18px;box-shadow:0 4px 12px rgba(23,44,69,.15)}
.bd-skel-banner-spin{width:18px;height:18px;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin .9s linear infinite;flex-shrink:0}
.bd-skel-banner-text{flex:1;min-width:0}
.bd-skel-banner-title{font-family:var(--font-h);font-size:14px;font-weight:700;color:#fff;line-height:1.2}
.bd-skel-banner-step{font-size:11px;color:rgba(255,255,255,.7);margin-top:2px;letter-spacing:.02em}
.bd-skel-banner-bar{flex:0 1 180px;height:6px;background:rgba(255,255,255,.18);border-radius:99px;overflow:hidden}
.bd-skel-banner-fill{height:100%;background:linear-gradient(90deg,var(--teal),#a8d4eb);border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1)}
.bd-skel-banner-pct{font-family:var(--font-h);font-size:13px;font-weight:700;color:#fff;font-variant-numeric:tabular-nums;flex-shrink:0;min-width:38px;text-align:right}
.bd-skel-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 18px;box-shadow:0 1px 3px rgba(2,15,24,.03)}
.bd-skel-row-tiles{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:14px}
.bd-skel-tile{height:96px;border-radius:12px}
.bd-skel-card-title{height:14px;width:160px;margin-bottom:14px}
.bd-skel-card-sub{height:10px;width:60%;margin-bottom:14px}
.bd-skel-attr-row{display:flex;align-items:center;gap:12px;margin-bottom:10px}
.bd-skel-attr-label{height:14px;width:110px;flex-shrink:0}
.bd-skel-attr-bar{flex:1;height:28px;border-radius:6px}
.bd-skel-table-head{height:18px;margin-bottom:10px;background:linear-gradient(90deg,rgba(114,164,191,.08) 0%,rgba(114,164,191,.20) 50%,rgba(114,164,191,.08) 100%)}
.bd-skel-table-row{height:32px;margin-bottom:5px}
.bd-skel-filters-row{display:flex;gap:10px;flex-wrap:wrap}
.bd-skel-filter-pill{height:22px;width:70px;border-radius:50px}
@media(max-width:700px){.bd-skel-row-tiles{grid-template-columns:repeat(2,1fr)}.bd-skel-banner{flex-wrap:wrap}.bd-skel-banner-bar{flex:1 1 100%;order:99}}
.header-bar{display:flex;align-items:center;padding:16px 24px;background:linear-gradient(135deg,#020F18,#1D4053);border-bottom:1px solid rgba(114,164,191,.1)}
.header-bar img{height:32px;margin-right:12px}
.header-bar .title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase}
/* Hide the webkit/blink default ×-clear button on the BD search box —
   we render our own × inside the pill so the browser native one would
   produce a duplicate "two X's" UI. */
#bd-search-input::-webkit-search-cancel-button,
#bd-search-input::-webkit-search-decoration,
#bd-search-input::-webkit-search-results-button,
#bd-search-input::-webkit-search-results-decoration{-webkit-appearance:none;appearance:none;display:none}
#bd-search-input{-moz-appearance:textfield}
</style>
</head><body>
<div id="gate">
  <div class="gbox">
    <div style="text-align:center;margin-bottom:12px"><img src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD" style="height:36px"></div>
    <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px">BD Tracker</div>
    <input type="password" id="pw" placeholder="Team password">
    <button id="loginBtn" onclick="doLogin()">Log In →</button>
    <div id="gerr">Invalid password</div>
  </div>
</div>
<div id="app">
  <div class="header-bar">
    <img src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD">
    <div class="title">BD Tracker</div>
    <div style="flex:1"></div>
    <span id="fts" style="font-size:11px;color:rgba(114,164,191,.6);margin-right:12px"></span>
    <button onclick="bdRefresh()" id="refreshBtn" style="padding:6px 16px;border-radius:50px;border:1.5px solid rgba(114,164,191,.3);background:transparent;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:6px;transition:all .2s">↻ Refresh</button>
  </div>
  <div class="main" id="bd-content"></div>
</div>
<script>
var BD={data:null},_bdSort='closedate',_bdSortDir='desc',_bdHideBlanks=false,_bdAttrDim='_webTraffic';
function _bdFirstOfMonth(){var _d=new Date();return _d.getFullYear()+'-'+String(_d.getMonth()+1).padStart(2,'0')+'-01';}
// _bdBrandStatusF = single-select bucket ('all' | 'Active' | 'Not Active').
// _bdBrandStatusToggleF = multi-select array of specific brand_status values
// (Signed / Paying / Paused / Churned / Never Implemented - Churned). When
// the toggle array is non-empty, it takes precedence over the single-select
// bucket (the bucket auto-resets to 'all' so the two UIs don't fight).
var _bdBrandStatusF='Active',_bdBrandStatusToggleF=[],_bdStageF='all',_bdRepF='all',_bdSeRepF='all',_bdOpsRepF='all',_bdPkgF='all',_bdDateFrom=_bdFirstOfMonth(),_bdDateTo='',_bdDateMode='close';
// Live deal-table search query — case-insensitive substring match across
// dealname, companyName, brand_status, notes, dealstage label, and the
// three rep-name fields (resolved via ownerMap). Applied inside the same
// sharedFiltered filter that powers the table + attribution panel. Empty
// string = no search filter.
var _bdSearchQ='';
// Deal ID + Company ID columns are HIDDEN by default to reduce visual
// clutter (they're technical identifiers, mostly useful for export and
// debugging). Toggle button above the table reveals them on demand.
// CSV export always includes both fields regardless of the on-screen toggle.
var _bdIdsVisible=false;
function bdToggleIds(){_bdIdsVisible=!_bdIdsVisible;renderBD();}
// Click handlers — single-select buttons clear the toggles; toggle clicks
// auto-set the single-select bucket to 'all' so both modes can't be active.
function bdBSSet(v){_bdBrandStatusF=v;_bdBrandStatusToggleF=[];renderBD();}
function bdBSToggle(v){var i=_bdBrandStatusToggleF.indexOf(v);if(i>=0)_bdBrandStatusToggleF.splice(i,1);else _bdBrandStatusToggleF.push(v);if(_bdBrandStatusToggleF.length>0)_bdBrandStatusF='all';renderBD();}
// Web Traffic filter is multi-select — array of selected raw tier values.
// Empty array = no filter (all tiers shown).
var _bdWebTrafficF=[];
// Plan Details / Billing Details column groups: extra columns are
// collapsed by default; users toggle to expand.
var _bdPlanExpanded=false, _bdBillingExpanded=false, _bdChurnExpanded=false, _bdAvgDaysExpanded=false, _bdDatesExpanded=false;
var BD_REP_COLORS=['#1565C0','#2E7D32','#72A4BF','#E65100','#5C6BC0','#00897B','#C62828','#6A1B9A','#EF6C00','#00695C'];
var _bdArrGoal='',_bdAcvInput='';
var BD_STAGE_LABELS={appointmentscheduled:'Scheduled','1084214349':'Demo Happened',decisionmakerboughtin:'Decision Maker',contractsent:'Contract Sent',closedwon:'Closed Won',closedlost:'Closed Lost','3453957850':'No Show','3453925110':'Churned','1062974581':'Not a Fit','3517067985':'Churned (Onb)','3722491612':'Interested, Circle Back','3741686471':'Webinar Attended','3741686470':'Webinar Registered'};
var BD_STAGE_COLORS={appointmentscheduled:'#F59E0B','1084214349':'#0EA5E9',decisionmakerboughtin:'#7C3AED',contractsent:'#1565C0',closedwon:'#16A34A',closedlost:'#9CA3AF','3453957850':'#EF4444','3453925110':'#EF4444','1062974581':'#64748B','3517067985':'#DC2626','3722491612':'#EC4899','3741686471':'#38BDF8','3741686470':'#9CA3AF'};
var BD_STATUS_COLORS={Signed:'#16A34A',Paying:'#172C45',Paused:'#F59E0B',Churned:'#DC2626','Never Implemented - Churned':'#9CA3AF'};
// Curated display order for the Deal Stage filter pills (funnel order, then
// Not a Fit, then the Webinar stages, then late-stage). Stages not listed
// fall to the end. Replaces the raw-id alphabetical sort.
var BD_STAGE_ORDER=['appointmentscheduled','1084214349','decisionmakerboughtin','contractsent','closedwon','closedlost','3453957850','1062974581','3741686471','3741686470','3722491612','3453925110','3517067985'];
// Plan color palette. New main plans (Hero/Core/Portfolio) get the most
// prominent colors; legacy plans are muted. Distinct enough to read on
// stage badges and the Deal Attribution chart side-by-side.
var BD_PKG_COLORS={
  Hero:'#DC2626',        // crimson — new flagship
  Core:'#0EA5E9',        // sky blue — middle tier
  Portfolio:'#7C3AED',   // purple — multi-product premium
  Beginner:'#9CA3AF',    // grey
  Starter:'#F59E0B',     // amber
  Flagship:'#0891B2',    // teal (recolored to free up blue for Core)
  Pro:'#172C45',         // dark navy
  'Full Access':'#16A34A'// green
};
// Display order — used by the filter pill row, table sort, and the
// Deal Attribution chart when Plan Name is the active dimension.
var BD_PKG_ORDER={Hero:1,Core:2,Portfolio:3,Beginner:4,Starter:5,Flagship:6,Pro:7,'Full Access':8};
// \u2500\u2500 Skeleton renderer for the initial /api/bd fetch + refresh \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
// Paints a section-shaped placeholder layout that mirrors the eventual BD
// content (Deal Attribution chart + summary KPI tiles + filter bar +
// All Deals table). Banner across the top shows a progress bar that
// ticks through realistic-feeling step labels every 1.8s.
var _bdSkelTimer=null;
function _bdRenderSkeleton(pct,step){
  var el=document.getElementById('bd-content');if(!el)return;
  var tile=function(){return '<div class="bd-skel-bar bd-skel-tile"></div>';};
  var attrRow=function(w){return '<div class="bd-skel-attr-row"><div class="bd-skel-bar bd-skel-attr-label"></div><div class="bd-skel-bar bd-skel-attr-bar" style="width:'+w+'%"></div></div>';};
  el.innerHTML=
    '<div class="bd-skel-banner" role="status" aria-live="polite">'
    +'<div class="bd-skel-banner-spin"></div>'
    +'<div class="bd-skel-banner-text"><div class="bd-skel-banner-title">Loading BD Tracker</div><div class="bd-skel-banner-step">'+(step||'Connecting to HubSpot\u2026')+'</div></div>'
    +'<div class="bd-skel-banner-bar"><div class="bd-skel-banner-fill" style="width:'+Math.max(0,Math.min(100,pct||0))+'%"></div></div>'
    +'<div class="bd-skel-banner-pct">'+Math.round(pct||0)+'%</div>'
    +'</div>'
    // ARR calculator + Signed top row (placeholder)
    +'<div class="bd-skel-row-tiles">'+tile()+tile()+tile()+tile()+'</div>'
    // Deal Attribution card placeholder
    +'<div class="bd-skel-card" style="margin-bottom:16px"><div class="bd-skel-bar bd-skel-card-title"></div><div class="bd-skel-bar bd-skel-card-sub"></div>'
    +attrRow(85)+attrRow(70)+attrRow(58)+attrRow(42)+attrRow(28)+attrRow(15)
    +'</div>'
    // Summary KPI row (Signed Brands / Total ARR / etc.)
    +'<div class="bd-skel-row-tiles" style="grid-template-columns:repeat(auto-fill,minmax(150px,1fr))">'+tile()+tile()+tile()+tile()+tile()+tile()+tile()+'</div>'
    // Filters card
    +'<div class="bd-skel-card" style="margin-bottom:16px"><div class="bd-skel-filters-row">'+'<div class="bd-skel-bar bd-skel-filter-pill"></div>'.repeat(10)+'</div></div>'
    // All Deals table
    +'<div class="bd-skel-card"><div class="bd-skel-bar bd-skel-card-title" style="width:120px"></div><div class="bd-skel-bar bd-skel-table-head"></div>'
    +'<div class="bd-skel-bar bd-skel-table-row"></div>'.repeat(10)
    +'</div>';
}
function _bdUpdateSkeletonProgress(pct,step){
  var fill=document.querySelector('#bd-content .bd-skel-banner-fill');if(fill)fill.style.width=Math.max(0,Math.min(100,pct))+'%';
  var stepEl=document.querySelector('#bd-content .bd-skel-banner-step');if(stepEl&&step)stepEl.textContent=step;
  var pctEl=document.querySelector('#bd-content .bd-skel-banner-pct');if(pctEl)pctEl.textContent=Math.round(pct)+'%';
}
// Start cycling through realistic step labels + ticking the progress bar.
// Returns a stop function. Step cadence roughly matches the actual /api/bd
// timing (deal pagination \u2192 owner fetch \u2192 associations \u2192 company cache hit).
function _bdStartSkeleton(){
  _bdRenderSkeleton(6,'Connecting to HubSpot\u2026');
  var steps=['Connecting to HubSpot\u2026','Fetching deal pipeline\u2026','Loading owner directory\u2026','Building deal-company associations\u2026','Reading cached company names\u2026','Mapping deal records\u2026','Rendering deals\u2026'];
  var si=0,pct=6;
  if(_bdSkelTimer)clearInterval(_bdSkelTimer);
  _bdSkelTimer=setInterval(function(){si++;pct=Math.min(6+si*13,92);_bdUpdateSkeletonProgress(pct,steps[Math.min(si,steps.length-1)]);},1800);
}
function _bdStopSkeleton(){
  if(_bdSkelTimer){clearInterval(_bdSkelTimer);_bdSkelTimer=null;}
  _bdUpdateSkeletonProgress(100,'Complete!');
}

function doLogin(){
  var btn=document.getElementById('loginBtn');
  btn.innerHTML='<span class="sp" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle"></span> Logging in...';btn.disabled=true;btn.style.opacity='.7';
  var pw=document.getElementById('pw').value;
  fetch('/api/bd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(function(r){return r.json();}).then(function(d){
    if(d.error){document.getElementById('gerr').style.display='block';btn.innerHTML='Log In \u2192';btn.disabled=false;btn.style.opacity='1';return;}
    BD.pw=pw;BD.data=d;document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';
    // Show the skeleton briefly so the user sees the page structure before
    // the real render swaps in \u2014 feels less janky than an instant flicker.
    _bdStartSkeleton();_bdUpdateSkeletonProgress(96,'Rendering deals\u2026');
    setTimeout(function(){_bdStopSkeleton();renderBD();bdLookupMissingCompanies();},120);
  }).catch(function(){document.getElementById('gerr').style.display='block';btn.innerHTML='Log In \u2192';btn.disabled=false;btn.style.opacity='1';});
  // Render skeleton into the bd-content area immediately so it's visible
  // the moment the gate fades away (login UX continuity).
  _bdStartSkeleton();
}
// Background fetch of missing company names. /api/bd skips live company
// lookups (uses cached names only) to stay under the per-invocation
// subrequest budget. This calls /api/bd/lookup-companies which has its
// own fresh budget, merges results into BD.data.deals, and re-renders.
// Retries until either there's no more missing OR no progress is made
// (server returned a placeholder for every ID it could fetch + had no
// deferred work). Safety counter caps recursion at 8 waves.
function bdLookupMissingCompanies(attempt){
  attempt=attempt||0;
  if(attempt>=8){var hSafety=document.getElementById('bd-co-hint');if(hSafety)hSafety.style.display='none';return;}
  if(!BD.pw||!BD.data||!BD.data.missingCompanyIds||!BD.data.missingCompanyIds.length)return;
  var ids=BD.data.missingCompanyIds.slice();
  var beforeCount=ids.length;
  var hint=document.getElementById('bd-co-hint');
  if(hint){hint.textContent=' \u00b7 loading '+ids.length+' company names\u2026';hint.style.display='inline';}
  fetch('/api/bd/lookup-companies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:BD.pw,companyIds:ids})}).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok||!d.companies){if(hint)hint.style.display='none';return;}
    var nameMap=d.companies;
    // Patch each deal's companyName from the lookup. Entries with empty
    // name (placeholder for archived/deleted companies) still mark the
    // deal as "resolved" \u2014 we just leave companyName as ''.
    BD.data.deals.forEach(function(deal){
      if(deal.companyId&&!deal.companyName&&nameMap[deal.companyId]){
        deal.companyName=nameMap[deal.companyId].name||'';
      }
    });
    // Any ID returned by the server (even with empty name = unresolved
    // placeholder) gets removed from the missing list \u2014 we won't keep

  var vh=window.innerHeight||document.documentElement.clientHeight||800;

    var cd=(row.closedate||'').substring(0,10)||'\u2014';
    var crd=(row.createdate||'').substring(0,10)||'\u2014';
    var repName=ownerMap[row.hubspot_owner_id]||'';
    var wtRaw=row.average_monthly_web_traffic__cloned_||'';
    var wtLbl=wtRaw?(BD_WT_LABELS[wtRaw]||wtRaw):'\u2014';
    // SE Rep \u2014 from the company record's hubspot_owner_id
    var seName=ownerMap[row.se_rep_id]||'';
    var toDemoVal=bdToDemo(row);
    // Resolve URLs that may or may not have a protocol prefix
    var _safeUrl=function(u){if(!u)return '';var s=String(u).trim();if(!s)return '';if(/^https?:\/\//i.test(s))return s;return 'https://'+s;};
    var _linkCell=function(u,lbl){var url=_safeUrl(u);if(!url)return dash;return '<a href="'+url+'" target="_blank" style="color:var(--teal);text-decoration:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%" title="'+u.replace(/"/g,'&quot;')+'">'+(lbl||u)+' \u2197</a>';};
    h+='<tr>';
    h+='<td><div style="display:flex;align-items:center;gap:4px;overflow:hidden"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+row.dealname+'">'+row.dealname+'</span><a href="https://app.hubspot.com/contacts/46815331/record/0-3/'+row.id+'" target="_blank" style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:rgba(114,164,191,.1);color:var(--teal);font-size:9px;text-decoration:none">\u2197</a></div></td>';
    // Deal ID cell \u2014 raw HubSpot record ID. Mono font + grey so it reads as
    // a system identifier, not a label. Click-to-copy via title hint.
    h+=_td('id','<td style="font-family:ui-monospace,Menlo,monospace;color:var(--grey)" title="HubSpot Deal record ID">'+(row.id||dash)+'</td>');
    // Company cell \u2014 the name itself is now the clickable link to the
    // HubSpot company record (was a tiny arrow icon next to plain text).
    // If we have no companyId, render the name as-is or "\u2014".
    var coName=row.companyName||'';
    var coUrl=row.companyId?'https://app.hubspot.com/contacts/46815331/record/0-2/'+row.companyId:'';
    var coCell;
    if(coName&&coUrl){
      coCell='<a href="'+coUrl+'" target="_blank" title="'+coName.replace(/"/g,'&quot;')+'" style="color:var(--teal);text-decoration:none;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%">'+coName+' \u2197</a>';
    } else if(coName){
      coCell='<span title="'+coName.replace(/"/g,'&quot;')+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%">'+coName+'</span>';
    } else {
      coCell=dash;
    }
    h+='<td data-no-tip="1">'+coCell+'</td>';
    // Company ID cell \u2014 raw HubSpot record ID for the associated company.
    h+=_td('companyId','<td style="font-family:ui-monospace,Menlo,monospace;color:var(--grey)" title="HubSpot Company record ID">'+(row.companyId||dash)+'</td>');
    h+='<td data-no-tip="1">'+(row.brand_status?'<span class="pill" style="background:'+bsColor+'18;color:'+bsColor+'">'+row.brand_status+'</span>':dash)+'</td>';
    h+='<td data-no-tip="1"><span class="pill" style="background:'+stageColor+'18;color:'+stageColor+'">'+stageLabel+'</span></td>';
    var repHidden=bdRepHidden(repName,BD_DEAL_REP_HIDE);
    h+='<td title="'+(repHidden?'':repName)+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(repHidden?dash:(bdFirstName(repName)||dash))+'</td>';
    // SE Rep — from the company record's hubspot_owner_id, resolved via ownerMap
    var seHidden=bdRepHidden(seName,BD_SE_REP_HIDE);
    h+=_td('se_rep_id','<td title="'+(seHidden?'':seName)+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(seHidden?dash:(bdFirstName(seName)||dash))+'</td>');
    // Ops Rep — from the company record's ops_owner field, resolved via ownerMap
    var opsName=ownerMap[row.ops_owner_id]||'';
    h+=_td('ops_owner_id','<td title="'+opsName+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(bdFirstName(opsName)||dash)+'</td>');
    h+=_td('closedate','<td style="'+_datesBg+'">'+cd+'</td>');
    // Show EFFECTIVE demo date (rescheduled overrides original). Highlight
    // rescheduled rows so the override is visible at a glance — purple/bold
    // matches the rescheduled-pending color used elsewhere.
    var _bdEffDemo=row.rescheduled_meeting_date||row.date_demo_booked;
    var ddb=(_bdEffDemo||'').substring(0,10)||dash;
    var _ddbStyle=row.rescheduled_meeting_date?'color:#7C3AED;font-weight:600;':'';
    h+=_td('date_demo_booked','<td style="'+_ddbStyle+_datesBg+'">'+ddb+'</td>');
    h+=_td('createdate','<td style="'+_datesBg+'">'+crd+'</td>');
    h+=_td('to_demo','<td style="text-align:center;'+_avgDaysBg+'">'+(toDemoVal==null?dash:toDemoVal)+'</td>');
    var fromDemoVal=bdFromDemo(row);
    h+=_td('from_demo','<td style="text-align:center;'+_avgDaysBg+'">'+(fromDemoVal==null?dash:fromDemoVal)+'</td>');
    h+=_td('days_to_close','<td style="text-align:center;'+_avgDaysBg+'">'+tNum(row.days_to_close)+'</td>');
    // ── Plan Details group cells (tinted teal) ──
    // Cell-render order must match the cols[] definition order so headers
    // line up with values. Default-visible columns first
    // (Amount → Month Minimum → Plan Name → Web Traffic Tier), then the
    // collapse-only columns.
    h+=_td('amount','<td style="font-weight:600;'+_planBg+'">'+f$(row.amount)+'</td>');
    h+=_td('month_minimum','<td style="'+_planBg+'">'+(row.month_minimum?Math.round(row.month_minimum).toLocaleString():dash)+'</td>');
    var pnClean=bdPlanName(row.package_type||'');
    var pnColor=BD_PKG_COLORS[pnClean]||'#9CA3AF';
    h+=_td('package_type','<td data-no-tip="1" style="'+_planBg+'">'+(row.package_type?'<span class="pill" style="background:'+pnColor+'18;color:'+pnColor+'">'+pnClean+'</span>':dash)+'</td>');
    h+=_td('average_monthly_web_traffic__cloned_','<td data-no-tip="1" style="'+_planBg+'">'+(wtRaw?'<span class="pill" style="background:'+(BD_WT_COLORS[wtRaw]||'#9CA3AF')+'18;color:'+(BD_WT_COLORS[wtRaw]||'#9CA3AF')+'">'+wtLbl+'</span>':dash)+'</td>');
    h+=_td('original_amount','<td style="'+_planBg+'">'+(row.original_amount?f$(row.original_amount):dash)+'</td>');
    h+=_td('of_products','<td style="text-align:center;'+_planBg+'">'+tNum(row.of_products)+'</td>');
    h+=_td('of_free_reviews','<td style="text-align:center;'+_planBg+'">'+tNum(row.of_free_reviews)+'</td>');
    h+=_td('of_total_reviews','<td style="text-align:center;'+_planBg+'">'+tNum(row.of_total_reviews)+'</td>');
    h+=_td('price_per_review','<td style="'+_planBg+'">'+tMoney(row.price_per_review)+'</td>');
    h+=_td('of_clinicianai','<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+_planBg+'" title="'+row.of_clinicianai+'">'+tEnum(row.of_clinicianai)+'</td>');
    h+=_td('of_clinician_analysis','<td style="text-align:center;'+_planBg+'">'+tNum(row.of_clinician_analysis)+'</td>');
    h+=_td('clinician_ai_price_per_product','<td style="'+_planBg+'">'+tMoney(row.clinician_ai_price_per_product)+'</td>');
    h+=_td('setup_fee','<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+_planBg+'" title="'+row.setup_fee+'">'+tEnum(row.setup_fee)+'</td>');
    h+=_td('months_until_upgrade','<td style="'+_planBg+'">'+tEnum(row.months_until_upgrade)+'</td>');
    h+=_td('fee_after_upgrade','<td style="'+_planBg+'">'+tMoney(row.fee_after_upgrade)+'</td>');
    h+=_td('notes','<td data-full="'+(row.notes||'').replace(/"/g,'&quot;')+'" style="'+_planBg+'">'+tNotes(row.notes)+'</td>');
    // ── Billing Details group cells (tinted gold) ──
    var invd=(row.invoice_date||'').substring(0,10)||dash;
    var appd=(row.approval_date||'').substring(0,10)||dash;
    h+=_td('invoice_date','<td style="'+_billingBg+'">'+invd+'</td>');
    h+=_td('approval_date','<td style="'+_billingBg+'">'+appd+'</td>');
    h+=_td('internal_recurly_link','<td style="'+_billingBg+'">'+_linkCell(row.internal_recurly_link,'Recurly')+'</td>');
    h+=_td('recurly_account_management_url','<td style="'+_billingBg+'">'+_linkCell(row.recurly_account_management_url,'Account')+'</td>');
    h+=_td('recurly_billing_intake_url','<td style="'+_billingBg+'">'+_linkCell(row.recurly_billing_intake_url,'Intake')+'</td>');
    // ── Churn / Pause Details group cells (tinted light pink) ──
    var pcd=(row.pausechurn_date||'').substring(0,10)||dash;
    var brd=(row.paused_billing__billing_restart_date||'').substring(0,10)||dash;
    h+=_td('pausechurn_date','<td style="'+_churnBg+'">'+pcd+'</td>');
    h+=_td('never_implemented_churn','<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+_churnBg+'" title="'+(row.never_implemented_churn||'').replace(/"/g,'&quot;')+'">'+tEnum(row.never_implemented_churn)+'</td>');
    h+=_td('churn_reason','<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+_churnBg+'" title="'+(row.churn_reason||'').replace(/"/g,'&quot;')+'">'+tEnum(row.churn_reason)+'</td>');
    h+=_td('detailed_reason_for_churn','<td data-full="'+(row.detailed_reason_for_churn||'').replace(/"/g,'&quot;')+'" style="'+_churnBg+'">'+tNotes(row.detailed_reason_for_churn)+'</td>');
    h+=_td('paused_billing_length_months','<td style="text-align:center;'+_churnBg+'">'+tNum(row.paused_billing_length_months)+'</td>');
    h+=_td('temporary_pause_reason','<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;'+_churnBg+'" title="'+(row.temporary_pause_reason||'').replace(/"/g,'&quot;')+'">'+tEnum(row.temporary_pause_reason)+'</td>');
    h+=_td('paused_billing__billing_restart_date','<td style="'+_churnBg+'">'+brd+'</td>');
    h+='</tr>';}
  h+='</tbody></table></div></div>';
  // Post-render: charts + calc + attribution hover
  el.innerHTML=h;document.getElementById('fts').textContent='Updated: '+d.meta.generatedAt.split('T')[0];
  bdCalc();
  // Attribution hover
  var ab=document.getElementById('bd-attr-bars'),at=document.getElementById('bd-attr-tip');
  if(ab&&at){ab.querySelectorAll('.attr-row').forEach(function(row){
    row.addEventListener('mouseenter',function(){at.style.display='block';at.innerHTML='<strong>'+row.dataset.label+'</strong>: '+row.dataset.count+' deals ('+row.dataset.pct+'%) \u00b7 '+f$(parseFloat(row.dataset.mrr))+' MRR \u00b7 '+f$(parseFloat(row.dataset.acv))+' ACV';});
    row.addEventListener('mousemove',function(e){var tw=at.offsetWidth||220,vw=window.innerWidth;var x=e.clientX+12;if(x+tw>vw-8){x=e.clientX-tw-12;}at.style.left=x+'px';at.style.top=(e.clientY-30)+'px';});
    row.addEventListener('mouseleave',function(){at.style.display='none';});
  });}
  // Align the sticky column-header row flush against the bottom of the
  // sticky banner row. CSS uses a hard-coded `top: 28px` on the column
  // header, but the banner row's actual rendered height varies by ~1-3px
  // depending on font metrics. Any mismatch leaves a gap where scrolled
  // data flashes through. Measure the banner row's offsetHeight after
  // render and overwrite the column-header `top` to match exactly.
  var _bdBanner=el.querySelector('.stbl thead tr.bd-grp-row');
  if(_bdBanner){
    var _bdBh=_bdBanner.offsetHeight;
    el.querySelectorAll('.stbl thead tr:not(.bd-grp-row) th').forEach(function(th){th.style.top=_bdBh+'px';});
  } else {
    // No banner row visible (e.g. all groups collapsed AND no group cols)
    // \u2192 column header sticks at top:0 directly.
    el.querySelectorAll('.stbl thead tr:not(.bd-grp-row) th').forEach(function(th){th.style.top='0px';});
  }
  // Instant cell tooltip on the Deal Table \u2014 when a cell's content is
  // truncated by ellipsis, hover shows the full text immediately (no
  // ~800ms native-title delay). Uses event delegation on <tbody> so the
  // listener count stays at 3 regardless of row count, and works for
  // every render (the wrapper persists across renderBD calls).
  var _tbl=el.querySelector('.stbl tbody');
  // Singleton tooltip element (created once, reused across renders).
  var _ttip=document.getElementById('bd-tbl-tip');
  if(!_ttip){
    _ttip=document.createElement('div');
    _ttip.id='bd-tbl-tip';
    _ttip.className='float-tip';
    _ttip.style.maxWidth='420px';
    _ttip.style.whiteSpace='normal';
    document.body.appendChild(_ttip);
  }
  if(_tbl){
    // Move any inline title= attributes on body cells (and their inner
    // elements) into data-full, then strip the title. This prevents the
    // browser's native ~800ms tooltip from appearing on top of our instant
    // floating tooltip \u2014 they would otherwise both display, causing flicker.
    // Banner row + column header titles (which are "Toggle X columns"
    // action hints, NOT cell content) are left alone.
    _tbl.querySelectorAll('[title]').forEach(function(el){
      var t=el.getAttribute('title');if(!t)return;
      if(!el.getAttribute('data-full'))el.setAttribute('data-full',t);
      el.removeAttribute('title');
    });
    var _lastCell=null;
    // Pull the BEST available "full text" for a cell:
    //   1. data-full on the cell or any descendant \u2014 the unabbreviated value
    //      (set by tNotes-rendered cells so Notes / Detailed Reason For Churn
    //      aren't capped at 60 chars in the tooltip; also where stripped
    //      titles get migrated to).
    //   2. textContent \u2014 fall back to the cell's visible/CSS-truncated text.
    function _bdCellFullText(td){
      var v=td.getAttribute('data-full');if(v)return v.trim();
      var inner=td.querySelector('[data-full]');
      if(inner)return (inner.getAttribute('data-full')||'').trim();
      return (td.textContent||'').trim();
    }
    _tbl.addEventListener('mouseover',function(e){
      var td=e.target.closest('td');
      if(!td||td===_lastCell)return;
      _lastCell=td;
      // Columns can opt out of the tooltip with data-no-tip="1" (e.g. the
      // Web Traffic Tier pill where the visible label is already self-
      // explanatory and a tooltip is just noise).
      if(td.hasAttribute('data-no-tip')){_ttip.style.display='none';return;}
      var text=_bdCellFullText(td);
      // Only show for "longer" content (> 25 chars). Short cells (numbers,
      // dates, short labels, em-dash placeholders) don't need a tooltip
      // since the visible value is already complete.
      if(!text||text==='\u2014'||text.length<=25){_ttip.style.display='none';return;}
      _ttip.textContent=text;
      _ttip.style.display='block';
    });
    _tbl.addEventListener('mousemove',function(e){
      if(_ttip.style.display!=='block')return;
      var tw=_ttip.offsetWidth||200,th=_ttip.offsetHeight||30;
      var vw=window.innerWidth;
      var x=e.clientX+14;
      if(x+tw>vw-8)x=e.clientX-tw-14;
      var y=e.clientY-th-12;
      if(y<8)y=e.clientY+18;
      _ttip.style.left=x+'px';
      _ttip.style.top=y+'px';
    });
    _tbl.addEventListener('mouseleave',function(){_lastCell=null;_ttip.style.display='none';});
  }
  // SVG chart hover
  el.querySelectorAll('.chart-dot').forEach(function(dot){
    var tip=dot.closest('.chart-wrap').querySelector('.float-tip');
    dot.addEventListener('mouseenter',function(){if(tip){tip.style.display='block';tip.innerHTML=dot.dataset.tip;}});
    dot.addEventListener('mousemove',function(e){if(tip){var tw=tip.offsetWidth||220,vw=window.innerWidth;var x=e.clientX+12;if(x+tw>vw-8){x=e.clientX-tw-12;}tip.style.left=x+'px';tip.style.top=(e.clientY-30)+'px';}});
    dot.addEventListener('mouseleave',function(){if(tip){tip.style.display='none';}});
  });
}
function buildSVGChart(labels,values,color,suffix,isMoney){
  if(!values||!values.length)return '<div style="height:220px;display:flex;align-items:center;justify-content:center;color:var(--grey);font-size:12px">No data</div>';
  var w=700,ht=240,pad={t:24,r:24,b:40,l:58};
  var pw=w-pad.l-pad.r,ph=ht-pad.t-pad.b;
  var maxV=Math.max.apply(null,values)||1;var minV=Math.min(0,Math.min.apply(null,values));var range=maxV-minV||1;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 '+w+' '+ht+'" preserveAspectRatio="none" style="display:block">';
  // Grid lines + Y labels
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+ph-(gi/4)*ph;
    svg+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+pw)+'" y2="'+gy+'" stroke="rgba(114,164,191,0.12)" stroke-width="0.5"/>';
    var gv=minV+(gi/4)*range;
    var yTxt=isMoney?(gv>=1e6?'$'+(gv/1e6).toFixed(1)+'M':gv>=1000?'$'+Math.round(gv/1000)+'K':'$'+Math.round(gv)):Math.round(gv);
    svg+='<text x="'+(pad.l-8)+'" y="'+(gy+4)+'" text-anchor="end" fill="#64748B" font-size="11" font-family="Inter,sans-serif">'+yTxt+'</text>';
  }
  // X labels
  var step=Math.max(1,Math.floor(labels.length/14));
  for(var xi=0;xi<labels.length;xi+=step){
    var xx=pad.l+(xi/(labels.length-1||1))*pw;
    svg+='<text x="'+xx+'" y="'+(ht-pad.b+18)+'" text-anchor="middle" fill="#64748B" font-size="10" font-family="Inter,sans-serif">'+labels[xi]+'</text>';
  }
  // Build points
  var pts=[];
  for(var li=0;li<values.length;li++){
    var lx=pad.l+(li/(values.length-1||1))*pw;
    var ly=pad.t+ph-((values[li]-minV)/range)*ph;
    pts.push({x:Math.round(lx*10)/10,y:Math.round(ly*10)/10,v:values[li],l:labels[li]});
  }
  // Area fill
  var aPath='M'+pts[0].x+' '+pts[0].y;
  for(var ai2=1;ai2<pts.length;ai2++)aPath+=' L'+pts[ai2].x+' '+pts[ai2].y;
  aPath+=' L'+pts[pts.length-1].x+' '+(pad.t+ph)+' L'+pts[0].x+' '+(pad.t+ph)+' Z';
  svg+='<path d="'+aPath+'" fill="'+color+'" fill-opacity="0.06"/>';
  // Line
  var lPath='M'+pts[0].x+' '+pts[0].y;
  for(var li2=1;li2<pts.length;li2++)lPath+=' L'+pts[li2].x+' '+pts[li2].y;
  svg+='<path d="'+lPath+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round"/>';
  // Dots
  for(var di=0;di<pts.length;di++){
    svg+='<circle cx="'+pts[di].x+'" cy="'+pts[di].y+'" r="3.5" fill="'+color+'" stroke="white" stroke-width="1.5"/>';
    var tipText=pts[di].l+': '+(isMoney?'$'+Math.round(pts[di].v).toLocaleString():pts[di].v.toLocaleString()+(suffix||''));
    svg+='<circle class="chart-dot" cx="'+pts[di].x+'" cy="'+pts[di].y+'" r="14" fill="transparent" style="cursor:crosshair" data-tip="'+tipText.replace(/"/g,'&quot;')+'"/>';
  }
  // Last value label
  var last=pts[pts.length-1];
  var lastTxt=isMoney?(last.v>=1e6?'$'+(last.v/1e6).toFixed(1)+'M':'$'+Math.round(last.v).toLocaleString()):last.v.toLocaleString();
  svg+='<text x="'+(last.x-6)+'" y="'+(last.y-12)+'" text-anchor="end" fill="'+color+'" font-size="13" font-weight="bold" font-family="Inter,sans-serif">'+lastTxt+'</text>';
  svg+='</svg>';
  return '<div style="width:100%;flex:1;min-height:180px;min-width:0">'+svg+'</div>';
}
