<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FrontrowMD BD Tracker</title>
<link rel="icon" href="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/White_Graphic_Logo.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{--navy:#172C45;--midnight:#020F18;--teal:#72A4BF;--white:#FFFFFF;--border:#D4E6EF;--grey:#64748B;--teal-8:rgba(114,164,191,.08);--font-h:'Libre Baskerville',Georgia,serif;--font-b:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:linear-gradient(135deg,#F5F7FA,#EBF3F8,#D8ECF5);color:var(--navy);min-height:100vh}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#020F18,#1D4053,#72A4BF)}
.gbox{background:rgba(23,44,69,.7);backdrop-filter:blur(16px);border:1px solid rgba(114,164,191,.15);border-radius:16px;padding:40px 36px;width:340px;text-align:center}
.gbox input{width:100%;padding:12px 16px;border:1.5px solid rgba(114,164,191,.2);border-radius:50px;background:rgba(255,255,255,.06);color:#fff;font-size:14px;font-family:var(--font-b);margin-bottom:12px;outline:none}
.gbox button{width:100%;padding:12px;border:none;border-radius:50px;background:var(--teal);color:#fff;font-family:var(--font-h);font-weight:700;font-size:14px;cursor:pointer;transition:all .2s}
.gbox button:hover{background:#5E8CA8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(114,164,191,.3)}
.gbox button:active{transform:translateY(0);box-shadow:none}
#gerr{color:#EF4444;font-size:12px;margin-top:8px;display:none}
#app{display:none;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:16px 24px;border-bottom:1px solid var(--border);background:var(--white)}
#ptitle{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--navy)}
#fts{font-size:11px;color:var(--grey)}
.main{flex:1;overflow-y:auto;padding:20px 24px}
.tg{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:12px}
.tile{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:14px 16px}
.tile.hero .tval{color:var(--navy)}
.tile.warn{border-color:#F59E0B;background:rgba(245,158,11,.04)}
.tile.warn .tval{color:#D97706}
.tlbl{font-size:10px;font-weight:700;color:var(--grey);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
.tval{font-family:var(--font-h);font-size:28px;font-weight:700;color:var(--navy)}
.tdef{font-size:10px;color:var(--grey);margin-top:2px}
.pill{display:inline-block;padding:3px 10px;border-radius:50px;font-size:10px;font-weight:600;font-family:var(--font-b);white-space:nowrap}
.stbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.stbl th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);padding:8px 6px;border-bottom:2px solid var(--border);font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer}
.stbl th:hover{color:var(--navy)}
.stbl td{padding:7px 6px;border-bottom:1px solid rgba(114,164,191,.06);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stbl tr:hover{background:rgba(114,164,191,.04)}
.float-tip{display:none;position:fixed;background:#172C45;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:999;box-shadow:0 4px 12px rgba(0,0,0,.15);max-width:320px;white-space:normal;line-height:1.4}
.attr-row:hover{background:rgba(114,164,191,.04);border-radius:6px;margin-left:-8px;margin-right:-8px;padding-left:8px;padding-right:8px}
.sp{display:inline-block;width:18px;height:18px;border:3px solid rgba(114,164,191,.2);border-top-color:var(--teal);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.header-bar{display:flex;align-items:center;padding:16px 24px;background:linear-gradient(135deg,#020F18,#1D4053);border-bottom:1px solid rgba(114,164,191,.1)}
.header-bar img{height:32px;margin-right:12px}
.header-bar .title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.1em;text-transform:uppercase}
</style>
</head><body>
<div id="gate">
  <div class="gbox">
    <div style="text-align:center;margin-bottom:12px"><img src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD" style="height:36px"></div>
    <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px">BD Tracker</div>
    <input type="password" id="pw" placeholder="Team password">
    <button id="loginBtn" onclick="doLogin()">Log In →</button>
    <div id="gerr">Invalid password</div>
  </div>
</div>
<div id="app">
  <div class="header-bar">
    <img src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD">
    <div class="title">BD Tracker</div>
    <div style="flex:1"></div>
    <span id="fts" style="font-size:11px;color:rgba(114,164,191,.6);margin-right:12px"></span>
    <button onclick="bdRefresh()" id="refreshBtn" style="padding:6px 16px;border-radius:50px;border:1.5px solid rgba(114,164,191,.3);background:transparent;color:var(--teal);font-size:12px;font-weight:600;cursor:pointer;font-family:var(--font-b);display:flex;align-items:center;gap:6px;transition:all .2s">↻ Refresh</button>
  </div>
  <div class="main" id="bd-content">
    <div style="text-align:center;padding:60px"><div class="sp"></div><div style="margin-top:12px;color:var(--grey);font-size:13px">Loading BD data...</div></div>
  </div>
</div>
<script>
var BD={data:null},_bdSort='closedate',_bdSortDir='desc',_bdHideBlanks=false,_bdAttrDim='_webTraffic';
function _bdFirstOfMonth(){var _d=new Date();return _d.getFullYear()+'-'+String(_d.getMonth()+1).padStart(2,'0')+'-01';}
var _bdBrandStatusF='Active',_bdStageF='all',_bdRepF='all',_bdPkgF='all',_bdWebTrafficF='all',_bdDateFrom=_bdFirstOfMonth(),_bdDateTo='',_bdDateMode='close';
var BD_REP_COLORS=['#1565C0','#2E7D32','#72A4BF','#E65100','#5C6BC0','#00897B','#C62828','#6A1B9A','#EF6C00','#00695C'];
var _bdArrGoal='',_bdAcvInput='';
var BD_STAGE_LABELS={appointmentscheduled:'Scheduled','1084214349':'Demo Happened',decisionmakerboughtin:'Decision Maker',contractsent:'Contract Sent',closedwon:'Closed Won',closedlost:'Closed Lost','3453957850':'No Show','3453925110':'Churned','1062974581':'Not a Fit','3517067985':'Churned (Onb)'};
var BD_STAGE_COLORS={appointmentscheduled:'#F59E0B','1084214349':'#0EA5E9',decisionmakerboughtin:'#7C3AED',contractsent:'#1565C0',closedwon:'#16A34A',closedlost:'#9CA3AF','3453957850':'#EF4444','3453925110':'#EF4444','1062974581':'#64748B','3517067985':'#DC2626'};
var BD_STATUS_COLORS={Signed:'#16A34A',Paying:'#172C45',Paused:'#F59E0B',Churned:'#DC2626','Never Implemented - Churned':'#9CA3AF'};
// Plan color palette. New main plans (Hero/Core/Portfolio) get the most
// prominent colors; legacy plans are muted. Distinct enough to read on
// stage badges and the Deal Attribution chart side-by-side.
var BD_PKG_COLORS={
  Hero:'#DC2626',        // crimson — new flagship
  Core:'#0EA5E9',        // sky blue — middle tier
  Portfolio:'#7C3AED',   // purple — multi-product premium
  Beginner:'#9CA3AF',    // grey
  Starter:'#F59E0B',     // amber
  Flagship:'#0891B2',    // teal (recolored to free up blue for Core)
  Pro:'#172C45',         // dark navy
  'Full Access':'#16A34A'// green
};
// Display order — used by the filter pill row, table sort, and the
// Deal Attribution chart when Plan Name is the active dimension.
var BD_PKG_ORDER={Hero:1,Core:2,Portfolio:3,Beginner:4,Starter:5,Flagship:6,Pro:7,'Full Access':8};
function doLogin(){
  var btn=document.getElementById('loginBtn');
  btn.innerHTML='<span class="sp" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle"></span> Logging in...';btn.disabled=true;btn.style.opacity='.7';
  var pw=document.getElementById('pw').value;
  fetch('/api/bd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw})}).then(function(r){return r.json();}).then(function(d){
    if(d.error){document.getElementById('gerr').style.display='block';btn.innerHTML='Log In \u2192';btn.disabled=false;btn.style.opacity='1';return;}
    BD.pw=pw;BD.data=d;document.getElementById('gate').style.display='none';document.getElementById('app').style.display='block';renderBD();
    bdLookupMissingCompanies();
  }).catch(function(){document.getElementById('gerr').style.display='block';btn.innerHTML='Log In \u2192';btn.disabled=false;btn.style.opacity='1';});
}
// Background fetch of missing company names. /api/bd skips live company
// lookups (uses cached names only) to stay under the per-invocation
// subrequest budget. This calls /api/bd/lookup-companies which has its
// own fresh budget, merges results into BD.data.deals, and re-renders.
// If more companies remain (deferred>0), recurses until cache is full.
function bdLookupMissingCompanies(){
  if(!BD.pw||!BD.data||!BD.data.missingCompanyIds||!BD.data.missingCompanyIds.length)return;
  var ids=BD.data.missingCompanyIds.slice(); // copy
  // Show loading hint in the All Deals header (if rendered)
  var hint=document.getElementById('bd-co-hint');
  if(hint){hint.textContent=' \u00b7 loading '+ids.length+' company names\u2026';hint.style.display='inline';}
  fetch('/api/bd/lookup-companies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:BD.pw,companyIds:ids})}).then(function(r){return r.json();}).then(function(d){
    if(!d||!d.ok||!d.companies)return;
    // Build a companyId \u2192 {name, id} lookup
    var nameMap=d.companies;
    // Patch each deal's companyName from the lookup
    BD.data.deals.forEach(function(deal){
      if(deal.companyId&&!deal.companyName&&nameMap[deal.companyId]){
        deal.companyName=nameMap[deal.companyId].name||'';
      }
    });
    // Recompute missing list (some may still be missing if deferred>0)
    BD.data.missingCompanyIds=BD.data.missingCompanyIds.filter(function(id){return !nameMap[id];});
    renderBD();
    if(hint){
      if(d.deferred>0){hint.textContent=' \u00b7 '+d.deferred+' more queued\u2026';bdLookupMissingCompanies();}
      else{hint.style.display='none';}
    } else if(d.deferred>0){bdLookupMissingCompanies();}
  }).catch(function(e){console.warn('bdLookupMissingCompanies failed:',e);if(hint)hint.style.display='none';});
}
function bdRefresh(){
  if(!BD.pw)return;
  var btn=document.getElementById('refreshBtn');btn.innerHTML='<span class="sp" style="width:12px;height:12px;border-width:2px;display:inline-block;vertical-align:middle"></span> Loading...';btn.disabled=true;
  fetch('/api/bd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:BD.pw})}).then(function(r){return r.json();}).then(function(d){
    if(!d.error){BD.data=d;renderBD();bdLookupMissingCompanies();}
    btn.innerHTML='\u21bb Refresh';btn.disabled=false;
  }).catch(function(){btn.innerHTML='\u21bb Refresh';btn.disabled=false;});
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function f$(v){if(v==null||isNaN(v))return'\u2014';return'$'+Math.round(v).toLocaleString();}
function fmtInput(el){var v=el.value.replace(/[^0-9]/g,'');el.value=v?parseInt(v).toLocaleString():'';}
function parseInput(s){return parseFloat((s||'').replace(/[^0-9.]/g,''))||0;}
function bdClearDate(){_bdDateFrom='';_bdDateTo='';renderBD();}
function bdResetFilters(){_bdBrandStatusF='Active';_bdStageF='all';_bdRepF='all';_bdPkgF='all';_bdWebTrafficF='all';_bdDateFrom=_bdFirstOfMonth();_bdDateTo='';_bdDateMode='close';renderBD();}
function bdCalc(){var el=document.getElementById('bd-calc-result');if(!el)return;var goal=parseInput(_bdArrGoal);var acvIn=parseInput(_bdAcvInput);if(!goal||!acvIn){el.textContent='\u2014';return;}var d=BD.data;if(!d)return;var cw=d.deals.filter(function(dd){return dd.dealstage==='closedwon';});var active=cw.filter(function(dd){return !['Paused','Churned','Never Implemented - Churned'].includes(dd.brand_status);});var currentARR=0;active.forEach(function(dd){currentARR+=dd.amount;});currentARR*=12;var gap=goal-currentARR;if(gap<=0){el.innerHTML='<span style="color:#16A34A">\u2713 Goal reached!</span>';return;}var needed=Math.ceil(gap/(acvIn*12));el.innerHTML='<span style="font-size:32px">'+needed+'</span> <span style="font-size:14px;color:var(--grey)">deals needed</span>';}
function renderBD(){
  var d=BD.data;if(!d||!d.deals)return;var el=document.getElementById('bd-content');var deals=d.deals,ownerMap=d.ownerMap||{};
  var fp=function(active,label,onclick){return '<span class="pill '+(active?'active':'')+'" style="cursor:pointer;'+(active?'background:var(--navy);color:#fff;':'background:rgba(23,44,69,.06);color:var(--navy);')+'font-size:11px;padding:4px 12px;font-weight:600" onclick="'+onclick+'">'+label+'</span>';};
  var closedWonDeals=deals.filter(function(dd){return dd.dealstage==='closedwon';});
  var activeDeals=closedWonDeals.filter(function(dd){return !['Paused','Churned','Never Implemented - Churned'].includes(dd.brand_status);});
  var totalMRR=0;activeDeals.forEach(function(dd){totalMRR+=dd.amount;});var totalARR=totalMRR*12;var acv=activeDeals.length>0?totalMRR/activeDeals.length:0;
  var h='';
  // KPIs
  h+='<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;align-items:stretch">';
  h+='<div class="tile hero" style="border-left:3px solid #16A34A;display:flex;flex-direction:column;justify-content:center"><div class="tlbl">Signed Brands</div><div class="tval">'+activeDeals.length+'</div><div class="tdef">Closed Won excl. Paused/Churned</div></div>';
  h+='<div class="tile hero" style="border-left:3px solid #172C45;display:flex;flex-direction:column;justify-content:center"><div class="tlbl">Signed ARR</div><div class="tval">'+f$(totalARR)+'</div><div class="tdef">MRR \u00d7 12</div></div>';
  h+='<div class="tile hero" style="border-left:3px solid var(--teal);display:flex;flex-direction:column;justify-content:center"><div class="tlbl">Signed MRR</div><div class="tval">'+f$(totalMRR)+'</div><div class="tdef">Sum of amount on active deals</div></div>';
  h+='<div class="tile hero" style="border-left:3px solid #7C3AED;display:flex;flex-direction:column;justify-content:center"><div class="tlbl">Signed ACV</div><div class="tval">'+f$(acv)+'</div><div class="tdef">MRR \u00f7 Signed Brands</div></div>';
  // Calculator
  h+='<div class="tile" style="border:1.5px solid var(--teal);background:rgba(114,164,191,.04)">';
  h+='<div class="tlbl" style="color:var(--teal)">Deals to Hit Monthly Goal</div>';
  h+='<div style="display:flex;gap:6px;margin:6px 0">';
  h+='<div style="flex:1"><div style="font-size:8px;color:var(--grey);margin-bottom:2px">ARR Goal</div><input id="bd-arr-goal" type="text" value="'+_bdArrGoal+'" placeholder="e.g. 500,000" oninput="fmtInput(this);_bdArrGoal=this.value;bdCalc()" style="width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font-b);color:var(--navy)"></div>';
  h+='<div style="flex:1"><div style="font-size:8px;color:var(--grey);margin-bottom:2px">ACV</div><input id="bd-acv-input" type="text" value="'+_bdAcvInput+'" placeholder="e.g. '+Math.round(acv).toLocaleString()+'" oninput="fmtInput(this);_bdAcvInput=this.value;bdCalc()" style="width:100%;padding:6px 10px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:var(--font-b);color:var(--navy)"></div></div>';
  h+='<div id="bd-calc-result" style="font-family:var(--font-h);font-weight:700;color:var(--navy);margin-top:6px">\u2014</div>';
  h+='<div style="font-size:8px;color:var(--grey);margin-top:2px">(ARR Goal \u2212 Signed ARR) \u00f7 (ACV \u00d7 12)</div>';
  h+='</div></div>';
  // Charts - build monthly cumulative from active (Paying+Signed) deals only
  var chartDeals=closedWonDeals.filter(function(dd){return dd.brand_status==='Paying'||dd.brand_status==='Signed';});
  var _chartMonthMap={};chartDeals.forEach(function(dd){var cd=dd.closedate;if(!cd)return;var m=cd.substring(0,7);if(!_chartMonthMap[m])_chartMonthMap[m]={added:0,addedMRR:0};_chartMonthMap[m].added++;_chartMonthMap[m].addedMRR+=dd.amount;});
  // Subtract churned/paused by their close month (approximate)
  var _chartMonths=Object.keys(_chartMonthMap).sort();
  var _cumB=[],_cumA=[],_cumL=[];var rB=0,rA=0;var mN=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  for(var mi=0;mi<_chartMonths.length;mi++){var md=_chartMonthMap[_chartMonths[mi]];rB+=md.added;rA+=md.addedMRR*12;_cumB.push(rB);_cumA.push(rA);var p=_chartMonths[mi].split('-');_cumL.push(mN[parseInt(p[1])-1]+' '+p[0].substring(2));}
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;min-width:0">';
  h+='<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;min-width:0;overflow:hidden;display:flex;flex-direction:column" class="chart-wrap"><div style="font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px">Signed Brands <span style="font-size:11px;color:var(--grey);font-family:var(--font-b);font-weight:400">'+rB+' total</span></div>'+buildSVGChart(_cumL,_cumB,'#172C45',' brands',false)+'<div id="bd-brands-tip" class="float-tip"></div></div>';
  h+='<div style="background:var(--white);border:1px solid var(--border);border-radius:12px;padding:16px 20px;position:relative;min-width:0;overflow:hidden;display:flex;flex-direction:column" class="chart-wrap"><div style="font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--navy);margin-bottom:4px">Signed ARR <span style="font-size:11px;color:var(--grey);font-family:var(--font-b);font-weight:400">'+f$(rA)+'</span></div>'+buildSVGChart(_cumL,_cumA,'#16A34A','',true)+'<div id="bd-arr-tip" class="float-tip"></div></div>';
  h+='</div>';
  // Shared Filtered
  var sharedFiltered=deals.filter(function(dd){
    if(_bdBrandStatusF==='Active'){if(!['Signed','Paying'].includes(dd.brand_status))return false;}
    else if(_bdBrandStatusF==='Not Active'){if(!['Paused','Churned','Never Implemented - Churned'].includes(dd.brand_status))return false;}
    else if(_bdBrandStatusF!=='all'&&dd.brand_status!==_bdBrandStatusF)return false;
    if(_bdStageF!=='all'&&dd.dealstage!==_bdStageF)return false;
    if(_bdRepF!=='all'){var rn=ownerMap[dd.hubspot_owner_id]||'Unassigned';if(rn!==_bdRepF)return false;}
    if(_bdPkgF!=='all'&&dd.package_type!==_bdPkgF)return false;
    if(_bdWebTrafficF!=='all'&&dd.average_monthly_web_traffic__cloned_!==_bdWebTrafficF)return false;
    if(_bdDateFrom||_bdDateTo){
      var _bdDf;
      if(_bdDateMode==='create')_bdDf=(dd.createdate||dd.hs_createdate||'').substring(0,10);
      else if(_bdDateMode==='demo')_bdDf=(dd.date_demo_booked||'').substring(0,10);
      else _bdDf=(dd.closedate||'').substring(0,10);
      if(_bdDateFrom&&_bdDf<_bdDateFrom)return false;
      if(_bdDateTo&&_bdDf>_bdDateTo)return false;
    }
    return true;});
  // Plan name display: strip trailing parenthetical (e.g., "Hero (1 Product)" → "Hero")
  function bdPlanName(v){return (v||'').replace(/\s*\([^)]*\)\s*$/,'');}
  // Days from date_demo_booked → closedate (rounded). Null if either field
  // missing or closedate precedes the booking. Used in the "From Demo"
  // table column and the Avg Days to Close KPI tile.
  function bdFromDemo(d){
    if(!d||!d.closedate||!d.date_demo_booked)return null;
    var t1=new Date(d.date_demo_booked).getTime();
    var t2=new Date(d.closedate).getTime();
    if(isNaN(t1)||isNaN(t2)||t2<t1)return null;
    return Math.round((t2-t1)/86400000);
  }
  // Web Traffic Tier short-label map
  var BD_WT_LABELS={'Pre-launch / just launching':'Pre-launch','0-10K monthly web visitors':'0-10K','10-25K monthly web visitors':'10-25K','25-50K monthly web visitors':'25-50K','50-100K monthly web visitors':'50-100K','100-200K monthly web visitors':'100-200K','200-500K monthly web visitors':'200-500K','500K+ monthly web visitors':'500K+'};
  var BD_WT_COLORS={'Pre-launch / just launching':'#9CA3AF','0-10K monthly web visitors':'#72A4BF','10-25K monthly web visitors':'#1D4053','25-50K monthly web visitors':'#172C45','50-100K monthly web visitors':'#0EA5E9','100-200K monthly web visitors':'#7C3AED','200-500K monthly web visitors':'#16A34A','500K+ monthly web visitors':'#F59E0B'};
  var BD_WT_ORDER={'Pre-launch / just launching':0,'0-10K monthly web visitors':1,'10-25K monthly web visitors':2,'25-50K monthly web visitors':3,'50-100K monthly web visitors':4,'100-200K monthly web visitors':5,'200-500K monthly web visitors':6,'500K+ monthly web visitors':7};
  var uniqWebTrafficBD={};deals.forEach(function(dd){if(dd.average_monthly_web_traffic__cloned_)uniqWebTrafficBD[dd.average_monthly_web_traffic__cloned_]=1;});
  // Build rep color map from full deal set (stable colors regardless of filter)
  var repCount={};

  for(var ci2=0;ci2<cols.length;ci2++){var c=cols[ci2];var isS=_bdSort===c.k;h+='<th onclick="'+(c.k?"_bdSort='"+c.k+"';_bdSortDir=_bdSortDir==='asc'?'desc':'asc';renderBD()":"")+'">'+c.l+(isS?(_bdSortDir==='asc'?' \u25B2':' \u25BC'):'')+'</th>';}
  h+='</tr></thead><tbody>';
  // Cell helpers
  var dash='<span style="color:#ccc">\u2014</span>';
  function tNum(v){if(v===''||v==null||v===0)return v===0?'0':dash;return v;}
  function tMoney(v){return v?f$(parseFloat(v)||0):dash;}
  function tEnum(v){return v||dash;}
  function tNotes(v){if(!v)return dash;var t=String(v);if(t.length>60)return '<span title="'+t.replace(/"/g,'&quot;')+'">'+t.substring(0,60)+'\u2026</span>';return t;}
  for(var ri=0;ri<sorted.length;ri++){var row=sorted[ri];
    var bsColor=BD_STATUS_COLORS[row.brand_status]||'#9CA3AF';
    var stageLabel=BD_STAGE_LABELS[row.dealstage]||row.dealstage||'\u2014';
    var stageColor=BD_STAGE_COLORS[row.dealstage]||'#9CA3AF';
    var cd=(row.closedate||'').substring(0,10)||'\u2014';
    var crd=(row.createdate||'').substring(0,10)||'\u2014';
    var repName=ownerMap[row.hubspot_owner_id]||'';
    var wtRaw=row.average_monthly_web_traffic__cloned_||'';
    var wtLbl=wtRaw?(BD_WT_LABELS[wtRaw]||wtRaw):'\u2014';
    h+='<tr>';
    h+='<td><div style="display:flex;align-items:center;gap:4px;overflow:hidden"><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+row.dealname+'">'+row.dealname+'</span><a href="https://app.hubspot.com/contacts/46815331/record/0-3/'+row.id+'" target="_blank" style="flex-shrink:0;display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;border-radius:4px;background:rgba(114,164,191,.1);color:var(--teal);font-size:9px;text-decoration:none">\u2197</a></div></td>';
    // Company cell \u2014 the name itself is now the clickable link to the
    // HubSpot company record (was a tiny arrow icon next to plain text).
    // If we have no companyId, render the name as-is or "\u2014".
    var coName=row.companyName||'';
    var coUrl=row.companyId?'https://app.hubspot.com/contacts/46815331/record/0-2/'+row.companyId:'';
    var coCell;
    if(coName&&coUrl){
      coCell='<a href="'+coUrl+'" target="_blank" title="'+coName.replace(/"/g,'&quot;')+'" style="color:var(--teal);text-decoration:none;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%">'+coName+' \u2197</a>';
    } else if(coName){
      coCell='<span title="'+coName.replace(/"/g,'&quot;')+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:inline-block;max-width:100%">'+coName+'</span>';
    } else {
      coCell=dash;
    }
    h+='<td>'+coCell+'</td>';
    h+='<td>'+(row.brand_status?'<span class="pill" style="background:'+bsColor+'18;color:'+bsColor+'">'+row.brand_status+'</span>':dash)+'</td>';
    h+='<td><span class="pill" style="background:'+stageColor+'18;color:'+stageColor+'">'+stageLabel+'</span></td>';
    h+='<td title="'+repName+'" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(repName.split(' ')[0]||dash)+'</td>';
    h+='<td>'+cd+'</td>';
    var ddb=(row.date_demo_booked||'').substring(0,10)||dash;
    h+='<td>'+ddb+'</td>';
    h+='<td style="font-size:10px">'+crd+'</td>';
    var fromDemoVal=bdFromDemo(row);
    h+='<td style="text-align:center">'+(fromDemoVal==null?dash:fromDemoVal)+'</td>';
    h+='<td style="text-align:center">'+tNum(row.days_to_close)+'</td>';
    h+='<td style="font-weight:600">'+f$(row.amount)+'</td>';
    h+='<td>'+(row.original_amount?f$(row.original_amount):dash)+'</td>';
    // Plan-name color: look up the CLEANED plan name (strips trailing
    // "(1 Product)" etc.) so colors match the Deal Attribution chart,
    // which also uses bdPlanName for its keying.
    var pnClean=bdPlanName(row.package_type||'');
    var pnColor=BD_PKG_COLORS[pnClean]||'#9CA3AF';
    h+='<td>'+(row.package_type?'<span class="pill" style="background:'+pnColor+'18;color:'+pnColor+'" title="'+row.package_type+'">'+pnClean+'</span>':dash)+'</td>';
    h+='<td>'+(wtRaw?'<span class="pill" style="background:'+(BD_WT_COLORS[wtRaw]||'#9CA3AF')+'18;color:'+(BD_WT_COLORS[wtRaw]||'#9CA3AF')+'" title="'+wtRaw+'">'+wtLbl+'</span>':dash)+'</td>';
    h+='<td style="text-align:center">'+tNum(row.of_products)+'</td>';
    h+='<td>'+(row.month_minimum?Math.round(row.month_minimum).toLocaleString():dash)+'</td>';
    h+='<td style="text-align:center">'+tNum(row.of_free_reviews)+'</td>';
    h+='<td style="text-align:center">'+tNum(row.of_total_reviews)+'</td>';
    h+='<td>'+tMoney(row.price_per_review)+'</td>';
    h+='<td style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+row.of_clinicianai+'">'+tEnum(row.of_clinicianai)+'</td>';
    h+='<td style="text-align:center">'+tNum(row.of_clinician_analysis)+'</td>';
    h+='<td>'+tMoney(row.clinician_ai_price_per_product)+'</td>';
    h+='<td style="font-size:10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="'+row.setup_fee+'">'+tEnum(row.setup_fee)+'</td>';
    h+='<td>'+tEnum(row.months_until_upgrade)+'</td>';
    h+='<td>'+tMoney(row.fee_after_upgrade)+'</td>';
    h+='<td style="font-size:10px">'+tNotes(row.notes)+'</td>';
    h+='</tr>';}
  h+='</tbody></table></div></div>';
  // Post-render: charts + calc + attribution hover
  el.innerHTML=h;document.getElementById('fts').textContent='Updated: '+d.meta.generatedAt.split('T')[0];
  bdCalc();
  // Attribution hover
  var ab=document.getElementById('bd-attr-bars'),at=document.getElementById('bd-attr-tip');
  if(ab&&at){ab.querySelectorAll('.attr-row').forEach(function(row){
    row.addEventListener('mouseenter',function(){at.style.display='block';at.innerHTML='<strong>'+row.dataset.label+'</strong>: '+row.dataset.count+' deals ('+row.dataset.pct+'%) \u00b7 '+f$(parseFloat(row.dataset.mrr))+' MRR';});
    row.addEventListener('mousemove',function(e){var tw=at.offsetWidth||220,vw=window.innerWidth;var x=e.clientX+12;if(x+tw>vw-8){x=e.clientX-tw-12;}at.style.left=x+'px';at.style.top=(e.clientY-30)+'px';});
    row.addEventListener('mouseleave',function(){at.style.display='none';});
  });}
  // SVG chart hover
  el.querySelectorAll('.chart-dot').forEach(function(dot){
    var tip=dot.closest('.chart-wrap').querySelector('.float-tip');
    dot.addEventListener('mouseenter',function(){if(tip){tip.style.display='block';tip.innerHTML=dot.dataset.tip;}});
    dot.addEventListener('mousemove',function(e){if(tip){var tw=tip.offsetWidth||220,vw=window.innerWidth;var x=e.clientX+12;if(x+tw>vw-8){x=e.clientX-tw-12;}tip.style.left=x+'px';tip.style.top=(e.clientY-30)+'px';}});
    dot.addEventListener('mouseleave',function(){if(tip){tip.style.display='none';}});
  });
}
function buildSVGChart(labels,values,color,suffix,isMoney){
  if(!values||!values.length)return '<div style="height:220px;display:flex;align-items:center;justify-content:center;color:var(--grey);font-size:12px">No data</div>';
  var w=700,ht=240,pad={t:24,r:24,b:40,l:58};
  var pw=w-pad.l-pad.r,ph=ht-pad.t-pad.b;
  var maxV=Math.max.apply(null,values)||1;var minV=Math.min(0,Math.min.apply(null,values));var range=maxV-minV||1;
  var svg='<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 '+w+' '+ht+'" preserveAspectRatio="none" style="display:block">';
  // Grid lines + Y labels
  for(var gi=0;gi<=4;gi++){
    var gy=pad.t+ph-(gi/4)*ph;
    svg+='<line x1="'+pad.l+'" y1="'+gy+'" x2="'+(pad.l+pw)+'" y2="'+gy+'" stroke="rgba(114,164,191,0.12)" stroke-width="0.5"/>';
    var gv=minV+(gi/4)*range;
    var yTxt=isMoney?(gv>=1e6?'$'+(gv/1e6).toFixed(1)+'M':gv>=1000?'$'+Math.round(gv/1000)+'K':'$'+Math.round(gv)):Math.round(gv);
    svg+='<text x="'+(pad.l-8)+'" y="'+(gy+4)+'" text-anchor="end" fill="#64748B" font-size="11" font-family="Inter,sans-serif">'+yTxt+'</text>';
  }
  // X labels
  var step=Math.max(1,Math.floor(labels.length/14));
  for(var xi=0;xi<labels.length;xi+=step){
    var xx=pad.l+(xi/(labels.length-1||1))*pw;
    svg+='<text x="'+xx+'" y="'+(ht-pad.b+18)+'" text-anchor="middle" fill="#64748B" font-size="10" font-family="Inter,sans-serif">'+labels[xi]+'</text>';
  }
  // Build points
  var pts=[];
  for(var li=0;li<values.length;li++){
    var lx=pad.l+(li/(values.length-1||1))*pw;
    var ly=pad.t+ph-((values[li]-minV)/range)*ph;
    pts.push({x:Math.round(lx*10)/10,y:Math.round(ly*10)/10,v:values[li],l:labels[li]});
  }
  // Area fill
  var aPath='M'+pts[0].x+' '+pts[0].y;
  for(var ai2=1;ai2<pts.length;ai2++)aPath+=' L'+pts[ai2].x+' '+pts[ai2].y;
  aPath+=' L'+pts[pts.length-1].x+' '+(pad.t+ph)+' L'+pts[0].x+' '+(pad.t+ph)+' Z';
  svg+='<path d="'+aPath+'" fill="'+color+'" fill-opacity="0.06"/>';
  // Line
  var lPath='M'+pts[0].x+' '+pts[0].y;
  for(var li2=1;li2<pts.length;li2++)lPath+=' L'+pts[li2].x+' '+pts[li2].y;
  svg+='<path d="'+lPath+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linejoin="round"/>';
  // Dots
  for(var di=0;di<pts.length;di++){
    svg+='<circle cx="'+pts[di].x+'" cy="'+pts[di].y+'" r="3.5" fill="'+color+'" stroke="white" stroke-width="1.5"/>';
    var tipText=pts[di].l+': '+(isMoney?'$'+Math.round(pts[di].v).toLocaleString():pts[di].v.toLocaleString()+(suffix||''));
    svg+='<circle class="chart-dot" cx="'+pts[di].x+'" cy="'+pts[di].y+'" r="14" fill="transparent" style="cursor:crosshair" data-tip="'+tipText.replace(/"/g,'&quot;')+'"/>';
  }
  // Last value label
  var last=pts[pts.length-1];
  var lastTxt=isMoney?(last.v>=1e6?'$'+(last.v/1e6).toFixed(1)+'M':'$'+Math.round(last.v).toLocaleString()):last.v.toLocaleString();
  svg+='<text x="'+(last.x-6)+'" y="'+(last.y-12)+'" text-anchor="end" fill="'+color+'" font-size="13" font-weight="bold" font-family="Inter,sans-serif">'+lastTxt+'</text>';
  svg+='</svg>';
  return '<div style="width:100%;flex:1;min-height:180px;min-width:0">'+svg+'</div>';
}
