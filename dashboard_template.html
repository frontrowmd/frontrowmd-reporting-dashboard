<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FrontrowMD — Marketing Performance Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  /* ── Password Gate ───────────────────────────────────────────── */
  #pw-gate{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#020F18 0%,#1D4053 50%,#72A4BF 100%);display:flex;align-items:center;justify-content:center;font-family:'Libre Baskerville',Georgia,serif;}
  #pw-gate.hidden{display:none;}
  .pw-box{background:rgba(255,255,255,0.06);border:1px solid rgba(114,164,191,0.25);border-radius:16px;padding:48px 56px;text-align:center;max-width:420px;width:90%;}
  .pw-logo{font-size:18px;color:rgba(255,255,255,0.85);margin-bottom:28px;display:flex;align-items:center;justify-content:center;gap:8px;}
  .pw-logo strong{font-weight:700;color:#fff;} .pw-logo span{color:#72A4BF;}
  .pw-title{font-size:20px;font-weight:700;color:#fff;margin-bottom:8px;}
  .pw-sub{font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:28px;}
  .pw-input{width:100%;padding:13px 18px;border-radius:50px;border:1.5px solid rgba(114,164,191,0.4);background:rgba(255,255,255,0.08);color:#fff;font-family:'Libre Baskerville',Georgia,serif;font-size:15px;outline:none;text-align:center;letter-spacing:0.06em;}
  .pw-input::placeholder{color:rgba(255,255,255,0.3);} .pw-input:focus{border-color:#72A4BF;background:rgba(255,255,255,0.12);}
  .pw-btn{margin-top:16px;width:100%;padding:14px;border-radius:50px;border:none;background:#172C45;color:#fff;font-family:'Libre Baskerville',Georgia,serif;font-size:15px;font-weight:700;cursor:pointer;transition:all 0.2s;}
  .pw-btn:hover{background:#020F18;transform:translateY(-1px);}
  .pw-error{margin-top:12px;font-size:13px;color:#e74c3c;min-height:18px;}
</style>
<style>
  :root {
    --midnight:    #020F18;
    --deep-navy:   #172C45;
    --mid-navy:    #1D4053;
    --soft-teal:   #72A4BF;
    --white:       #FFFFFF;
    --card-bg:     rgba(114,164,191,0.08);
    --card-border: #D4E6EF;
    --teal-10:     rgba(114,164,191,0.10);
    --grad-dark:   linear-gradient(135deg,#020F18 0%,#1D4053 50%,#72A4BF 100%);
    --grad-light:  linear-gradient(135deg,#F5F7FA 0%,#EBF3F8 60%,#D8ECF5 100%);
    --shadow-sm:   0 2px 12px rgba(23,44,69,0.06);
    --shadow-md:   0 4px 16px rgba(2,15,24,0.12);
    --shadow-hov:  0 8px 24px rgba(23,44,69,0.12);
    --warn-bg:     #FFF8E1; --warn-tx: #B8860B;
    --good-bg:     rgba(26,107,58,0.08); --good-tx: #1A6B3A;
    --danger-bg:   rgba(192,57,43,0.07); --danger-tx: #C0392B;
    --up:   #1A6B3A; --up-bg:   rgba(26,107,58,0.10);
    --down: #C0392B; --down-bg: rgba(192,57,43,0.09);
    --flat: #5a7a8a; --flat-bg: rgba(90,122,138,0.09);
    --radius:14px; --pill:50px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--grad-light);color:var(--midnight);font-family:'Libre Baskerville',Georgia,serif;font-size:14px;line-height:1.65;min-height:100vh;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background-image:repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(114,164,191,0.04) 20px,rgba(114,164,191,0.04) 22px);}
  .wrap{max-width:1360px;margin:0 auto;padding:0 40px 80px;position:relative;z-index:1;}

  /* HEADER */
  header{background:var(--grad-dark);margin:0 -40px 48px;padding:36px 48px 32px;display:flex;align-items:center;justify-content:space-between;position:relative;overflow:hidden;}
  header::after{content:'';position:absolute;right:0;top:0;bottom:0;width:340px;background:radial-gradient(ellipse at right center,rgba(114,164,191,0.12) 0%,transparent 70%);pointer-events:none;}
  .logo-img{height:40px;width:auto;display:block;}
  .logo-fallback{font-size:18px;font-weight:400;color:rgba(255,255,255,0.85);letter-spacing:0.02em;display:flex;align-items:center;gap:8px;}
  .logo-fallback strong{font-weight:700;color:var(--white);}
  h1{font-size:clamp(22px,2.8vw,34px);font-weight:700;color:var(--white);line-height:1.2;margin-top:14px;}
  h1 em{font-style:normal;color:var(--soft-teal);}
  .header-right{text-align:right;position:relative;z-index:1;flex-shrink:0;}
  .gen-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:rgba(255,255,255,0.4);margin-bottom:4px;}
  .gen-time{font-size:14px;color:rgba(255,255,255,0.85);}
  .ds-pills{display:flex;gap:6px;justify-content:flex-end;margin-top:12px;flex-wrap:wrap;}
  .ds-pill{font-size:10px;letter-spacing:0.06em;padding:4px 12px;border-radius:var(--pill);border:1px solid rgba(114,164,191,0.35);color:rgba(255,255,255,0.6);}

  /* TABS */
  .tabs{display:flex;gap:6px;margin-bottom:36px;}
  .tab{font-family:'Libre Baskerville',Georgia,serif;font-size:13px;padding:10px 26px;border-radius:var(--pill);cursor:pointer;border:1.5px solid var(--card-border);background:transparent;color:var(--mid-navy);transition:all 0.2s ease;}
  .tab:hover{border-color:var(--soft-teal);background:var(--teal-10);}
  .tab.active{background:var(--deep-navy);color:var(--white);border-color:var(--deep-navy);font-weight:700;}
  .tab:focus{outline:2px solid var(--soft-teal);outline-offset:2px;}

  /* PANELS */
  .panel{display:none;}
  .panel.active{display:block;animation:fadeUp 0.3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  /* SECTION LABEL */
  .sl{font-size:10px;font-weight:700;letter-spacing:0.22em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:16px;display:flex;align-items:center;gap:14px;}
  .sl::after{content:'';flex:1;height:1px;background:var(--card-border);}

  /* DELTA BADGE */
  .delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--pill);margin-top:6px;}
  .delta-up  {background:var(--up-bg);  color:var(--up);}
  .delta-down{background:var(--down-bg);color:var(--down);}
  .delta-flat{background:var(--flat-bg);color:var(--flat);}
  .delta-sub {font-size:10px;font-weight:400;opacity:0.7;margin-left:2px;}

  /* DARK STAT CARDS */
  .stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:32px;}
  .stat-card{background:linear-gradient(135deg,var(--deep-navy),var(--mid-navy));border-radius:var(--radius);padding:24px 28px;color:var(--white);box-shadow:var(--shadow-md);position:relative;overflow:hidden;}
  .stat-card::after{content:'';position:absolute;right:-10px;bottom:-10px;width:80px;height:80px;border-radius:50%;background:rgba(114,164,191,0.08);}
  .sc-label{font-size:10px;letter-spacing:0.18em;text-transform:uppercase;color:rgba(114,164,191,0.75);margin-bottom:8px;}
  .sc-value{font-size:36px;font-weight:700;line-height:1;}
  .sc-sub{font-size:12px;color:rgba(255,255,255,0.45);margin-top:6px;font-style:italic;}
  .sc-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;padding:2px 8px;border-radius:var(--pill);margin-top:8px;}
  .sc-delta-up  {background:rgba(26,107,58,0.25); color:#7ecda0;}
  .sc-delta-down{background:rgba(192,57,43,0.25); color:#f09090;}
  .sc-delta-flat{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.5);}

  /* KPI GRID */
  .kpi-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(185px,1fr));gap:14px;margin-bottom:32px;}
  .kpi{background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius);padding:22px 24px;box-shadow:var(--shadow-sm);position:relative;overflow:hidden;transition:transform 0.2s ease,box-shadow 0.2s ease;}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--shadow-hov);}
  .kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--kpi-stripe,var(--soft-teal));}
  .kpi-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:10px;}
  .kpi-value{font-size:30px;font-weight:700;color:var(--deep-navy);line-height:1;}
  .kpi-sub{font-size:11px;color:#8a9aaa;margin-top:6px;font-style:italic;}
  .kpi-navy{--kpi-stripe:var(--deep-navy);}
  .kpi-good{--kpi-stripe:#2E7D52;}

  /* CHART CARDS */
  .charts-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
  .chart-card{background:var(--white);border:1px solid var(--card-border);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow-sm);transition:transform 0.2s ease,box-shadow 0.2s ease;}
  .chart-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-hov);}
  .chart-title{font-size:10px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid var(--card-border);display:flex;align-items:center;justify-content:space-between;}
  .chart-title-meta{font-size:11px;letter-spacing:0.04em;color:#8a9aaa;font-weight:400;text-transform:none;}

  /* SPEND SUMMARY STRIP */
  .spend-summary{display:flex;gap:0;margin-bottom:20px;border:1px solid var(--card-border);border-radius:10px;overflow:hidden;}
  .ss-item{flex:1;padding:14px 18px;}
  .ss-item+.ss-item{border-left:1px solid var(--card-border);}
  .ss-label{font-size:10px;letter-spacing:0.12em;text-transform:uppercase;color:var(--soft-teal);margin-bottom:4px;}
  .ss-value{font-size:20px;font-weight:700;color:var(--deep-navy);line-height:1;}
  .ss-sub{font-size:10px;color:#8a9aaa;margin-top:4px;font-style:italic;}

  /* BAR CHART */
  .bar-chart{display:flex;flex-direction:column;gap:12px;}
  .bar-row{display:flex;align-items:center;gap:12px;}
  .bar-name{font-size:12px;color:var(--mid-navy);width:110px;flex-shrink:0;text-align:right;}
  .bar-track{flex:1;height:8px;background:var(--card-bg);border-radius:4px;overflow:hidden;}
  .bar-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .bar-val{font-size:12px;font-weight:700;color:var(--deep-navy);width:74px;flex-shrink:0;}

  /* DONUT */
  .donut-wrap{display:flex;align-items:center;gap:24px;margin-bottom:22px;}
  .donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;}
  .leg-item{display:flex;align-items:center;gap:10px;font-size:12px;}
  .leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
  .leg-name{color:var(--mid-navy);flex:1;}
  .leg-pct{font-weight:700;color:var(--deep-navy);}

  /* CPD TABLE */
  .cpd-table{width:100%;border-collapse:collapse;}
  .cpd-table th{font-size:10px;font-weight:700;letter-spacing:0.1em;text-transform:uppercase;color:var(--soft-teal);text-align:left;padding:0 0 12px;border-bottom:1px solid var(--card-border);}
  .cpd-table th:not(:first-child){text-align:right;}
  .cpd-table td{padding:10px 0;border-bottom:1px solid rgba(212,230,239,0.5);font-size:13px;vertical-align:middle;color:var(--mid-navy);}
  .cpd-table td:not(:first-child){text-align:right;font-weight:700;color:var(--deep-navy);}
  .cpd-table tr:last-child td{border-bottom:none;}
  .badge{display:inline-block;font-size:11px;padding:3px 10px;border-radius:var(--pill);}
  .badge-warn{background:var(--warn-bg);color:var(--warn-tx);}
  .badge-good{background:var(--good-bg);color:var(--good-tx);}
  .badge-na{background:var(--card-bg);color:#8a9aaa;}

  /* FUNNEL — clean horizontal layout, dark value labels */
  .funnel{display:flex;flex-direction:column;gap:0;}
  .funnel-step{display:grid;grid-template-columns:130px 1fr 80px;align-items:center;gap:16px;padding:12px 0;border-bottom:1px solid rgba(212,230,239,0.4);}
  .funnel-step:last-child{border-bottom:none;}
  .funnel-name{font-size:12px;color:var(--mid-navy);text-align:right;}
  .funnel-track{background:var(--card-bg);border-radius:6px;overflow:visible;height:40px;position:relative;}
  .funnel-bar{height:100%;display:flex;align-items:center;border-radius:6px;transition:width 0.9s cubic-bezier(0.16,1,0.3,1);position:relative;min-width:3%;}
  /* value shown outside bar when bar is short, inside when long */
  .funnel-num-inside{font-size:13px;font-weight:700;color:var(--white);padding:0 12px;white-space:nowrap;}
  .funnel-num-outside{font-size:13px;font-weight:700;color:var(--deep-navy);position:absolute;left:calc(100% + 8px);white-space:nowrap;}
  .funnel-cvr-col{text-align:right;}
  .funnel-cvr-val{font-size:12px;font-weight:700;color:var(--deep-navy);display:block;}
  .funnel-cvr-lbl{font-size:10px;color:#8a9aaa;font-style:italic;}
  .funnel-connector{text-align:center;font-size:10px;color:rgba(114,164,191,0.45);padding:1px 0;grid-column:1/-1;}

  /* PIPELINE */
  .pl-grid{display:flex;flex-direction:column;gap:12px;}
  .pl-row{display:flex;align-items:center;gap:12px;}
  .pl-name{font-size:12px;color:var(--mid-navy);width:150px;flex-shrink:0;}
  .pl-track{flex:1;background:var(--card-bg);border-radius:4px;height:10px;overflow:hidden;}
  .pl-fill{height:100%;border-radius:4px;transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .pl-val{font-size:13px;font-weight:700;color:var(--deep-navy);width:38px;text-align:right;flex-shrink:0;}

  /* ALERTS */
  .alerts{display:flex;flex-direction:column;gap:10px;margin-bottom:32px;}
  .alert{display:flex;align-items:flex-start;gap:14px;padding:15px 20px;border-radius:10px;border-left:3px solid;box-shadow:var(--shadow-sm);}
  .alert-warn  {border-color:var(--warn-tx);  background:var(--warn-bg);}
  .alert-danger{border-color:var(--danger-tx);background:var(--danger-bg);}
  .alert-good  {border-color:var(--good-tx);  background:var(--good-bg);}
  .alert-info  {border-color:var(--soft-teal);background:var(--teal-10);}
  .alert-icon {font-size:17px;flex-shrink:0;margin-top:1px;}
  .alert-title{font-size:13px;font-weight:700;color:var(--deep-navy);margin-bottom:2px;}
  .alert-desc {font-size:12px;color:var(--mid-navy);font-style:italic;}

  /* FOOTER */
  footer{margin-top:56px;padding-top:24px;border-top:1px solid var(--card-border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
  .footer-logo{font-size:13px;color:var(--mid-navy);display:flex;align-items:center;gap:8px;}
  .footer-logo .teal{color:var(--soft-teal);}
  .footer-meta{font-size:11px;color:#8a9aaa;font-style:italic;}
</style>
</head>
<body>

<div id="pw-gate">
  <div class="pw-box">
    <div class="pw-logo"><span>☤</span> frontrow<strong>MD</strong></div>
    <div class="pw-title">Marketing Dashboard</div>
    <div class="pw-sub">Enter your team password to access</div>
    <input class="pw-input" type="password" id="pw-input" placeholder="Password" autocomplete="off">
    <button class="pw-btn" onclick="checkPw()">Access Dashboard</button>
    <div class="pw-error" id="pw-error"></div>
  </div>
</div>
<div class="wrap">

  <header>
    <div style="position:relative;z-index:1">
      <div>
        <img src="White_Graphic_Logo.png" alt="frontrowMD" class="logo-img"
             onerror="this.style.display='none';document.getElementById('logo-fallback').style.display='flex'">
        <div id="logo-fallback" class="logo-fallback" style="display:none">
          <span>☤</span><span>frontrow<strong>MD</strong></span>
        </div>
      </div>
      <h1>Marketing <em>Performance</em> Dashboard</h1>
    </div>
    <div class="header-right">
      <div class="gen-label">Generated</div>
      <div class="gen-time" id="gen-time"></div>
      <div class="ds-pills">
        <span class="ds-pill">Windsor.ai</span>
        <span class="ds-pill">HubSpot CRM</span>
        <span class="ds-pill">Google Analytics 4</span>
      </div>

  </header>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('yesterday',this)">Yesterday</button>
    <button class="tab" onclick="switchTab('rolling7',this)">Last 7 Days</button>
    <button class="tab" onclick="switchTab('mtd',this)">Month to Date</button>
    <button class="tab" onclick="switchTab('lastMonth',this)">Last Month</button>

  <div id="panel-yesterday" class="panel active"></div>
  <div id="panel-rolling7"  class="panel"></div>

  <footer>
    <div class="footer-logo">
      <img src="White_Graphic_Logo.png" alt="" style="height:22px;opacity:0.5"
           onerror="this.outerHTML='<span>☤</span>'">
      <span><span class="teal">frontrow</span><strong>MD</strong> · Marketing Operations</span>
    </div>
    <div class="footer-meta" id="footer-file"></div>
  </footer>
</div>

<script>
const DATA = "__DASHBOARD_DATA__";

function switchTab(key, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + key).classList.add('active');
  btn.classList.add('active');
}

const fmt$ = n => '$' + Number(n).toFixed(0).replace(/\B(?=(\d{3})+(?!\d))/g,',');
const fmtN = n => Number(Math.round(n)).toLocaleString();
const fmtP = (a,b) => b > 0 ? (a/b*100).toFixed(1)+'%' : 'N/A';
const cpdNum = (s,d) => d > 0 ? s/d : null;
const cpd$  = (s,d) => { const v=cpdNum(s,d); return v?fmt$(v):'N/A'; };

const CH_COLORS = {meta:'#172C45',linkedin:'#1D4053',google:'#72A4BF',tiktok:'#4d8aaa',youtube:'#9bbfd4'};
const CH_LABELS = {meta:'Meta / Facebook',linkedin:'LinkedIn',google:'Google Ads',tiktok:'TikTok',youtube:'YouTube'};
const CH_ICONS  = {meta:'📘',linkedin:'💼',google:'🔍',tiktok:'🎵',youtube:'▶️'};

// ── Delta helpers ──────────────────────────────────────────────
function deltaNum(curr, prev) {
  if (!prev || prev === 0) return null;
  return (curr - prev) / Math.abs(prev);
}
function deltaBadge(curr, prev, { invert=false, isPercent=false }={}) {
  const d = deltaNum(curr, prev);
  if (d === null) return '';
  const pct = (d * 100).toFixed(1);
  const isUp   = d > 0.005;
  const isDown = d < -0.005;
  let cls, arrow;
  if (isUp)        { cls = invert ? 'delta-down' : 'delta-up';   arrow = '▲'; }
  else if (isDown) { cls = invert ? 'delta-up'   : 'delta-down'; arrow = '▼'; }
  else             { cls = 'delta-flat'; arrow = '—'; }
  const sign = d >= 0 ? '+' : '';
  return `<span class="delta ${cls}">${arrow} ${sign}${pct}%</span>`;
}
function scDelta(curr, prev, { invert=false }={}) {
  const d = deltaNum(curr, prev);
  if (d === null) return '';
  const pct = (d * 100).toFixed(1);
  const isUp   = d > 0.005;
  const isDown = d < -0.005;
  let cls, arrow;
  if (isUp)        { cls = invert ? 'sc-delta-down' : 'sc-delta-up';   arrow = '▲'; }
  else if (isDown) { cls = invert ? 'sc-delta-up'   : 'sc-delta-down'; arrow = '▼'; }
  else             { cls = 'sc-delta-flat'; arrow = '—'; }
  const sign = d >= 0 ? '+' : '';
  return `<span class="sc-delta ${cls}">${arrow} ${sign}${pct}%</span>`;
}
function parsePct(str) {
  if (!str || str === 'N/A') return null;
  return parseFloat(str) / 100;
}

// ── Donut SVG ──────────────────────────────────────────────────
function buildDonut(slices, size=130, stroke=22) {
  const r=(size-stroke)/2, cx=size/2, cy=size/2, circ=2*Math.PI*r;
  const total=slices.reduce((s,sl)=>s+sl.value,0);
  let offset=0, paths='';
  slices.forEach(sl=>{
    if(!sl.value) return;
    const dash=(sl.value/total)*circ, gap=circ-dash;
    paths+=`<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${sl.color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${gap}" stroke-dashoffset="${-offset}" transform="rotate(-90 ${cx} ${cy})"/>`;
    offset+=dash;
  });
  return `<svg width="${size}" height="${size}" style="flex-shrink:0">${paths}</svg>`;
}

// ── Alerts ─────────────────────────────────────────────────────
function buildAlerts(d) {
  const ch=d.channels, ga=d.ga4, pp=d.pipeline, alerts=[];
  const drSpend=ch.meta.spend+ch.google.spend+ch.tiktok.spend;
  const drDemos=ch.meta.demos+ch.google.demos+ch.tiktok.demos;
  const blended=cpdNum(drSpend,drDemos);
  ['meta','google','tiktok','linkedin'].forEach(k=>{
    if(ch[k].spend===0) alerts.push({type:'danger',icon:'⚠️',title:`${CH_LABELS[k]} — $0 spend recorded`,desc:'No spend data. Verify campaign status and Windsor.ai sync.'});
  });
  ['meta','google','tiktok'].forEach(k=>{
    if(ch[k].spend>200&&ch[k].demos===0) alerts.push({type:'warn',icon:'📊',title:`${CH_LABELS[k]} — spend with 0 demos`,desc:'Conversion tracking may be misconfigured in Windsor.ai.'});
  });
  if(blended&&blended>600) alerts.push({type:'warn',icon:'💸',title:`Blended CPD elevated — ${fmt$(blended)}`,desc:'Cost per demo (excl. LinkedIn + YouTube) above $600. Review targeting and creative refresh.'});
  const dqRate=pp.demosToOccur>0?(pp.notQualAfterDemo+pp.disqualifiedBeforeDemo)/pp.demosToOccur:0;
  if(dqRate>0.35) alerts.push({type:'warn',icon:'🚫',title:`High disqualification rate — ${(dqRate*100).toFixed(0)}%`,desc:'More than 35% of deals are not qualified. Review audience exclusions and targeting signals.'});
  if(d.newMRR>10000) alerts.push({type:'good',icon:'💰',title:`${fmt$(d.newMRR)} new MRR closed`,desc:'Strong revenue performance in this reporting window.'});
  if(pp.pctDemosWon!=='N/A'&&parseFloat(pp.pctDemosWon)>20) alerts.push({type:'good',icon:'🎯',title:`Close rate ${pp.pctDemosWon} — above benchmark`,desc:'Demo-to-close rate exceeding 20%.'});
  if(alerts.length===0) alerts.push({type:'info',icon:'✅',title:'All channels reporting normally',desc:'No anomalies detected in this window.'});
  return alerts;
}

// ── Build panel ────────────────────────────────────────────────
function buildPanel(key, d) {
  const ch=d.channels, ga=d.ga4, pp=d.pipeline;
  const p=d.prev, pch=p.channels, pga=p.ga4, ppp=p.pipeline;
  const prevLabel=d.prevLabel||'prior period';

  // Direct-response spend/demos (excl LI + YT)
  const drSpend=ch.meta.spend+ch.google.spend+ch.tiktok.spend;
  const drDemos=ch.meta.demos+ch.google.demos+ch.tiktok.demos;
  const pdrSpend=pch.meta.spend+pch.google.spend+pch.tiktok.spend;
  const pdrDemos=pch.meta.demos+pch.google.demos+pch.tiktok.demos;

  // Alerts
  const alertsHTML=buildAlerts(d).map(a=>`
    <div class="alert alert-${a.type}">
      <div class="alert-icon">${a.icon}</div>
      <div><div class="alert-title">${a.title}</div><div class="alert-desc">${a.desc}</div></div>
    </div>`).join('');

  // Dark stat cards — Total Spend excl LI+YT, MRR, Blended CPD
  const statHTML=`
    <div class="stat-row">
      <div class="stat-card">
        <div class="sc-label">Total Ad Spend</div>
        <div class="sc-value">${fmt$(drSpend)}</div>
        <div class="sc-sub">Excl. LinkedIn + YouTube</div>
        ${scDelta(drSpend, pdrSpend, {invert:true})}
      </div>
      <div class="stat-card">
        <div class="sc-label">New MRR</div>
        <div class="sc-value">${fmt$(d.newMRR)}</div>
        <div class="sc-sub">Closed won this period</div>
        ${scDelta(d.newMRR, p.newMRR)}
      </div>
      <div class="stat-card">
        <div class="sc-label">Blended CPD</div>
        <div class="sc-value">${cpd$(drSpend,drDemos)}</div>
        <div class="sc-sub">Excl. LinkedIn + YouTube</div>
        ${scDelta(cpdNum(drSpend,drDemos)||0, cpdNum(pdrSpend,pdrDemos)||0, {invert:true})}
      </div>
    </div>`;

  // KPIs with delta badges
  const kpis=[
    {label:'Demos Booked',    value:fmtN(d.demosBooked),             sub:'Meeting Booked list, by createdate', cls:'kpi-navy',
      delta: deltaBadge(d.demosBooked, p.demosBooked)},
    {label:'Website Visitors',value:fmtN(Math.round(ga.users)),      sub:'GA4 sessions',                 cls:'',
      delta: deltaBadge(ga.users, pga.users)},
    {label:'Website CVR',     value:fmtP(ga.meetingBooked,ga.users), sub:'Visitors → demo booked',        cls:'',
      delta: deltaBadge(ga.users>0?ga.meetingBooked/ga.users:0, pga.users>0?pga.meetingBooked/pga.users:0)},
    {label:'Meta CTR',        value:d.metaCTR||'N/A',                sub:'Avg across campaigns',          cls:'',
      delta: deltaBadge(parsePct(d.metaCTR)||0, parsePct(p.metaCTR)||0)},
    {label:'Closed Deals',    value:fmtN(pp.dealsWon),               sub:'Closed won this period',        cls:'kpi-good',
      delta: deltaBadge(pp.dealsWon, ppp.dealsWon)},
    {label:'Close Rate',      value:pp.pctDemosWon,                  sub:'Demos given → closed won',      cls:'kpi-good',
      delta: deltaBadge(parsePct(pp.pctDemosWon)||0, parsePct(ppp.pctDemosWon)||0)},
  ];
  const kpiHTML=kpis.map(k=>`
    <div class="kpi ${k.cls}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value">${k.value}</div>
      <div class="kpi-sub">${k.sub}</div>
      ${k.delta}
    </div>`).join('');

  // Spend donut + bars — excl LI+YT for totals
  const chKeys=['meta','linkedin','google','tiktok','youtube'];
  const drKeys=['meta','google','tiktok'];
  const spendSlices=chKeys.map(k=>({label:CH_LABELS[k],value:ch[k].spend,color:CH_COLORS[k]})).filter(s=>s.value>0);
  const totalAllSpend=spendSlices.reduce((s,sl)=>s+sl.value,0);
  const donutSVG=buildDonut(spendSlices);
  const legendHTML=spendSlices.map(s=>`
    <div class="leg-item">
      <div class="leg-dot" style="background:${s.color}"></div>
      <div class="leg-name">${s.label}</div>
      <div class="leg-pct">${fmtP(s.value,totalAllSpend)}</div>
    </div>`).join('');

  const sorted=chKeys.map(k=>({key:k,...ch[k]})).sort((a,b)=>b.spend-a.spend);
  const maxSpend=sorted[0]?.spend||1;
  const spendSummaryHTML=`
    <div class="spend-summary">
      <div class="ss-item">
        <div class="ss-label">Total Spend</div>
        <div class="ss-value">${fmt$(drSpend)}</div>
        <div class="ss-sub">Excl. LinkedIn + YouTube</div>
      </div>
      <div class="ss-item">
        <div class="ss-label">Avg CPD</div>
        <div class="ss-value">${cpd$(drSpend,drDemos)}</div>
        <div class="ss-sub">Excl. LinkedIn + YouTube</div>
      </div>
      <div class="ss-item">
        <div class="ss-label">Total Demos</div>
        <div class="ss-value">${fmtN(drDemos)}</div>
        <div class="ss-sub">Meta + Google + TikTok</div>
      </div>
    </div>`;
  const barsHTML=sorted.map(c=>`
    <div class="bar-row">
      <div class="bar-name">${CH_ICONS[c.key]} ${CH_LABELS[c.key]}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${(c.spend/maxSpend*100).toFixed(1)}%;background:${CH_COLORS[c.key]}"></div></div>
      <div class="bar-val">${fmt$(c.spend)}</div>
    </div>`).join('')+`
    <div class="bar-row" style="border-top:1px solid var(--card-border);margin-top:8px;padding-top:8px">
      <div class="bar-name" style="font-weight:700;color:var(--deep-navy)">⬛ Total</div>
      <div class="bar-track"><div class="bar-fill" style="width:100%;background:var(--deep-navy)"></div></div>
      <div class="bar-val" style="font-weight:700;color:var(--deep-navy)">${fmt$(totalAllSpend)}</div>
    </div>`;

  // CPD table
  const totalSpendAll=sorted.reduce((s,c)=>s+c.spend,0);
  const totalDemosAll=sorted.reduce((s,c)=>s+c.demos,0);
  const blendedCPD=cpdNum(totalSpendAll,totalDemosAll);
  const blendedBadge=blendedCPD===null?'<span class="badge badge-na">N/A</span>'
                     :blendedCPD>600?`<span class="badge badge-warn">${fmt$(blendedCPD)}</span>`
                     :`<span class="badge badge-good">${fmt$(blendedCPD)}</span>`;
  const cpdRows=sorted.map(c=>{
    const v=cpdNum(c.spend,c.demos);
    const badge=v===null?'<span class="badge badge-na">N/A</span>'
               :v>600?`<span class="badge badge-warn">${fmt$(v)}</span>`
               :`<span class="badge badge-good">${fmt$(v)}</span>`;
    return `<tr>
      <td>${CH_ICONS[c.key]} ${CH_LABELS[c.key]}</td>
      <td>${fmt$(c.spend)}</td>
      <td>${fmtN(c.demos)}</td>
      <td>${badge}</td>
    </tr>`;
  }).join('')+`
  <tr style="border-top:2px solid var(--card-border);font-weight:700;color:var(--deep-navy)">
    <td>⬛ Total / Blended</td>
    <td>${fmt$(totalSpendAll)}</td>
    <td>${fmtN(totalDemosAll)}</td>
    <td>${blendedBadge}</td>
  </tr>`;

  // Funnel — each step uses its own correct HubSpot date field
  const fSteps=[
    {name:'Website Visitors',  val:Math.round(ga.users),             prev:Math.round(pga.users),              color:'#9bbfd4'},
    {name:'Clicked Demo',      val:Math.round(ga.demoButtonClicks),  prev:Math.round(pga.demoButtonClicks),   color:'#72A4BF'},
    {name:'Demos Booked',      val:d.demosBooked,                    prev:p.demosBooked,                      color:'#4d8aaa'},
    {name:'Demos to Occur',    val:pp.demosToOccur,                  prev:ppp.demosToOccur,                   color:'#2d6a8a'},
    {name:'Demo Happened',     val:pp.demosHappened,                 prev:ppp.demosHappened,                  color:'#1D4053'},
    {name:'Closed Won',        val:pp.dealsWon,                      prev:ppp.dealsWon,                       color:'#172C45'},
  ];
  const maxF=Math.max(fSteps[0]?.val||1,1);
  const funnelHTML=fSteps.map((s,i)=>{
    const pct=Math.max((s.val/maxF)*100,3);
    const isShort=pct<30;
    const db=deltaBadge(s.val,s.prev);
    // Number always visible: white inside bar if bar is wide, dark outside if narrow
    const numSpan=isShort
      ? `<span style="position:absolute;left:calc(${pct.toFixed(1)}% + 10px);top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:var(--deep-navy);white-space:nowrap;z-index:2">${fmtN(s.val)}</span>`
      : `<span style="position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;font-weight:700;color:#fff;white-space:nowrap;z-index:2">${fmtN(s.val)}</span>`;
    return `
      <div class="funnel-step">
        <div class="funnel-name">${s.name}</div>
        <div style="position:relative;flex:1">
          <div class="funnel-track" style="overflow:visible">
            <div class="funnel-bar" style="width:${pct.toFixed(1)}%;background:${s.color};position:relative;overflow:visible">
            </div>
          </div>
          ${numSpan}
        </div>
        <div class="funnel-cvr-col">
          ${i===0
            ? `<span class="funnel-cvr-val">—</span>`
            : `<span class="funnel-cvr-val">${fmtP(s.val,fSteps[i-1].val)}</span><span class="funnel-cvr-lbl">from prev.</span>`
          }
          ${db}
        </div>
      </div>
      ${i<fSteps.length-1?'<div class="funnel-connector">▼</div>':''}`;
  }).join('');

  // Pipeline — funnel order with % of each stage
  // Reference totals for funnel % calculations
  const plBase = pp.demosToOccur || 1;  // everything % of Demos to Occur
  // Helper: show % of a reference total inline
  function plPct(val, ref) { return ref > 0 ? `<span style="font-size:10px;color:#8a9aaa;margin-left:4px">${(val/ref*100).toFixed(0)}%</span>` : ''; }

  const plRows=[
    // ── Main funnel ──────────────────────────────────────────────
    {name:'Demos Booked',         val:d.demosBooked,             prev:p.demosBooked,             color:'#72A4BF', pctOf:null,              note:'Meeting Booked list, by createdate'},
    {name:'Demos to Occur',       val:pp.demosToOccur,           prev:ppp.demosToOccur,          color:'#4d8aaa', pctOf:d.demosBooked,     note:'deals by date_demo_booked'},
    // ── Before-demo outcomes ─────────────────────────────────────
    {name:'Disq. Before Demo',    val:pp.disqualifiedBeforeDemo, prev:ppp.disqualifiedBeforeDemo,color:'#d4a050', pctOf:pp.demosToOccur,   invert:true},
    {name:'No Show / Canceled',   val:pp.noShowCanceled,         prev:ppp.noShowCanceled,        color:'#c8956a', pctOf:pp.demosToOccur,   invert:true},
    // ── Demo happened ────────────────────────────────────────────
    {name:'Demo Happened',        val:pp.demosHappened,          prev:ppp.demosHappened,         color:'#1D4053', pctOf:pp.demosToOccur,   note:'deals by date_demo_booked'},
    // ── After-demo outcomes ──────────────────────────────────────
    {name:'Not Qual. After Demo', val:pp.notQualAfterDemo,       prev:ppp.notQualAfterDemo,      color:'#c8a04a', pctOf:pp.demosHappened,  invert:true},
    {name:'Too Early',            val:pp.tooEarly,               prev:ppp.tooEarly,              color:'#aab8c2', pctOf:pp.demosHappened,  invert:true},
    // ── Closed ───────────────────────────────────────────────────
    {name:'Closed Won',           val:pp.dealsWon,               prev:ppp.dealsWon,              color:'#172C45', pctOf:pp.demosHappened,  note:'deals by date_demo_booked, closedwon'},
    // ── Data quality ─────────────────────────────────────────────
    {name:'Blank Status',         val:pp.blankStatus,            prev:ppp.blankStatus,           color:'#c0c8d0', pctOf:pp.demosToOccur,   invert:true, isBlank:true},
  ];
  const maxPL2=Math.max(d.demosBooked,pp.demosToOccur,1);

  // Section dividers within pipeline rows
  const PL_DIVIDERS = {
    2: 'Before Demo',   // before Disq. Before Demo
    4: 'Happened',      // before Demo Happened
    5: 'After Demo',    // before Not Qual After Demo
    7: 'Won / Lost',    // before Closed Won
    8: 'Data Quality',  // before Blank Status
  };

  const plHTML=plRows.map((r,i)=>{
    const divider = PL_DIVIDERS[i]
      ? `<div style="font-size:9px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--soft-teal);margin:10px 0 4px;padding-top:8px;border-top:1px solid var(--card-border)">${PL_DIVIDERS[i]}</div>`
      : '';
    const pctLabel = r.pctOf != null ? plPct(r.val, r.pctOf) : '';
    return divider+`
    <div class="pl-row">
      <div class="pl-name">${r.name}${r.isBlank?` <span style="font-size:9px;color:#8a9aaa;font-style:italic">(no demo_given_status set)</span>`:''}${r.note?`<span style="display:block;font-size:9px;color:#8a9aaa;font-style:italic">${r.note}</span>`:''}</div>
      <div class="pl-track"><div class="pl-fill" style="width:${Math.min((r.val/maxPL2)*100,100).toFixed(1)}%;background:${r.color}${r.isBlank?';opacity:0.5':''}"></div></div>
      <div class="pl-val">${fmtN(r.val)}${pctLabel}</div>
      ${deltaBadge(r.val, r.prev, {invert: !!r.invert})}
    </div>`;
  }).join('');

  return `
    <div class="sl">Alerts &amp; Anomalies</div>
    <div class="alerts">${alertsHTML}</div>

    ${statHTML}

    <div class="sl">Key Performance Indicators <span style="font-size:10px;color:#8a9aaa;font-weight:400;letter-spacing:0;text-transform:none">vs ${prevLabel}</span></div>
    <div class="kpi-grid">${kpiHTML}</div>

    <div class="sl">Spend &amp; Cost Efficiency</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Ad Spend by Channel</div>
        ${spendSummaryHTML}
        <div class="donut-wrap">${donutSVG}<div class="donut-legend">${legendHTML}</div></div>
        <div class="bar-chart">${barsHTML}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Cost Per Demo by Channel</div>
        <table class="cpd-table">
          <thead><tr><th>Channel</th><th>Spend</th><th>Demos</th><th>CPD</th></tr></thead>
          <tbody>${cpdRows}</tbody>
        </table>
      </div>
    </div>

    <div class="sl">Demo Pipeline</div>
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Conversion Funnel <span class="chart-title-meta">step-to-step CVR vs ${prevLabel}</span></div>
        <div class="funnel">${funnelHTML}</div>
      </div>
      <div class="chart-card">
        <div class="chart-title">Pipeline Breakdown <span class="chart-title-meta">vs ${prevLabel}</span></div>
        <div class="pl-grid">${plHTML}</div>
      </div>
    </div>
  `;
}

// ── Password gate ──────────────────────────────────────────────
const DASH_PASSWORD = 'frontrow!marketing2026';
const PW_KEY = 'fmd_dash_auth';
function checkPw() {
  const val = document.getElementById('pw-input').value;
  if (val === DASH_PASSWORD) {
    sessionStorage.setItem(PW_KEY, '1');
    document.getElementById('pw-gate').classList.add('hidden');
    document.getElementById('pw-error').textContent = '';
  } else {
    document.getElementById('pw-error').textContent = 'Incorrect password. Please try again.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkPw();
});
if (sessionStorage.getItem(PW_KEY) === '1') {
  document.getElementById('pw-gate').classList.add('hidden');
} else {
  setTimeout(() => document.getElementById('pw-input').focus(), 100);
}

// Init
document.getElementById('gen-time').textContent = DATA.generatedAt;
document.getElementById('footer-file').textContent = DATA.filename ? `Source: ${DATA.filename}` : '';
Object.entries(DATA.windows).forEach(([key,d]) => {
  const el = document.getElementById('panel-' + key);
  if (el) el.innerHTML = buildPanel(key, d);
});
</script>
