<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>FrontrowMD — Sales Dashboard</title>
<link rel="icon" href="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/White_Graphic_Logo.png">
<style>

@import url('https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Inter:wght@400;500;600;700&display=swap');
:root{--navy:#172C45;--mid-navy:#1D4053;--midnight:#020F18;--teal:#72A4BF;--white:#FFFFFF;--border:#D4E6EF;--grey:#9CA3AF;--font-h:'Libre Baskerville',Georgia,serif;--font-b:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;--teal-8:rgba(114,164,191,.08)}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font-b);background:linear-gradient(135deg,#F5F7FA,#EBF3F8,#D8ECF5);min-height:100vh;color:var(--navy);font-size:13px}
.sp{border:2px solid rgba(114,164,191,.3);border-top-color:var(--teal);border-radius:50%;width:20px;height:20px;animation:spin .6s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
#gate{display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,var(--midnight),var(--mid-navy),var(--teal))}
.gbox{background:rgba(23,44,69,.5);backdrop-filter:blur(12px);border:1px solid rgba(114,164,191,.15);border-radius:20px;padding:48px 40px;width:400px;text-align:center;box-shadow:0 24px 80px rgba(2,15,24,.5)}
.gbox input{width:100%;padding:16px 20px;background:rgba(2,15,24,.6);border:1.5px solid rgba(114,164,191,.2);border-radius:12px;font-size:15px;font-family:var(--font-b);color:var(--white);outline:none;transition:border-color .2s}
.gbox input::placeholder{color:rgba(114,164,191,.4)}
.gbox input:focus{border-color:var(--teal)}
.gbox button{width:100%;padding:14px;border:none;border-radius:50px;background:var(--teal);color:var(--white);font-family:var(--font-h);font-weight:700;font-size:14px;cursor:pointer;margin-top:12px;transition:all .2s}
.gbox button:hover{background:#5E8CA8;transform:translateY(-1px)}
#gerr{color:#FCA5A5;font-size:12px;margin-top:8px;display:none}
#app{display:none}#app.active{display:flex;height:100vh}
.sidebar{width:220px;min-width:220px;height:100vh;background:linear-gradient(180deg,var(--midnight),var(--navy));color:var(--white);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;transition:width .25s ease,min-width .25s ease}
.sidebar.collapsed{width:64px;min-width:64px}
.sidebar .sh{padding:20px 20px 16px;border-bottom:1px solid rgba(114,164,191,.1);display:flex;align-items:center;flex-shrink:0}
.sidebar.collapsed .sh{justify-content:center;padding:20px 8px 16px}
.sidebar.collapsed .sh img.logo-full{display:none}
.sidebar.collapsed .sh img.logo-icon{display:block!important}
.snav{padding:12px 0;flex:1 1 auto;overflow-y:auto;overflow-x:hidden;min-height:0}
.snav::-webkit-scrollbar{width:6px}
.snav::-webkit-scrollbar-track{background:transparent}
.snav::-webkit-scrollbar-thumb{background:rgba(114,164,191,.2);border-radius:3px}
.snav::-webkit-scrollbar-thumb:hover{background:rgba(114,164,191,.4)}
.ni{display:flex;align-items:center;gap:10px;padding:10px 20px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.6);transition:all .15s;border-left:3px solid transparent}
.ni:hover{color:var(--white);background:rgba(114,164,191,.08)}
.ni.active{color:var(--white);background:rgba(114,164,191,.12);border-left-color:var(--teal);font-weight:600}
.ni .ic{width:20px;min-width:20px;text-align:center;font-size:14px}
.sidebar.collapsed .ni{justify-content:center;padding:10px;gap:0}
.sidebar.collapsed .ni span:not(.ic){display:none}
.sidebar.collapsed .ni .ic{min-width:auto;font-size:20px}
.sb-toggle{padding:12px 16px;border-top:1px solid rgba(114,164,191,.15);cursor:pointer;display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.4);font-size:12px;transition:all .2s;flex-shrink:0}
.sb-toggle:hover{color:rgba(255,255,255,.7);background:rgba(114,164,191,.1)}
.sb-toggle .sb-arrow{transition:transform .25s}
.sidebar.collapsed .sb-toggle{justify-content:center;padding:12px 8px}
.sidebar.collapsed .sb-toggle .sb-label{display:none}
.sidebar.collapsed .sb-toggle .sb-arrow{transform:rotate(180deg)}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{padding:16px 28px;display:flex;align-items:center;gap:16px;border-bottom:1px solid var(--border);background:var(--white);flex-shrink:0}
#ptitle{font-family:var(--font-h);font-size:18px;font-weight:700;color:var(--navy);flex:1}
#fts{font-size:10px;color:var(--grey)}
.content{flex:1;overflow-y:auto;padding:24px 28px}
.pg{display:none}.pg.active{display:block}
.rep-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.tg{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}
.tile{flex:1;min-width:140px;padding:16px;border-radius:12px;background:var(--white);border:1px solid var(--border);position:relative}
.tile.hero{background:linear-gradient(135deg,var(--navy),var(--mid-navy));color:var(--white);border:none;box-shadow:0 4px 16px rgba(2,15,24,.12)}
.tile.hero .tlbl{color:var(--teal)}.tile.hero .tval{color:var(--white)}.tile.hero .tdef{color:rgba(255,255,255,.5)}
.tile.warn{background:linear-gradient(135deg,#172C45,#1D4053);color:#fff;border:2px solid #EF4444;box-shadow:0 4px 16px rgba(239,68,68,.15)}
.tile.warn .tlbl{color:#FCA5A5;font-weight:700}.tile.warn .tval{color:#FCA5A5}.tile.warn .tdef{color:rgba(255,255,255,.5)}
.tlbl{font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);margin-bottom:4px;font-weight:600}
.tval{font-size:22px;font-weight:700;font-family:var(--font-h);color:var(--navy)}
.tdef{font-size:9px;color:var(--grey);margin-top:4px}
.stbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.stbl th{text-align:left;font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--grey);padding:8px 6px;border-bottom:2px solid var(--border);font-weight:700;white-space:nowrap;overflow:hidden;cursor:pointer}
.stbl th:hover{color:var(--navy)}
.stbl td{padding:7px 6px;border-bottom:1px solid rgba(114,164,191,.06);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stbl tr:hover{background:rgba(114,164,191,.04)}
/* Responsive table wrapper: forces horizontal scroll when min-width on table exceeds container.
   The last column (dropdown chevron) sticks to the right edge so it's always visible. */
.tbl-resp{overflow-x:auto;position:relative}
.tbl-resp .stbl tr:not(.expand-row) th:last-child,
.tbl-resp .stbl tr:not(.expand-row) td:last-child{position:sticky;right:0;background:#fff;z-index:1;box-shadow:-4px 0 6px -2px rgba(23,44,69,.06)}
.tbl-resp .stbl tr:hover:not(.expand-row) td:last-child{background:rgba(247,250,252,.98)}
.expand-row{display:none;background:var(--teal-8)}
.expand-row.open{display:table-row}
.expand-row.open td{border-bottom:3px solid var(--teal);white-space:normal;overflow:visible}
.expand-row td{white-space:normal;overflow:visible}
tr.row-expanded td{background:rgba(114,164,191,.04);border-bottom:none}
.ec-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 18px;margin-bottom:0}
.ec-card .ec-label{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--teal);font-weight:700;margin-bottom:4px}
.ec-card .ec-val{font-size:12px;line-height:1.7;color:var(--navy);word-break:break-word}
.pill{display:inline-flex;align-items:center;padding:2px 8px;border-radius:50px;font-size:9px;font-weight:700;white-space:nowrap}
.fpill{padding:4px 12px;border-radius:50px;border:1.5px solid rgba(23,44,69,.12);background:transparent;color:var(--navy);font-size:10px;font-weight:500;cursor:pointer;font-family:var(--font-b);transition:all .12s;white-space:nowrap}
.fpill.active{border-color:var(--navy);background:var(--navy);color:#fff;font-weight:700}
.rfb{margin-left:auto;padding:6px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--white);color:var(--navy);font-size:11px;cursor:pointer;font-family:var(--font-b);transition:all .12s}
.rfb:hover{background:var(--navy);color:#fff;border-color:var(--navy)}
.float-tip{display:none;position:absolute;background:#172C45;color:#fff;padding:8px 12px;border-radius:8px;font-size:12px;pointer-events:none;z-index:10;box-shadow:0 4px 12px rgba(0,0,0,.15);white-space:nowrap}

</style>
</head>
<body>
<div id="gate">
  <div class="gbox">
    <div style="text-align:center;margin-bottom:12px"><img src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD" style="height:36px"></div>
    <div style="font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--teal);letter-spacing:.12em;text-transform:uppercase;margin-bottom:28px">Sales Dashboard</div>
    <input type="password" id="pw" placeholder="Team password">
    <button id="loginBtn" onclick="doLogin()">Log In →</button>
    <div id="gerr">Invalid password</div>
  </div>
</div>
<div id="app">
  <div class="sidebar" id="sd-sidebar">
    <div class="sh"><img class="logo-full" src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/FrontrowMD_White_Logo.png" alt="frontrowMD" style="height:36px"><img class="logo-icon" src="https://raw.githubusercontent.com/frontrowmd/frontrowmd-reporting-dashboard/main/White_Graphic_Logo.png" alt="frontrowMD" style="height:28px;display:none"></div>
    <div class="snav">
      <div class="ni active" onclick="switchPage('preDemo')" data-page="preDemo"><span class="ic">📋</span><span>Pre-Demo</span></div>
      <div class="ni" onclick="switchPage('postDemo')" data-page="postDemo"><span class="ic">📊</span><span>Post-Demo</span></div>
      <div class="ni" onclick="switchPage('signup')" data-page="signup"><span class="ic">📈</span><span>Sign-Up Rate</span></div>
    </div>
    <div class="sb-toggle" onclick="sdToggleCollapse()"><span class="sb-arrow">◀</span><span class="sb-label">Collapse</span></div>
  </div>
  <div class="main">
    <div class="topbar">
      <div id="ptitle">Pre-Demo</div>
      <div id="fts"></div>
      <button class="rfb" id="rfb" onclick="refreshData()">↻ Refresh</button>
    </div>
    <div class="content">
      <div id="loading" style="display:none;justify-content:center;align-items:center;padding:80px"><div class="sp" style="width:32px;height:32px;border-width:3px"></div></div>
      <div class="pg active" id="page-preDemo"><div id="preDemo-c"></div></div>
      <div class="pg" id="page-postDemo"><div id="postDemo-c"></div></div>
      <div class="pg" id="page-signup"><div id="signup-c" style="padding:40px;text-align:center;color:var(--grey)">Sign-Up Rate page — coming soon</div></div>
    </div>
  </div>
</div>
<script>
var API=location.protocol==='file:'?'https://frontrowmd-dashboard-api.alex-5b6.workers.dev/api/sales':'/api/sales';
var PW='',AP='preDemo';
var S={preDemo:{data:null},postDemo:{data:null},signup:{data:null}};
var _repFilter='all',_dqPqRunning=false;
var _dqPqMap=(function(){try{return JSON.parse(localStorage.getItem('sdPqResults')||'{}');}catch(e){return {};}})();
// PQ KV sync (cross-device): mirrors logic in dashboard.html
var _pqKvAvailable=false;
async function pqLoadFromKV(){
  try{
    var r=await fetch('/api/pq',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW})});
    if(!r.ok)return;
    var j=await r.json();
    if(!j||!j._kvAvailable)return;
    _pqKvAvailable=true;
    var remote=j.pqMap||{};
    var localOnly={};var migratedCount=0;
    Object.keys(_dqPqMap).forEach(function(id){if(!remote[id]){localOnly[id]=_dqPqMap[id];migratedCount++;}});
    var merged=Object.assign({},_dqPqMap,remote);
    _dqPqMap=merged;
    try{localStorage.setItem('sdPqResults',JSON.stringify(_dqPqMap));}catch(e){}
    if(migratedCount>0){pqSyncToKV(localOnly,'merge');console.log('Migrated '+migratedCount+' local PQ entries to KV');}
  }catch(e){console.warn('PQ load from KV failed (using localStorage):',e);}
}
function pqSyncToKV(pqMap,mode){
  if(!PW)return;
  try{
    fetch('/api/pq/save',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW,pqMap:pqMap||{},mode:mode||'merge'})}).catch(function(e){console.warn('PQ KV sync failed:',e);});
  }catch(e){console.warn('PQ KV sync error:',e);}
}
var _dqAttrDim='_pq',_dqSort='date_demo_booked',_dqSortDir='asc',_dqChartStatus='all',_dqHideBlanks=false;
var _tblStageFilter='all',_tblPqFilter='all',_tblAttFilter='all',_tblQoFilter='all',_tblRepFilter='all',_tblIndustryFilter='all',_tblTzFilter='all',_tblWebTrafficFilter='all',_tblStorylaneFilter='all',_tblDateFrom='',_tblDateTo='',_tblDateMode='demo';
var DQ_REP_COLORS=['#1565C0','#2E7D32','#72A4BF','#E65100','#5C6BC0','#00897B','#C62828','#6A1B9A','#EF6C00','#00695C'];
var STAGE_LABELS={'appointmentscheduled':'Scheduled','1084214349':'Demo Happened','decisionmakerboughtin':'Decision Maker','contractsent':'Contract Sent','closedwon':'Closed Won','closedlost':'Closed Lost','3453957850':'No Show','3453925110':'Churned','1062974581':'Not a Fit'};
var STAGE_COLORS={'Scheduled':'#64748B','Demo Happened':'#1565C0','Decision Maker':'#7C3AED','Contract Sent':'#0891B2','Closed Won':'#16A34A','Closed Lost':'#DC2626','No Show':'#EA580C','Churned':'#991B1B','Not a Fit':'#D97706'};
var STATUS_LABELS={'Demo Given':'Qual.','Demo Given at Rescheduled time':'Qual.','Demo Given, Qualified Company, too early':'Qual.','Demo Given / Qualified / Too Small':'Qual.','Not Qualified after the demo':'Pruned','Disqualified, Meeting Cancelled':'Pruned','No Show':'Resch.','No Showed':'No Show'};
var STATUS_COLORS={'Qual.':'#172C45','Too Early':'#7C3AED','Too Small':'#B794F4','Pruned':'#F59E0B','No Show':'#EF4444','Resch.':'#10B981','Pending Eval':'#0891B2','Pending':'#64748B','Blank':'#9CA3AF'};
var ATT_LABELS={'Demo Given (originally scheduled)':'Given','Demo Given (rescheduled)':'Given (R)','Scheduled — pending':'Pending','Rescheduled — pending':'Resch.','No Show':'No Show','Cancelled before demo':'Cancelled'};
var ATT_COLORS={'Given':'#16A34A','Given (R)':'#14B8A6','Pending':'#F59E0B','Resch.':'#8B5CF6','No Show':'#EF4444','Cancelled':'#1E293B','Blank':'#9CA3AF'};
var QO_LABELS={'Qualified':'Qualified','Disqualified':'Disqualified','Not yet evaluated':'Pending'};
var QO_COLORS={'Qualified':'#16A34A','Disqualified':'#C62828','Pending':'#64748B','Blank':'#9CA3AF'};

// Derive canonical demo category from new fields (with legacy fallback).
// Returns: qualified | pruned | noShow | rescheduled | pending | pendingEval | blank
function deriveDemoCat(att,qo,legacy){
  att=(att||'').trim();qo=(qo||'').trim();legacy=(legacy||'').trim();
  if(att||qo){
    if(att==='Demo Given (originally scheduled)'||att==='Demo Given (rescheduled)'){
      if(qo==='Qualified')return 'qualified';
      if(qo==='Disqualified')return 'pruned';
      return 'pendingEval';
    }
    if(att==='No Show')return 'noShow';
    if(att==='Cancelled before demo')return 'pruned';
    if(att==='Rescheduled — pending')return 'rescheduled';
    if(att==='Scheduled — pending')return 'pending';
  }
  if(!legacy)return 'blank';
  if(legacy==='Demo Given'||legacy==='Demo Given at Rescheduled time'||legacy==='Demo Given, Qualified Company, too early'||legacy==='Demo Given / Qualified / Too Small')return 'qualified';
  if(legacy==='Not Qualified after the demo'||legacy==='Disqualified, Meeting Cancelled')return 'pruned';
  if(legacy==='No Show')return 'rescheduled';
  if(legacy==='No Showed')return 'noShow';
  return 'blank';
}
function demoHappened(att,legacy){
  att=(att||'').trim();legacy=(legacy||'').trim();
  if(att==='Demo Given (originally scheduled)'||att==='Demo Given (rescheduled)')return true;
  if(att)return false;
  return legacy==='Demo Given'||legacy==='Demo Given at Rescheduled time'||legacy==='Demo Given, Qualified Company, too early'||legacy==='Demo Given / Qualified / Too Small'||legacy==='Not Qualified after the demo';
}
var TITLES={'preDemo':'Pre-Demo','postDemo':'Post-Demo','signup':'Sign-Up Rate'};
function f$(v){return v==null?'—':'$'+Math.round(v).toLocaleString();}
function fP(v){return v==null?'—':v.toFixed(1)+'%';}
function stageBadge(sid){var l=STAGE_LABELS[sid]||sid||'—';var c=STAGE_COLORS[l]||'#9CA3AF';return l!=='—'?'<span class="pill" style="background:'+c+'18;color:'+c+'">'+l+'</span>':'—';}
function statusBadge(raw){var l=STATUS_LABELS[raw]||(raw||'Blank');var c=STATUS_COLORS[l]||'#9CA3AF';return '<span class="pill" style="background:'+c+'18;color:'+c+'">'+l+'</span>';}
function attBadge(raw){if(!raw)return '<span style="color:#ccc">—</span>';var l=ATT_LABELS[raw]||raw;var c=ATT_COLORS[l]||'#9CA3AF';return '<span class="pill" style="background:'+c+'18;color:'+c+'">'+l+'</span>';}
function qoBadge(raw){if(!raw)return '<span style="color:#ccc">—</span>';var l=QO_LABELS[raw]||raw;var c=QO_COLORS[l]||'#9CA3AF';return '<span class="pill" style="background:'+c+'18;color:'+c+'">'+l+'</span>';}
function pqBadge(v){return v==='Y'?'<span class="pill" style="background:#E8F5E9;color:#2E7D32">Y</span>':v==='N'?'<span class="pill" style="background:#FFEBEE;color:#C62828">N</span>':v==='S'?'<span class="pill" style="background:#E3F2FD;color:#1565C0">S</span>':v==='?'?'<span class="pill" style="background:#FFF3E0;color:#E65100">?</span>':'<span style="color:#ccc">—</span>';}
function fp(active,label,oc){return '<button class="fpill'+(active?' active':'')+'" onclick="'+oc+'">'+label+'</button>';}

async function doLogin(){
  var pw=document.getElementById('pw').value;if(!pw)return;PW=pw;
  var btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.innerHTML='<span class="sp" style="width:14px;height:14px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></span>Loading...';
  document.getElementById('gerr').style.display='none';
  try{
    var r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:pw,mode:'preDemoData'})});
    if(r.status===401){document.getElementById('gerr').style.display='block';btn.disabled=false;btn.textContent='Log In →';return;}
    var d=await r.json();S.preDemo.data=d;
    document.getElementById('gate').style.display='none';document.getElementById('app').classList.add('active');
    pqLoadFromKV().then(function(){ try{ renderPage(); }catch(e){} });
    renderPage();
  }catch(e){document.getElementById('gerr').textContent='Connection error';document.getElementById('gerr').style.display='block';btn.disabled=false;btn.textContent='Log In →';}
}
document.getElementById('pw').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin();});
function switchPage(pg){AP=pg;if(pg==='preDemo')_repFilter='all';if(pg==='postDemo')_pdRepFilter='all';document.querySelectorAll('.snav .ni').forEach(function(n){n.classList.toggle('active',n.dataset.page===pg);});document.querySelectorAll('.pg').forEach(function(p){p.classList.remove('active');});document.getElementById('page-'+pg).classList.add('active');document.getElementById('ptitle').textContent=TITLES[pg]||pg;if(!S[pg].data){loadData(pg);}else{renderPage();}}
async function loadData(pg){var mode=pg==='preDemo'?'preDemoData':pg==='postDemo'?'postDemoData':'signupData';document.getElementById('loading').style.display='flex';try{var r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({password:PW,mode:mode})});var d=await r.json();S[pg].data=d;document.getElementById('loading').style.display='none';renderPage();}catch(e){document.getElementById('loading').style.display='none';}}
function refreshData(){S[AP].data=null;loadData(AP);}
function renderPage(){if(AP==='preDemo')renderPreDemo();if(AP==='postDemo')renderPostDemo();}

function renderPreDemo(){
  var d=S.preDemo.data;if(!d||!d.deals)return;
  var el=document.getElementById('preDemo-c');
  var deals=d.deals||[],ownerMap=d.ownerMap||{},ciMap=d.contactInfoMap||{},coMap=d.companyInfoMap||{};
  for(var i=0;i<deals.length;i++){
    var dn=deals[i].dealname.trim().toLowerCase();
    var dnClean=dn.replace(/[^a-z0-9]/g,''); // stripped for fuzzy matching
    var ci=ciMap[dn]||null;
    // Fuzzy match: try domain keys where domain root matches deal name
    if(!ci){var keys=Object.keys(ciMap);for(var ki=0;ki<keys.length;ki++){
      if(keys[ki].indexOf('_domain_')===0){var domRoot=keys[ki].replace('_domain_','').split('.')[0].replace(/[^a-z0-9]/g,'');
      if(domRoot.length>2&&(dnClean.indexOf(domRoot)>=0||domRoot.indexOf(dnClean)>=0)){ci=ciMap[keys[ki]];break;}}
      else{var ciKey=keys[ki].replace(/[^a-z0-9]/g,'');if(ciKey.length>2&&(dnClean.indexOf(ciKey)>=0||ciKey.indexOf(dnClean)>=0)){ci=ciMap[keys[ki]];break;}}
    }}
    if(ci){deals[i]._ci=ci;if(ci.website&&!deals[i].website)deals[i].website=ci.website;}
    // Company match: by domain from contact website, or by name
    var domain='';
    if(ci&&ci.website){var ws=ci.website.replace(/^https?:\/\//,'').replace(/^www\./,'').replace(/\/$/,'');domain=ws.split('/')[0].toLowerCase();}
    var co=domain?coMap[domain]:null;
    // Fallback: try _name_ keys with fuzzy match

        seg.addEventListener('mousemove',function(e){outcTip.style.left=(e.clientX+12)+'px';outcTip.style.top=(e.clientY-30)+'px';});
        seg.addEventListener('mouseleave',function(){seg.style.opacity='1';outcTip.style.display='none';});
      });
      outcKpis.forEach(function(k){
        k.addEventListener('mouseenter',function(){k.style.opacity='0.8';outcTip.style.display='block';outcTip.innerHTML=k.dataset.tip||'';});
        k.addEventListener('mousemove',function(e){outcTip.style.left=(e.clientX+12)+'px';outcTip.style.top=(e.clientY-30)+'px';});
        k.addEventListener('mouseleave',function(){k.style.opacity='1';outcTip.style.display='none';});
      });
    }
  });
}

</script>
</body>
</html>
