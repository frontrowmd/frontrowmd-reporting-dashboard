name: Reporting Dashboard

on:
  workflow_dispatch:
    inputs:
      window:
        description: 'Single window to generate (yesterday, last7, mtd, lastmonth, ytd) — leave blank for full report'
        required: false
        default: ''
      custom_from:
        description: 'Custom range start date (YYYY-MM-DD)'
        required: false
        default: ''
      custom_to:
        description: 'Custom range end date (YYYY-MM-DD)'
        required: false
        default: ''
  schedule:
    - cron: '0 16 * * 1-5'  # 8:00 AM PST weekdays (UTC 16:00)

jobs:
  run-report:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run reporting dashboard
        env:
          WINDSOR_API_KEY:         ${{ secrets.WINDSOR_API_KEY }}
          HUBSPOT_TOKEN:           ${{ secrets.HUBSPOT_TOKEN }}
          SLACK_WEBHOOK:           ${{ secrets.SLACK_WEBHOOK }}
          GITHUB_TOKEN:            ${{ secrets.DASHBOARD_GITHUB_TOKEN }}
          GITHUB_OWNER:            ${{ secrets.DASH_GITHUB_OWNER }}
          GITHUB_REPO:             ${{ secrets.DASH_GITHUB_REPO }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.custom_from }}" ] && [ -n "${{ github.event.inputs.custom_to }}" ]; then
            ARGS="--custom-from=${{ github.event.inputs.custom_from }} --custom-to=${{ github.event.inputs.custom_to }}"
          elif [ -n "${{ github.event.inputs.window }}" ]; then
            ARGS="--window=${{ github.event.inputs.window }}"
          fi
          node report.js $ARGS

      - name: Upload report artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reporting-dashboard-${{ github.run_number }}
          path: |
            *.html
            *.txt
          retention-days: 30

      - name: Notify Slack on failure
        if: failure()
        run: |
          curl -X POST "${{ secrets.SLACK_WEBHOOK }}" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"⚠️ *Reporting Dashboard failed* — <https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run log>\"}"
